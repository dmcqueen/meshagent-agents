version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: claude-engineering-with-github-connector
  description: An agent that uses Anthropic's engineering knowledge work plugin with GitHub MCP integration
  annotations:
    meshagent.service.id: meshagent.claude-engineering-with-github-connector
    meshagent.plugin.path: engineering

agents:
  - name: claude-engineering-with-github-connector
    annotations:
      meshagent.agent.type: ChatBot

container:
  image: us-central1-docker.pkg.dev/meshagent-public/images/cli:{SERVER_VERSION}-esgz
  command: /bin/bash /var/start.sh
  storage:
    room:
    - path: /data
      read_only: false
    files:
    - path: /var/start.sh
      text: |
          #!/bin/bash

          set -u -o pipefail

          STARTUP_LOG="/data/meshagent-startup.log"
          GITHUB_MCP_URL="https://api.githubcopilot.com/mcp/"

          mkdir -p /data
          touch "${STARTUP_LOG}"

          log_startup() {
            local message="$1"
            echo "[startup] $(date -u +"%Y-%m-%dT%H:%M:%SZ") ${message}" >> "${STARTUP_LOG}"
          }

          run_nonfatal() {
            local description="$1"
            shift
            if "$@"; then
              log_startup "ok: ${description}"
            else
              local exit_code=$?
              log_startup "failed: ${description} (exit=${exit_code})"
            fi
          }

          ensure_github_mcp_service() {
            if [[ -z "${MESHAGENT_ROOM:-}" ]]; then
              log_startup "skipped: ensure GitHub MCP service (MESHAGENT_ROOM is not set)"
              return 0
            fi

            local cmd=(
              /usr/bin/meshagent service update
              --create
              --room "${MESHAGENT_ROOM}"
              --mcp "${GITHUB_MCP_URL}"
            )

            if [[ -n "${MESHAGENT_PROJECT_ID:-}" ]]; then
              cmd+=(--project-id "${MESHAGENT_PROJECT_ID}")
            fi

            "${cmd[@]}"
          }

          mkdir -p /data/knowledge-work-plugins
          mkdir -p /data/agents/claude-engineering-with-github-connector
          if [ -d /knowledge-work-plugins ]; then
            run_nonfatal "sync knowledge-work-plugins into room storage" cp -R -n /knowledge-work-plugins/. /data/knowledge-work-plugins/
          fi
          if [[ ! -f /data/agents/claude-engineering-with-github-connector/rules.txt ]]; then
            run_nonfatal "stage rules" cp /var/rules-claude-engineering-with-github-connector.txt /data/agents/claude-engineering-with-github-connector/rules.txt
          fi

          run_nonfatal "ensure GitHub MCP service (dynamic OAuth discovery)" ensure_github_mcp_service
          log_startup "starting meshagent chatbot join as pid 1"
          exec /usr/bin/meshagent chatbot join \
            --require-storage \
            --require-web-search \
            --require-web-fetch \
            --mcp \
            --storage-tool-local-path=/knowledge-work-plugins:/knowledge-work-plugins \
            --storage-tool-room-path=/:/data \
            --script-tool \
            -rr=agents/claude-engineering-with-github-connector/rules.txt \
            --rules-file /data/knowledge-work-plugins/commands/architecture.md \
            --rules-file /data/knowledge-work-plugins/commands/debug.md \
            --rules-file /data/knowledge-work-plugins/commands/deploy-checklist.md \
            --rules-file /data/knowledge-work-plugins/commands/incident.md \
            --rules-file /data/knowledge-work-plugins/commands/review.md \
            --rules-file /data/knowledge-work-plugins/commands/standup.md \
            --skill-dir /data/knowledge-work-plugins/skills/code-review \
            --skill-dir /data/knowledge-work-plugins/skills/documentation \
            --skill-dir /data/knowledge-work-plugins/skills/incident-response \
            --skill-dir /data/knowledge-work-plugins/skills/system-design \
            --skill-dir /data/knowledge-work-plugins/skills/tech-debt \
            --skill-dir /data/knowledge-work-plugins/skills/testing-strategy \
    - path: /var/rules-claude-engineering-with-github-connector.txt
      read_only: true
      text: |
          ONLY use the knowledge-work-plugins skills to answer questions and follow the pattern specified in the skill
          you can use the storage tool to read skills not just the shell tool
          when a question could be served by a skill, read the skill and follow the pattern specified in the skill
          when using the storage tool to read files attached or referenced by the user, in the room, or output by the shell tool, the file path should be prefixed with /data.
          when using the storage tool to read skills, the path should be prefixed with /data/knowledge-work-plugins (the folder where the plugins are located)
          You have customizable rules stored in agents/claude-engineering-with-github-connector/rules.txt, you can use the read_file tool to read your rules. You can use the write_file tool to update the contents of the rules file or other text files. Use the read_file tool to read PDFs, examine images, or read files with a text/* mime type from attachments or files.
          You are a MeshAgent agent. MeshAgent is an agent operating system. You can find out more at www.meshagent.com and docs.meshagent.com
          You have some slash commands available
    - path: /knowledge-work-plugins/CONNECTORS.md
      text: |
          # Connectors

          ## How tool references work

          Plugin files use placeholder categories like `~~project tracker`, `~~chat`, and `~~knowledge base`.
          This deployment maps those categories to GitHub using the GitHub MCP Server.

          ## GitHub MCP mapping

          - `~~project tracker` -> GitHub Issues and Projects
          - `~~knowledge base` -> Repositories, code search, docs files, PR history
          - `~~chat` -> GitHub Discussions, PR/issue comments, team threads in GitHub contexts
          - `~~code host` -> Repository content, branches, commits, pull requests, reviews, actions workflows
          - `~~email` -> Email toolkit/MCP if separately connected
          - `~~cloud storage` -> Storage MCP if separately connected
          - `~~CRM` -> CRM MCP if separately connected

          ## Expected behavior in commands

          - `/review` should use GitHub PR/commit context when available (diffs, comments, checks).
          - `/debug` and `/incident` should pull relevant issues, recent workflow failures, and linked PRs before proposing changes.
          - `/architecture` should search repo docs/ADRs and prior implementation discussions before external web search.

          ## Connection checklist

          1. Add GitHub MCP Server in MCP settings.
          2. Authenticate with an account/token that has access to the required repositories and organizations.
          3. Confirm GitHub tools are visible in the runtime tool list.
          4. Verify read access (list repos/issues/PRs) before write operations.

          ## Notes

          - Use least-privilege GitHub permissions; prefer read-only unless mutation is required.
          - Require explicit user confirmation before state-changing actions (merge, close, delete, force-push, workflow dispatch with side effects).
    - path: /knowledge-work-plugins/commands/architecture.md
      text: |
          ---
          description: Create or evaluate an architecture decision record (ADR)
          argument-hint: "<decision or system to design>"
          ---

          # /architecture

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Create an Architecture Decision Record (ADR) or evaluate a system design.

          ## Usage

          ```
          /architecture $ARGUMENTS
          ```

          ## Modes

          **Create an ADR**: "Should we use Kafka or SQS for our event bus?"
          **Evaluate a design**: "Review this microservices proposal"
          **System design**: "Design the notification system for our app"

          See the **system-design** skill for detailed frameworks on requirements gathering, scalability analysis, and trade-off evaluation.

          ## Output — ADR Format

          ```markdown
          # ADR-[number]: [Title]

          **Status:** Proposed | Accepted | Deprecated | Superseded
          **Date:** [Date]
          **Deciders:** [Who needs to sign off]

          ## Context
          [What is the situation? What forces are at play?]

          ## Decision
          [What is the change we're proposing?]

          ## Options Considered

          ### Option A: [Name]
          | Dimension | Assessment |
          |-----------|------------|
          | Complexity | [Low/Med/High] |
          | Cost | [Assessment] |
          | Scalability | [Assessment] |
          | Team familiarity | [Assessment] |

          **Pros:** [List]
          **Cons:** [List]

          ### Option B: [Name]
          [Same format]

          ## Trade-off Analysis
          [Key trade-offs between options with clear reasoning]

          ## Consequences
          - [What becomes easier]
          - [What becomes harder]
          - [What we'll need to revisit]

          ## Action Items
          1. [ ] [Implementation step]
          2. [ ] [Follow-up]
          ```

          ## If Connectors Available

          If **~~knowledge base** is connected:
          - Search for prior ADRs and design docs
          - Find relevant technical context

          If **~~project tracker** is connected:
          - Link to related epics and tickets
          - Create implementation tasks

          ## Tips

          1. **State constraints upfront** — "We need to ship in 2 weeks" or "Must handle 10K rps" shapes the answer.
          2. **Name your options** — Even if you're leaning one way, I'll give a more balanced analysis with explicit alternatives.
          3. **Include non-functional requirements** — Latency, cost, team expertise, and maintenance burden matter as much as features.
    - path: /knowledge-work-plugins/commands/debug.md
      text: |
          ---
          description: Structured debugging session — reproduce, isolate, diagnose, and fix
          argument-hint: "<error message or problem description>"
          ---

          # /debug

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Run a structured debugging session to find and fix issues systematically.

          ## Usage

          ```
          /debug $ARGUMENTS
          ```

          ## How It Works

          ```
          ┌─────────────────────────────────────────────────────────────────┐
          │                       DEBUG                                        │
          ├─────────────────────────────────────────────────────────────────┤
          │  Step 1: REPRODUCE                                                │
          │  ✓ Understand the expected vs. actual behavior                   │
          │  ✓ Identify exact reproduction steps                             │
          │  ✓ Determine scope (when did it start? who is affected?)        │
          │                                                                    │
          │  Step 2: ISOLATE                                                   │
          │  ✓ Narrow down the component, service, or code path             │
          │  ✓ Check recent changes (deploys, config changes, dependencies) │
          │  ✓ Review logs and error messages                                │
          │                                                                    │
          │  Step 3: DIAGNOSE                                                  │
          │  ✓ Form hypotheses and test them                                 │
          │  ✓ Trace the code path                                           │
          │  ✓ Identify root cause (not just symptoms)                      │
          │                                                                    │
          │  Step 4: FIX                                                       │
          │  ✓ Propose a fix with explanation                                │
          │  ✓ Consider side effects and edge cases                          │
          │  ✓ Suggest tests to prevent regression                           │
          └─────────────────────────────────────────────────────────────────┘
          ```

          ## What I Need From You

          Tell me about the problem. Any of these help:
          - Error message or stack trace
          - Steps to reproduce
          - What changed recently
          - Logs or screenshots
          - Expected vs. actual behavior

          ## Output

          ```markdown
          ## Debug Report: [Issue Summary]

          ### Reproduction
          - **Expected**: [What should happen]
          - **Actual**: [What happens instead]
          - **Steps**: [How to reproduce]

          ### Root Cause
          [Explanation of why the bug occurs]

          ### Fix
          [Code changes or configuration fixes needed]

          ### Prevention
          - [Test to add]
          - [Guard to put in place]
          ```

          ## If Connectors Available

          If **~~monitoring** is connected:
          - Pull logs, error rates, and metrics around the time of the issue
          - Show recent deploys and config changes that may correlate

          If **~~source control** is connected:
          - Identify recent commits and PRs that touched affected code paths
          - Check if the issue correlates with a specific change

          If **~~project tracker** is connected:
          - Search for related bug reports or known issues
          - Create a ticket for the fix once identified

          ## Tips

          1. **Share error messages exactly** — Don't paraphrase. The exact text matters.
          2. **Mention what changed** — Recent deploys, dependency updates, and config changes are top suspects.
          3. **Include context** — "This works in staging but not prod" or "Only affects large payloads" narrows things fast.
    - path: /knowledge-work-plugins/commands/deploy-checklist.md
      text: |
          ---
          description: Pre-deployment verification checklist
          argument-hint: "[service or release name]"
          ---

          # /deploy-checklist

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Generate a pre-deployment checklist to verify readiness before shipping.

          ## Usage

          ```
          /deploy-checklist $ARGUMENTS
          ```

          ## Output

          ```markdown
          ## Deploy Checklist: [Service/Release]
          **Date:** [Date] | **Deployer:** [Name]

          ### Pre-Deploy
          - [ ] All tests passing in CI
          - [ ] Code reviewed and approved
          - [ ] No known critical bugs in release
          - [ ] Database migrations tested (if applicable)
          - [ ] Feature flags configured (if applicable)
          - [ ] Rollback plan documented
          - [ ] On-call team notified

          ### Deploy
          - [ ] Deploy to staging and verify
          - [ ] Run smoke tests
          - [ ] Deploy to production (canary if available)
          - [ ] Monitor error rates and latency for 15 min
          - [ ] Verify key user flows

          ### Post-Deploy
          - [ ] Confirm metrics are nominal
          - [ ] Update release notes / changelog
          - [ ] Notify stakeholders
          - [ ] Close related tickets

          ### Rollback Triggers
          - Error rate exceeds [X]%
          - P50 latency exceeds [X]ms
          - [Critical user flow] fails
          ```

          ## Customization

          Tell me about your deploy and I'll customize the checklist:
          - "We use feature flags" → adds flag verification steps
          - "This includes a database migration" → adds migration-specific checks
          - "This is a breaking API change" → adds consumer notification steps

          ## If Connectors Available

          If **~~source control** is connected:
          - Pull the release diff and list of changes
          - Verify all PRs are approved and merged

          If **~~CI/CD** is connected:
          - Check build and test status automatically
          - Verify pipeline is green before deploy

          If **~~monitoring** is connected:
          - Pre-fill rollback trigger thresholds from current baselines
          - Set up post-deploy metric watch

          ## Tips

          1. **Run before every deploy** — Even routine ones. Checklists prevent "I forgot to..."
          2. **Customize once, reuse** — Tell me your stack and I'll remember your deploy process.
          3. **Include rollback criteria** — Decide when to roll back before you deploy, not during.
    - path: /knowledge-work-plugins/commands/incident.md
      text: |
          ---
          description: Run an incident response workflow — triage, communicate, and write postmortem
          argument-hint: "<incident description or alert>"
          ---

          # /incident

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Manage an incident from detection through postmortem.

          ## Usage

          ```
          /incident $ARGUMENTS
          ```

          ## Modes

          ```
          /incident new [description]     # Start a new incident
          /incident update [status]       # Post a status update
          /incident postmortem            # Generate postmortem from incident data
          ```

          If no mode is specified, ask what phase the incident is in. See the **incident-response** skill for severity definitions, response frameworks, and communication templates.

          ## How It Works

          ```
          ┌─────────────────────────────────────────────────────────────────┐
          │                    INCIDENT RESPONSE                               │
          ├─────────────────────────────────────────────────────────────────┤
          │  Phase 1: TRIAGE                                                  │
          │  ✓ Assess severity (SEV1-4)                                     │
          │  ✓ Identify affected systems and users                          │
          │  ✓ Assign roles (IC, comms, responders)                         │
          │                                                                    │
          │  Phase 2: COMMUNICATE                                              │
          │  ✓ Draft internal status update                                  │
          │  ✓ Draft customer communication (if needed)                     │
          │  ✓ Set up war room and cadence                                   │
          │                                                                    │
          │  Phase 3: MITIGATE                                                 │
          │  ✓ Document mitigation steps taken                               │
          │  ✓ Track timeline of events                                      │
          │  ✓ Confirm resolution                                            │
          │                                                                    │
          │  Phase 4: POSTMORTEM                                               │
          │  ✓ Blameless postmortem document                                 │
          │  ✓ Timeline reconstruction                                       │
          │  ✓ Root cause analysis (5 whys)                                  │
          │  ✓ Action items with owners                                      │
          └─────────────────────────────────────────────────────────────────┘
          ```

          ## Output — Status Update

          ```markdown
          ## Incident Update: [Title]
          **Severity:** SEV[1-4] | **Status:** Investigating | Identified | Monitoring | Resolved
          **Impact:** [Who/what is affected]
          **Last Updated:** [Timestamp]

          ### Current Status
          [What we know now]

          ### Actions Taken
          - [Action 1]
          - [Action 2]

          ### Next Steps
          - [What's happening next and ETA]

          ### Timeline
          | Time | Event |
          |------|-------|
          | [HH:MM] | [Event] |
          ```

          ## Output — Postmortem

          ```markdown
          ## Postmortem: [Incident Title]
          **Date:** [Date] | **Duration:** [X hours] | **Severity:** SEV[X]
          **Authors:** [Names] | **Status:** Draft

          ### Summary
          [2-3 sentence plain-language summary]

          ### Impact
          - [Users affected]
          - [Duration of impact]
          - [Business impact if quantifiable]

          ### Timeline
          | Time (UTC) | Event |
          |------------|-------|
          | [HH:MM] | [Event] |

          ### Root Cause
          [Detailed explanation of what caused the incident]

          ### 5 Whys
          1. Why did [symptom]? → [Because...]
          2. Why did [cause 1]? → [Because...]
          3. Why did [cause 2]? → [Because...]
          4. Why did [cause 3]? → [Because...]
          5. Why did [cause 4]? → [Root cause]

          ### What Went Well
          - [Things that worked]

          ### What Went Poorly
          - [Things that didn't work]

          ### Action Items
          | Action | Owner | Priority | Due Date |
          |--------|-------|----------|----------|
          | [Action] | [Person] | P0/P1/P2 | [Date] |

          ### Lessons Learned
          [Key takeaways for the team]
          ```

          ## If Connectors Available

          If **~~monitoring** is connected:
          - Pull alert details and metrics
          - Show graphs of affected metrics

          If **~~incident management** is connected:
          - Create or update incident in PagerDuty/Opsgenie
          - Page on-call responders

          If **~~chat** is connected:
          - Post status updates to incident channel
          - Create war room channel

          ## Tips

          1. **Start writing immediately** — Don't wait for complete information. Update as you learn more.
          2. **Keep updates factual** — What we know, what we've done, what's next. No speculation.
          3. **Postmortems are blameless** — Focus on systems and processes, not individuals.
    - path: /knowledge-work-plugins/commands/review.md
      text: |
          ---
          description: Review code changes for security, performance, and correctness
          argument-hint: "<PR URL, diff, or file path>"
          ---

          # /review

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Review code changes with a structured lens on security, performance, correctness, and maintainability.

          ## Usage

          ```
          /review <PR URL or file path>
          ```

          Review the provided code changes: @$1

          If no specific file or URL is provided, ask what to review.

          ## How It Works

          ```
          ┌─────────────────────────────────────────────────────────────────┐
          │                      CODE REVIEW                                   │
          ├─────────────────────────────────────────────────────────────────┤
          │  STANDALONE (always works)                                       │
          │  ✓ Paste a diff, PR URL, or point to files                      │
          │  ✓ Security audit (OWASP top 10, injection, auth)               │
          │  ✓ Performance review (N+1, memory leaks, complexity)           │
          │  ✓ Correctness (edge cases, error handling, race conditions)    │
          │  ✓ Style (naming, structure, readability)                        │
          │  ✓ Actionable suggestions with code examples                    │
          ├─────────────────────────────────────────────────────────────────┤
          │  SUPERCHARGED (when you connect your tools)                      │
          │  + Source control: Pull PR diff automatically                    │
          │  + Project tracker: Link findings to tickets                     │
          │  + Knowledge base: Check against team coding standards           │
          └─────────────────────────────────────────────────────────────────┘
          ```

          ## Output

          ```markdown
          ## Code Review: [PR title or file]

          ### Summary
          [1-2 sentence overview of the changes and overall quality]

          ### Critical Issues
          | # | File | Line | Issue | Severity |
          |---|------|------|-------|----------|
          | 1 | [file] | [line] | [description] | 🔴 Critical |

          ### Suggestions
          | # | File | Line | Suggestion | Category |
          |---|------|------|------------|----------|
          | 1 | [file] | [line] | [description] | Performance |

          ### What Looks Good
          - [Positive observations]

          ### Verdict
          [Approve / Request Changes / Needs Discussion]
          ```

          ## Review Checklist

          See the **code-review** skill for detailed guidance on security patterns, performance anti-patterns, and maintainability heuristics.

          I check for:
          - **Security**: SQL injection, XSS, auth bypass, secrets in code, insecure deserialization
          - **Performance**: N+1 queries, unnecessary allocations, algorithmic complexity, missing indexes
          - **Correctness**: Edge cases, null handling, race conditions, error propagation
          - **Maintainability**: Naming clarity, single responsibility, test coverage, documentation

          ## If Connectors Available

          If **~~source control** is connected:
          - Pull the PR diff automatically from the URL
          - Check CI status and test results

          If **~~project tracker** is connected:
          - Link findings to related tickets
          - Verify the PR addresses the stated requirements

          If **~~knowledge base** is connected:
          - Check changes against team coding standards and style guides

          ## Tips

          1. **Provide context** — "This is a hot path" or "This handles PII" helps me focus.
          2. **Specify concerns** — "Focus on security" narrows the review.
          3. **Include tests** — I'll check test coverage and quality too.
    - path: /knowledge-work-plugins/commands/standup.md
      text: |
          ---
          description: Generate a standup update from recent activity
