version: v1
kind: ServiceTemplate
metadata:
  name: zendesk-mcp
  description: "Expose Zendesk MCP tools via meshagent mcp stdio-service (community server)"
  annotations:
    meshagent.service.id: "zendesk-mcp"
variables:
  - name: zendesk_subdomain
    description: "Zendesk subdomain (e.g. acme for acme.zendesk.com)"
  - name: zendesk_email
    type: email
    description: "Zendesk account email used for API authentication."
  - name: zendesk_api_token
    description: "Zendesk API token."
    obscure: true
    annotations:
      meshagent.secret.id: zendesk_api_token
      meshagent.secret.identity: zendesk-mcp
      meshagent.secret.name: zendesk_api_token
      meshagent.secret.type: text
container:
  image: node:20-alpine
  command: >-
    sh -lc "
    apk add --no-cache python3 py3-pip py3-virtualenv &&
    python3 -m venv /meshagent/.venv &&
    . /meshagent/.venv/bin/activate &&
    pip install --no-cache-dir 'meshagent[mcp-service]==0.28.1' &&
    exec meshagent mcp stdio-service
    --port 8080
    --path /mcp
    --toolkit-name zendesk
    -e ZENDESK_EMAIL='{{ zendesk_email }}'
    -e ZENDESK_TOKEN='{{ zendesk_api_token }}'
    -e ZENDESK_SUBDOMAIN='{{ zendesk_subdomain }}'
    --command 'npx -y zd-mcp-server'
    "
ports:
  - num: 8080
    type: http
    endpoints:
      - path: /mcp
        mcp:
          label: "zendesk"
          description: "Zendesk MCP tools (tickets, comments, updates)"
