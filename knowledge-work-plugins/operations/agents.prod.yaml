version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: claude-operations
  description: An agent that uses Anthropic's operations knowledge work plugin
  annotations:
    meshagent.service.id: meshagent.claude-operations
    meshagent.plugin.path: operations

agents:
  - name: claude-operations
    annotations:
      meshagent.agent.type: ChatBot

container:
  image: us-central1-docker.pkg.dev/meshagent-public/images/cli:{SERVER_VERSION}-esgz
  command: /bin/bash /var/start.sh
  storage:
    room:
    - path: /data
      read_only: false
    files:
    - path: /var/start.sh
      text: |
          #!/bin/bash

          set -e

          mkdir -p /data/knowledge-work-plugins
          mkdir -p /data/agents/claude-operations
          if [ -d /knowledge-work-plugins ]; then
            cp -R -n /knowledge-work-plugins/* /data/knowledge-work-plugins/ 2>/dev/null || true
          fi
          if [[ ! -f /data/agents/claude-operations/rules.txt ]]; then
            cp /var/rules-claude-operations.txt /data/agents/claude-operations/rules.txt
          fi

          exec /usr/bin/meshagent chatbot join \
            --require-storage \
            --require-web-search \
            --require-web-fetch \
            --storage-tool-local-path=/knowledge-work-plugins:/knowledge-work-plugins \
            --storage-tool-room-path=/:/data \
            --script-tool \
            -rr=agents/claude-operations/rules.txt \
            --rules-file /data/knowledge-work-plugins/commands/capacity-plan.md \
            --rules-file /data/knowledge-work-plugins/commands/change-request.md \
            --rules-file /data/knowledge-work-plugins/commands/process-doc.md \
            --rules-file /data/knowledge-work-plugins/commands/runbook.md \
            --rules-file /data/knowledge-work-plugins/commands/status-report.md \
            --rules-file /data/knowledge-work-plugins/commands/vendor-review.md \
            --skill-dir /data/knowledge-work-plugins/skills/change-management \
            --skill-dir /data/knowledge-work-plugins/skills/compliance-tracking \
            --skill-dir /data/knowledge-work-plugins/skills/process-optimization \
            --skill-dir /data/knowledge-work-plugins/skills/resource-planning \
            --skill-dir /data/knowledge-work-plugins/skills/risk-assessment \
            --skill-dir /data/knowledge-work-plugins/skills/vendor-management \
    - path: /var/rules-claude-operations.txt
      read_only: true
      text: |
          ONLY use the knowledge-work-plugins skills to answer questions and follow the pattern specified in the skill
          you can use the storage tool to read skills not just the shell tool
          when a question could be served by a skill, read the skill and follow the pattern specified in the skill
          when using the storage tool to read files attached or referenced by the user, in the room, or output by the shell tool, the file path should be prefixed with /data.
          when using the storage tool to read skills, the path should be prefixed with /data/knowledge-work-plugins (the folder where the plugins are located)
          You have customizable rules stored in agents/claude-operations/rules.txt, you can use the read_file tool to read your rules. You can use the write_file tool to update the contents of the rules file or other text files. Use the read_file tool to read PDFs, examine images, or read files with a text/* mime type from attachments or files.
          You are a MeshAgent agent. MeshAgent is an agent operating system. You can find out more at www.meshagent.com and docs.meshagent.com
          You have some slash commands available
    - path: /knowledge-work-plugins/commands/capacity-plan.md
      text: |
          ---
          description: Plan resource capacity — workload analysis and utilization forecasting
          argument-hint: "<team or project scope>"
          ---

          # /capacity-plan

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Analyze team capacity and plan resource allocation. See the **resource-planning** skill for utilization targets by role type and common planning pitfalls.

          ## Usage

          ```
          /capacity-plan $ARGUMENTS
          ```

          ## What I Need From You

          - **Team size and roles**: Who do you have?
          - **Current workload**: What are they working on? (Upload from project tracker or describe)
          - **Upcoming work**: What's coming next quarter?
          - **Constraints**: Budget, hiring timeline, skill requirements

          ## Output

          ```markdown
          ## Capacity Plan: [Team/Project]
          **Period:** [Date range] | **Team Size:** [X]

          ### Current Utilization
          | Person/Role | Capacity | Allocated | Available | Utilization |
          |-------------|----------|-----------|-----------|-------------|
          | [Name/Role] | [hrs/wk] | [hrs/wk] | [hrs/wk] | [X]% |

          ### Capacity Summary
          - **Total capacity**: [X] hours/week
          - **Currently allocated**: [X] hours/week ([X]%)
          - **Available**: [X] hours/week ([X]%)
          - **Overallocated**: [X people above 100%]

          ### Upcoming Demand
          | Project/Initiative | Start | End | Resources Needed | Gap |
          |--------------------|-------|-----|-----------------|-----|
          | [Project] | [Date] | [Date] | [X FTEs] | [Covered/Gap] |

          ### Bottlenecks
          - [Skill or role that's oversubscribed]
          - [Time period with a crunch]

          ### Recommendations
          1. [Hire / Contract / Reprioritize / Delay]
          2. [Specific action]

          ### Scenarios
          | Scenario | Outcome |
          |----------|---------|
          | Do nothing | [What happens] |
          | Hire [X] | [What changes] |
          | Deprioritize [Y] | [What frees up] |
          ```

          ## If Connectors Available

          If **~~project tracker** is connected:
          - Pull current workload and ticket assignments automatically
          - Show upcoming sprint or quarter commitments per person

          If **~~calendar** is connected:
          - Factor in PTO, holidays, and recurring meeting load
          - Calculate actual available hours per person

          ## Tips

          1. **Include all work** — BAU, projects, support, meetings. People aren't 100% available for project work.
          2. **Plan for buffer** — Target 80% utilization. 100% means no room for surprises.
          3. **Update regularly** — Capacity plans go stale fast. Review monthly.
    - path: /knowledge-work-plugins/commands/change-request.md
      text: |
          ---
          description: Create a change management request with impact analysis and rollback plan
          argument-hint: "<change description>"
          ---

          # /change-request

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Create a structured change request with impact analysis, risk assessment, and rollback plan. See the **change-management** skill for the assess-plan-execute-sustain framework and communication principles.

          ## Usage

          ```
          /change-request $ARGUMENTS
          ```

          ## Output

          ```markdown
          ## Change Request: [Title]
          **Requester:** [Name] | **Date:** [Date] | **Priority:** [Critical/High/Medium/Low]
          **Status:** Draft | Pending Approval | Approved | In Progress | Complete

          ### Description
          [What is changing and why]

          ### Business Justification
          [Why this change is needed — cost savings, compliance, efficiency, risk reduction]

          ### Impact Analysis
          | Area | Impact | Details |
          |------|--------|---------|
          | Users | [High/Med/Low/None] | [Who is affected and how] |
          | Systems | [High/Med/Low/None] | [What systems are affected] |
          | Processes | [High/Med/Low/None] | [What workflows change] |
          | Cost | [High/Med/Low/None] | [Budget impact] |

          ### Risk Assessment
          | Risk | Likelihood | Impact | Mitigation |
          |------|-----------|--------|------------|
          | [Risk] | [H/M/L] | [H/M/L] | [How to mitigate] |

          ### Implementation Plan
          | Step | Owner | Timeline | Dependencies |
          |------|-------|----------|--------------|
          | [Step] | [Person] | [Date] | [What it depends on] |

          ### Communication Plan
          | Audience | Message | Channel | Timing |
          |----------|---------|---------|--------|
          | [Who] | [What to tell them] | [How] | [When] |

          ### Rollback Plan
          [Step-by-step plan to reverse the change if needed]
          - Trigger: [When to roll back]
          - Steps: [How to roll back]
          - Verification: [How to confirm rollback worked]

          ### Approvals Required
          | Approver | Role | Status |
          |----------|------|--------|
          | [Name] | [Role] | Pending |
          ```

          ## If Connectors Available

          If **~~ITSM** is connected:
          - Create the change request ticket automatically
          - Pull change advisory board schedule and approval workflows

          If **~~project tracker** is connected:
          - Link to related implementation tasks and dependencies
          - Track change progress against milestones

          If **~~chat** is connected:
          - Draft stakeholder notifications for the communication plan
          - Post change updates to the relevant team channels

          ## Tips

          1. **Be specific about impact** — "Everyone" is not an impact assessment. "200 users in the billing team" is.
          2. **Always have a rollback plan** — Even if you're confident, plan for failure.
          3. **Communicate early** — Surprises create resistance. Previews create buy-in.
    - path: /knowledge-work-plugins/commands/process-doc.md
      text: |
          ---
          description: Document a business process — flowcharts, RACI, and SOPs
          argument-hint: "<process name or description>"
          ---

          # /process-doc

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Document a business process as a complete standard operating procedure (SOP).

          ## Usage

          ```
          /process-doc $ARGUMENTS
          ```

          ## How It Works

          Walk me through the process — describe it, paste existing docs, or just tell me the name and I'll ask the right questions. I'll produce a complete SOP.

          ## Output

          ```markdown
          ## Process Document: [Process Name]
          **Owner:** [Person/Team] | **Last Updated:** [Date] | **Review Cadence:** [Quarterly/Annually]

          ### Purpose
          [Why this process exists and what it accomplishes]

          ### Scope
          [What's included and excluded]

          ### RACI Matrix
          | Step | Responsible | Accountable | Consulted | Informed |
          |------|------------|-------------|-----------|----------|
          | [Step] | [Who does it] | [Who owns it] | [Who to ask] | [Who to tell] |

          ### Process Flow
          [ASCII flowchart or step-by-step description]

          ### Detailed Steps

          #### Step 1: [Name]
          - **Who**: [Role]
          - **When**: [Trigger or timing]
          - **How**: [Detailed instructions]
          - **Output**: [What this step produces]

          #### Step 2: [Name]
          [Same format]

          ### Exceptions and Edge Cases
          | Scenario | What to Do |
          |----------|-----------|
          | [Exception] | [How to handle it] |

          ### Metrics
          | Metric | Target | How to Measure |
          |--------|--------|----------------|
          | [Metric] | [Target] | [Method] |

          ### Related Documents
          - [Link to related process or policy]
          ```

          ## If Connectors Available

          If **~~knowledge base** is connected:
          - Search for existing process documentation to update rather than duplicate
          - Publish the completed SOP to your wiki

          If **~~project tracker** is connected:
          - Link the process to related projects and workflows
          - Create tasks for process improvement action items

          ## Tips

          1. **Start messy** — You don't need a perfect description. Tell me how it works today and I'll structure it.
          2. **Include the exceptions** — "Usually we do X, but sometimes Y" is the most valuable part to document.
          3. **Name the people** — Even if roles change, knowing who does what today helps get the process right.
    - path: /knowledge-work-plugins/commands/runbook.md
      text: |
          ---
          description: Create or update an operational runbook
          argument-hint: "<process or task name>"
          ---

          # /runbook

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Create a step-by-step operational runbook for a recurring task or procedure.

          ## Usage

          ```
          /runbook $ARGUMENTS
          ```

          ## Output

          ```markdown
          ## Runbook: [Task Name]
          **Owner:** [Team/Person] | **Frequency:** [Daily/Weekly/Monthly/As Needed]
          **Last Updated:** [Date] | **Last Run:** [Date]

          ### Purpose
          [What this runbook accomplishes and when to use it]

          ### Prerequisites
          - [ ] [Access or permission needed]
          - [ ] [Tool or system required]
          - [ ] [Data or input needed]

          ### Procedure

          #### Step 1: [Name]
          ```
          [Exact command, action, or instruction]
          ```
          **Expected result:** [What should happen]
          **If it fails:** [What to do]

          #### Step 2: [Name]
          ```
          [Exact command, action, or instruction]
          ```
          **Expected result:** [What should happen]
          **If it fails:** [What to do]

          ### Verification
          - [ ] [How to confirm the task completed successfully]
          - [ ] [What to check]

          ### Troubleshooting
          | Symptom | Likely Cause | Fix |
          |---------|-------------|-----|
          | [What you see] | [Why] | [What to do] |

          ### Rollback
          [How to undo this if something goes wrong]

          ### Escalation
          | Situation | Contact | Method |
          |-----------|---------|--------|
          | [When to escalate] | [Who] | [How to reach them] |

          ### History
          | Date | Run By | Notes |
          |------|--------|-------|
          | [Date] | [Person] | [Any issues or observations] |
          ```

          ## If Connectors Available

          If **~~knowledge base** is connected:
          - Search for existing runbooks to update rather than create from scratch
          - Publish the completed runbook to your ops wiki

          If **~~ITSM** is connected:
          - Link the runbook to related incident types and change requests
          - Auto-populate escalation contacts from on-call schedules

          ## Tips

          1. **Be painfully specific** — "Run the script" is not a step. "Run `python sync.py --prod --dry-run` from the ops server" is.
          2. **Include failure modes** — What can go wrong at each step and what to do about it.
          3. **Test the runbook** — Have someone unfamiliar with the process follow it. Fix where they get stuck.
    - path: /knowledge-work-plugins/commands/status-report.md
