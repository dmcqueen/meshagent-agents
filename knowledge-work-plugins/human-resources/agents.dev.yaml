version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: claude-human-resources
  description: An agent that uses Anthropic's human resources knowledge work plugin
  annotations:
    meshagent.service.id: meshagent.claude-human-resources
    meshagent.plugin.path: human-resources

agents:
  - name: claude-human-resources
    annotations:
      meshagent.agent.type: ChatBot

container:
  image: us-central1-docker.pkg.dev/meshagent-life/meshagent-public/cli:{SERVER_VERSION}-esgz
  command: /bin/bash /var/start.sh
  storage:
    room:
    - path: /data
      read_only: false
    files:
    - path: /var/start.sh
      text: |
          #!/bin/bash

          set -e

          mkdir -p /data/knowledge-work-plugins
          mkdir -p /data/agents/claude-human-resources
          if [ -d /knowledge-work-plugins ]; then
            cp -R -n /knowledge-work-plugins/* /data/knowledge-work-plugins/ 2>/dev/null || true
          fi
          if [[ ! -f /data/agents/claude-human-resources/rules.txt ]]; then
            cp /var/rules-claude-human-resources.txt /data/agents/claude-human-resources/rules.txt
          fi

          exec /usr/bin/meshagent chatbot join \
            --require-storage \
            --require-web-search \
            --require-web-fetch \
            --storage-tool-local-path=/knowledge-work-plugins:/knowledge-work-plugins \
            --storage-tool-room-path=/:/data \
            --script-tool \
            -rr=agents/claude-human-resources/rules.txt \
            --rules-file /data/knowledge-work-plugins/commands/comp-analysis.md \
            --rules-file /data/knowledge-work-plugins/commands/draft-offer.md \
            --rules-file /data/knowledge-work-plugins/commands/onboarding.md \
            --rules-file /data/knowledge-work-plugins/commands/people-report.md \
            --rules-file /data/knowledge-work-plugins/commands/performance-review.md \
            --rules-file /data/knowledge-work-plugins/commands/policy-lookup.md \
            --skill-dir /data/knowledge-work-plugins/skills/compensation-benchmarking \
            --skill-dir /data/knowledge-work-plugins/skills/employee-handbook \
            --skill-dir /data/knowledge-work-plugins/skills/interview-prep \
            --skill-dir /data/knowledge-work-plugins/skills/org-planning \
            --skill-dir /data/knowledge-work-plugins/skills/people-analytics \
            --skill-dir /data/knowledge-work-plugins/skills/recruiting-pipeline \
    - path: /var/rules-claude-human-resources.txt
      read_only: true
      text: |
          ONLY use the knowledge-work-plugins skills to answer questions and follow the pattern specified in the skill
          you can use the storage tool to read skills not just the shell tool
          when a question could be served by a skill, read the skill and follow the pattern specified in the skill
          when using the storage tool to read files attached or referenced by the user, in the room, or output by the shell tool, the file path should be prefixed with /data.
          when using the storage tool to read skills, the path should be prefixed with /data/knowledge-work-plugins (the folder where the plugins are located)
          You have customizable rules stored in agents/claude-human-resources/rules.txt, you can use the read_file tool to read your rules. You can use the write_file tool to update the contents of the rules file or other text files. Use the read_file tool to read PDFs, examine images, or read files with a text/* mime type from attachments or files.
          You are a MeshAgent agent. MeshAgent is an agent operating system. You can find out more at www.meshagent.com and docs.meshagent.com
          You have some slash commands available
    - path: /knowledge-work-plugins/commands/comp-analysis.md
      text: |
          ---
          description: Analyze compensation — benchmarking, band placement, and equity modeling
          argument-hint: "<role, level, or dataset>"
          ---

          # /comp-analysis

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Analyze compensation data for benchmarking, band placement, and planning. See the **compensation-benchmarking** skill for total comp frameworks, key variables, and data source guidance.

          ## Usage

          ```
          /comp-analysis $ARGUMENTS
          ```

          ## What I Need From You

          **Option A: Single role analysis**
          "What should we pay a Senior Software Engineer in SF?"

          **Option B: Upload comp data**
          Upload a CSV or paste your comp bands. I'll analyze placement, identify outliers, and compare to market.

          **Option C: Equity modeling**
          "Model a refresh grant of 10K shares over 4 years at a $50 stock price."

          ## Output

          ```markdown
          ## Compensation Analysis: [Role/Scope]

          ### Market Benchmarks
          | Percentile | Base | Equity | Total Comp |
          |------------|------|--------|------------|
          | 25th | $[X] | $[X] | $[X] |
          | 50th | $[X] | $[X] | $[X] |
          | 75th | $[X] | $[X] | $[X] |
          | 90th | $[X] | $[X] | $[X] |

          **Sources:** [Web research, compensation data tools, or user-provided data]

          ### Band Analysis (if data provided)
          | Employee | Current Base | Band Min | Band Mid | Band Max | Position |
          |----------|-------------|----------|----------|----------|----------|
          | [Name] | $[X] | $[X] | $[X] | $[X] | [Below/At/Above] |

          ### Recommendations
          - [Specific compensation recommendations]
          - [Equity considerations]
          - [Retention risks if applicable]
          ```

          ## If Connectors Available

          If **~~compensation data** is connected:
          - Pull verified market benchmarks by role, level, and location
          - Compare your bands against real-time market data

          If **~~HRIS** is connected:
          - Pull current employee comp data for band analysis
          - Identify outliers and retention risks automatically

          ## Tips

          1. **Location matters** — Always specify location for benchmarking. SF vs. Austin vs. London are very different.
          2. **Total comp, not just base** — Include equity, bonus, and benefits for a complete picture.
          3. **Keep data confidential** — Comp data is sensitive. Results stay in your conversation.
    - path: /knowledge-work-plugins/commands/draft-offer.md
      text: |
          ---
          description: Draft an offer letter with comp details and terms
          argument-hint: "<role and level>"
          ---

          # /draft-offer

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Draft a complete offer letter for a new hire.

          ## Usage

          ```
          /draft-offer $ARGUMENTS
          ```

          ## What I Need From You

          - **Role and title**: What position?
          - **Level**: Junior, Mid, Senior, Staff, etc.
          - **Location**: Where will they be based? (affects comp and benefits)
          - **Compensation**: Base salary, equity, signing bonus (if applicable)
          - **Start date**: When should they start?
          - **Hiring manager**: Who will they report to?

          If you don't have all details, I'll help you think through them.

          ## Output

          ```markdown
          ## Offer Letter Draft: [Role] — [Level]

          ### Compensation Package
          | Component | Details |
          |-----------|---------|
          | **Base Salary** | $[X]/year |
          | **Equity** | [X shares/units], [vesting schedule] |
          | **Signing Bonus** | $[X] (if applicable) |
          | **Target Bonus** | [X]% of base (if applicable) |
          | **Total First-Year Comp** | $[X] |

          ### Terms
          - **Start Date**: [Date]
          - **Reports To**: [Manager]
          - **Location**: [Office / Remote / Hybrid]
          - **Employment Type**: [Full-time, Exempt]

          ### Benefits Summary
          [Key benefits highlights relevant to the candidate]

          ### Offer Letter Text

          Dear [Candidate Name],

          We are pleased to offer you the position of [Title] at [Company]...

          [Complete offer letter text]

          ### Notes for Hiring Manager
          - [Negotiation guidance if needed]
          - [Comp band context]
          - [Any flags or considerations]
          ```

          ## If Connectors Available

          If **~~HRIS** is connected:
          - Pull comp band data for the level/role
          - Verify headcount approval
          - Auto-populate benefits details

          If **~~ATS** is connected:
          - Pull candidate details from the application
          - Update offer status in the pipeline

          ## Tips

          1. **Include total comp** — Candidates compare total compensation, not just base.
          2. **Be specific about equity** — Share count, current valuation method, vesting schedule.
          3. **Personalize** — Reference something from the interview process to make it warm.
    - path: /knowledge-work-plugins/commands/onboarding.md
      text: |
          ---
          description: Generate an onboarding checklist and first-week plan for a new hire
