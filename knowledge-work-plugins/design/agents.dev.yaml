version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: claude-design
  description: An agent that uses Anthropic's design knowledge work plugin
  annotations:
    meshagent.service.id: meshagent.claude-design
    meshagent.plugin.path: design

agents:
  - name: claude-design
    annotations:
      meshagent.agent.type: ChatBot

container:
  image: us-central1-docker.pkg.dev/meshagent-life/meshagent-public/cli:{SERVER_VERSION}-esgz
  command: /bin/bash /var/start.sh
  storage:
    room:
    - path: /data
      read_only: false
    files:
    - path: /var/start.sh
      text: |
          #!/bin/bash

          set -e

          mkdir -p /data/knowledge-work-plugins
          mkdir -p /data/agents/claude-design
          if [ -d /knowledge-work-plugins ]; then
            cp -R -n /knowledge-work-plugins/* /data/knowledge-work-plugins/ 2>/dev/null || true
          fi
          if [[ ! -f /data/agents/claude-design/rules.txt ]]; then
            cp /var/rules-claude-design.txt /data/agents/claude-design/rules.txt
          fi

          exec /usr/bin/meshagent chatbot join \
            --require-storage \
            --require-web-search \
            --require-web-fetch \
            --storage-tool-local-path=/knowledge-work-plugins:/knowledge-work-plugins \
            --storage-tool-room-path=/:/data \
            --script-tool \
            -rr=agents/claude-design/rules.txt \
            --rules-file /data/knowledge-work-plugins/commands/accessibility.md \
            --rules-file /data/knowledge-work-plugins/commands/critique.md \
            --rules-file /data/knowledge-work-plugins/commands/design-system.md \
            --rules-file /data/knowledge-work-plugins/commands/handoff.md \
            --rules-file /data/knowledge-work-plugins/commands/research-synthesis.md \
            --rules-file /data/knowledge-work-plugins/commands/ux-copy.md \
            --skill-dir /data/knowledge-work-plugins/skills/accessibility-review \
            --skill-dir /data/knowledge-work-plugins/skills/design-critique \
            --skill-dir /data/knowledge-work-plugins/skills/design-handoff \
            --skill-dir /data/knowledge-work-plugins/skills/design-system-management \
            --skill-dir /data/knowledge-work-plugins/skills/user-research \
            --skill-dir /data/knowledge-work-plugins/skills/ux-writing \
    - path: /var/rules-claude-design.txt
      read_only: true
      text: |
          ONLY use the knowledge-work-plugins skills to answer questions and follow the pattern specified in the skill
          you can use the storage tool to read skills not just the shell tool
          when a question could be served by a skill, read the skill and follow the pattern specified in the skill
          when using the storage tool to read files attached or referenced by the user, in the room, or output by the shell tool, the file path should be prefixed with /data.
          when using the storage tool to read skills, the path should be prefixed with /data/knowledge-work-plugins (the folder where the plugins are located)
          You have customizable rules stored in agents/claude-design/rules.txt, you can use the read_file tool to read your rules. You can use the write_file tool to update the contents of the rules file or other text files. Use the read_file tool to read PDFs, examine images, or read files with a text/* mime type from attachments or files.
          You are a MeshAgent agent. MeshAgent is an agent operating system. You can find out more at www.meshagent.com and docs.meshagent.com
          You have some slash commands available
    - path: /knowledge-work-plugins/commands/accessibility.md
      text: |
          ---
          description: Run a WCAG accessibility audit on a design or page
          argument-hint: "<Figma URL, URL, or description>"
          ---

          # /accessibility

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Audit a design or page for WCAG 2.1 AA accessibility compliance. See the **accessibility-review** skill for WCAG criteria reference and common issues checklist.

          ## Usage

          ```
          /accessibility $ARGUMENTS
          ```

          Audit for accessibility: @$1

          ## Output

          ```markdown
          ## Accessibility Audit: [Design/Page Name]
          **Standard:** WCAG 2.1 AA | **Date:** [Date]

          ### Summary
          **Issues found:** [X] | **Critical:** [X] | **Major:** [X] | **Minor:** [X]

          ### Findings

          #### Perceivable
          | # | Issue | WCAG Criterion | Severity | Recommendation |
          |---|-------|---------------|----------|----------------|
          | 1 | [Issue] | [1.4.3 Contrast] | 🔴 Critical | [Fix] |

          #### Operable
          | # | Issue | WCAG Criterion | Severity | Recommendation |
          |---|-------|---------------|----------|----------------|
          | 1 | [Issue] | [2.1.1 Keyboard] | 🟡 Major | [Fix] |

          #### Understandable
          | # | Issue | WCAG Criterion | Severity | Recommendation |
          |---|-------|---------------|----------|----------------|
          | 1 | [Issue] | [3.3.2 Labels] | 🟢 Minor | [Fix] |

          #### Robust
          | # | Issue | WCAG Criterion | Severity | Recommendation |
          |---|-------|---------------|----------|----------------|
          | 1 | [Issue] | [4.1.2 Name, Role, Value] | 🟡 Major | [Fix] |

          ### Color Contrast Check
          | Element | Foreground | Background | Ratio | Required | Pass? |
          |---------|-----------|------------|-------|----------|-------|
          | [Body text] | [color] | [color] | [X]:1 | 4.5:1 | ✅/❌ |

          ### Keyboard Navigation
          | Element | Tab Order | Enter/Space | Escape | Arrow Keys |
          |---------|-----------|-------------|--------|------------|
          | [Element] | [Order] | [Behavior] | [Behavior] | [Behavior] |

          ### Screen Reader
          | Element | Announced As | Issue |
          |---------|-------------|-------|
          | [Element] | [What SR says] | [Problem if any] |

          ### Priority Fixes
          1. **[Critical fix]** — Affects [who] and blocks [what]
          2. **[Major fix]** — Improves [what] for [who]
          3. **[Minor fix]** — Nice to have
          ```

          ## If Connectors Available

          If **~~design tool** is connected:
          - Inspect color values, font sizes, and touch targets directly from Figma
          - Check component ARIA roles and keyboard behavior in the design spec

          If **~~project tracker** is connected:
          - Create tickets for each accessibility finding with severity and WCAG criterion
          - Link findings to existing accessibility remediation epics

          ## Tips

          1. **Start with contrast and keyboard** — These catch the most common and impactful issues.
          2. **Test with real assistive technology** — My audit is a great start, but manual testing with VoiceOver/NVDA catches things I can't.
          3. **Prioritize by impact** — Fix issues that block users first, polish later.
    - path: /knowledge-work-plugins/commands/critique.md
      text: |
          ---
          description: Get structured design feedback on usability, hierarchy, and consistency
          argument-hint: "<Figma URL, screenshot, or description>"
          ---

          # /critique

          > If you see unfamiliar placeholders or need to check which tools are connected, see [CONNECTORS.md](../CONNECTORS.md).

          Get structured design feedback across multiple dimensions. See the **design-critique** skill for the evaluation framework and feedback principles.

          ## Usage

          ```
          /critique $ARGUMENTS
          ```

          Review the design: @$1

          If a Figma URL is provided, pull the design from Figma. If a file is referenced, read it. Otherwise, ask the user to describe or share their design.

          ## What I Need From You

          - **The design**: Figma URL, screenshot, or detailed description
          - **Context**: What is this? Who is it for? What stage (exploration, refinement, final)?
          - **Focus** (optional): "Focus on mobile" or "Focus on the onboarding flow"

          ## Output

          ```markdown
          ## Design Critique: [Design Name]

          ### Overall Impression
          [1-2 sentence first reaction — what works, what's the biggest opportunity]

          ### Usability
          | Finding | Severity | Recommendation |
          |---------|----------|----------------|
          | [Issue] | 🔴 Critical / 🟡 Moderate / 🟢 Minor | [Fix] |

          ### Visual Hierarchy
          - **What draws the eye first**: [Element] — [Is this correct?]
          - **Reading flow**: [How does the eye move through the layout?]
          - **Emphasis**: [Are the right things emphasized?]

          ### Consistency
          | Element | Issue | Recommendation |
          |---------|-------|----------------|
          | [Typography/spacing/color] | [Inconsistency] | [Fix] |

          ### Accessibility
          - **Color contrast**: [Pass/fail for key text]
          - **Touch targets**: [Adequate size?]
          - **Text readability**: [Font size, line height]

          ### What Works Well
          - [Positive observation 1]
          - [Positive observation 2]

          ### Priority Recommendations
          1. **[Most impactful change]** — [Why and how]
          2. **[Second priority]** — [Why and how]
          3. **[Third priority]** — [Why and how]
          ```

          ## If Connectors Available

          If **~~design tool** is connected:
          - Pull the design directly from Figma and inspect components, tokens, and layers
          - Compare against the existing design system for consistency

          If **~~user feedback** is connected:
          - Cross-reference design decisions with recent user feedback and support tickets

          ## Tips

          1. **Share the context** — "This is a checkout flow for a B2B SaaS" helps me give relevant feedback.
          2. **Specify your stage** — Early exploration gets different feedback than final polish.
          3. **Ask me to focus** — "Just look at the navigation" gives you more depth on one area.
