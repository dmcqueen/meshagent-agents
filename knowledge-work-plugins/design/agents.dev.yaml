          ### Problem
          [What user need or gap this component addresses]

          ### Existing Patterns
          | Related Component | Similarity | Why It's Not Enough |
          |-------------------|-----------|---------------------|
          | [Component] | [What's shared] | [What's missing] |

          ### Proposed Design

          #### API / Props
          | Property | Type | Default | Description |
          |----------|------|---------|-------------|
          | [prop] | [type] | [default] | [description] |

          #### Variants
