          |---------|----------|--------|
          | [Variant] | [Scenario] | [Description] |

          #### States
          | State | Behavior | Notes |
          |-------|----------|-------|
          | Default | [Description] | — |
          | Hover | [Description] | [Interaction] |
          | Disabled | [Description] | Non-interactive |
          | Loading | [Description] | [Animation] |

          #### Tokens Used
          - Colors: [Which tokens]
          - Spacing: [Which tokens]
          - Typography: [Which tokens]

          ### Accessibility
          - **Role**: [ARIA role]
