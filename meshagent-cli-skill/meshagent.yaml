version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: meshagent-cli-skill
  description: "A MeshAgent room agent for operating the MeshAgent CLI end to end. It loads the meshagent-cli-operator skill as its primary workflow and can inspect, create, update, deploy, and troubleshoot MeshAgent projects, rooms, services, and agent runtimes."
  annotations:
    meshagent.service.id: "meshagent.meshagent-cli-skill"

agents:
  - name: meshagent-cli-skill
    description: "A chat agent specialized in operating the MeshAgent CLI."
    annotations:
      meshagent.agent.type: "ChatBot"
      meshagent.chatbot.threading: "default-new"

container:
  image: meshagent/shell-codex:default
  command: /bin/bash /var/start.sh
  storage:
    room:
      - path: /data
        read_only: false
    files:
      - path: /var/start.sh
        text: |
          #!/bin/bash
          set -euo pipefail

          mkdir -p /data/skills
          mkdir -p /data/agents/meshagent-cli-skill

          if [ -d /skills ]; then
            cp -R -n /skills/* /data/skills/ 2>/dev/null || true
          fi

          chmod +x /data/skills/meshagent-cli-operator/scripts/refresh_cli_reference.sh 2>/dev/null || true
          /data/skills/meshagent-cli-operator/scripts/refresh_cli_reference.sh || true

          if [ ! -f /data/agents/meshagent-cli-skill/rules.txt ]; then
            cp /var/rules.txt /data/agents/meshagent-cli-skill/rules.txt
          fi

          exec /usr/bin/meshagent chatbot join \
            --room="${MESHAGENT_ROOM}" \
            --agent-name=meshagent-cli-skill \
            --threading-mode=default-new \
            --thread-dir=/data/agents/meshagent-cli-skill/threads \
            --room-rules=/data/agents/meshagent-cli-skill/rules.txt \
            --working-dir=/data \
            --require-shell \
            --require-apply-patch \
            --require-web-search \
            --require-web-fetch \
            --require-storage \
            --shell-tool-room-path=/:/data \
            --storage-tool-room-path=/:/data \
            --shell-image=meshagent/shell-codex:default \
            --delegate-shell-token \
            --skill-dir /data/skills/meshagent-cli-operator \
            --rule='Use the meshagent-cli-operator skill whenever the user is asking to inspect, create, update, deploy, or troubleshoot something with the MeshAgent CLI.' \
            --rule='The root of the filesystem that the user sees (the Room files) has been mounted in the /data folder. If the user is currently viewing a file, the file path is relative to /data. To write a file the user can see, you must write it inside /data and tell them the path relative to /data, not including the data folder.' \
            --rule='Prefer /usr/bin/meshagent when executing MeshAgent CLI commands inside this container.'

      - path: /var/rules.txt
        text: |
          You are a MeshAgent room agent running in meshagent/shell-codex:default.
          Use the meshagent-cli-operator skill for MeshAgent CLI work.
          Prefer /usr/bin/meshagent when running MeshAgent CLI commands.
          The Room files are mounted in /data. If you write a file for the user, write it under /data and report the path relative to /data.

      - path: /skills/meshagent-cli-operator/SKILL.md
        text: |
          ---
          name: meshagent-cli-operator
          description: Operate the MeshAgent CLI end to end. Use this skill whenever the user asks to authenticate, inspect, create, update, deploy, or troubleshoot anything with meshagent or meshagent-cli, including projects, api keys, secrets, webhooks, routes, mailboxes, scheduled tasks, rooms, room data, services, MCP bridges, ports, sessions, calls, tokens, or agent runtimes such as chatbot, worker, task-runner, mailbot, voicebot, process, codex, multi, and meeting-transcriber.
          ---
          
          # MeshAgent CLI Operator
          
          Use this skill for any task that should be completed with the MeshAgent CLI.
          
          ## Runtime assumptions
          
          This skill assumes it is running inside a MeshAgent room container based on `meshagent/shell-codex:default`.
          
          - The MeshAgent CLI is expected at `/usr/bin/meshagent`.
          - `meshagent` on `PATH` is an acceptable fallback.
          - The user-visible room filesystem is mounted at `/data`.
          - To create or modify files the user should see, write them under `/data` and report paths relative to `/data`.
          - Do not assume a repo-local virtualenv or checkout exists inside the container.
          - Do not install packages into `/data`.
          
          ## Quick start
          
          1. Resolve the CLI binary.
          2. Identify the narrowest command path that matches the request.
          3. If flags are uncertain, consult `references/command_groups.md`, then `references/meshagent_cli_help.md`, or run `meshagent <path> --help`.
          4. Prefer read-only inspection before mutation.
          5. After a change, verify the result with the corresponding read command.
          
          ## Resolve the CLI
          
          Prefer these paths in order:
          
          1. `/usr/bin/meshagent`
          2. `meshagent`
          
          If neither exists, stop and report that the MeshAgent CLI is unavailable.
          
          ## Command routing
          
          Start with `references/command_groups.md` to choose the right area:
          
          - auth and setup
          - project administration
          - service and deployment workflows
          - room lifecycle and room APIs
          - agent runtime orchestration
          - inspection and diagnostics
          
          Use `references/meshagent_cli_help.md` for the exact installed command tree and flags.
          
          ## Operating rules
          
          - Scope the target first: project, room, service, participant, route, secret, or agent.
          - Prefer the smallest command path that can complete the task.
          - Use `--help` on the exact subcommand before composing long invocations.
          - When executing commands in this runtime, prefer `/usr/bin/meshagent ...` so command examples match the container image.
          - Treat `/data` as the writable user-visible workspace. If a command writes files for the user, keep them under `/data`.
          - Do not expose secret values unless the user explicitly asks for them.
          - Treat delete and overwrite operations as destructive. Confirm the target and blast radius before executing them.
          - After create, update, deploy, or delete, run the appropriate verification command and summarize the resulting state.
          
          ## Bundled resources
          
          - `references/command_groups.md`: fast routing map for the CLI.
          - `references/meshagent_cli_help.md`: generated full CLI help for the installed MeshAgent version.
          - `scripts/refresh_cli_reference.sh`: maintainer utility to regenerate the help reference when the installed CLI changes. This is not required for normal in-room operation.

      - path: /skills/meshagent-cli-operator/references/command_groups.md
        text: |
          # MeshAgent CLI command groups
          
          Use this file to choose the narrowest MeshAgent CLI area before reading the full help reference.
          
          Room-runtime default: when executing commands inside `meshagent/shell-codex:default`, prefer `/usr/bin/meshagent ...` and write user-visible artifacts under `/data`.
          
          ## Auth and setup
          
          - `meshagent version`
          - `meshagent setup`
          - `meshagent auth ...`
          - `meshagent project ...`
          - `meshagent api-key ...`
          
          Use for login, active project selection, and API key management.
          
          ## Project administration
          
          - `meshagent secret ...`
          - `meshagent webhook ...`
          - `meshagent mailbox ...`
          - `meshagent route ...`
          - `meshagent scheduled-task ...`
          
          Use for project-scoped configuration and external integrations.
          
          ## Service and deployment workflows
          
          - `meshagent service ...`
          - `meshagent mcp ...`
          - `meshagent helper ...`
          - `meshagent webserver ...`
          - `meshagent codex ...`
          
          Use for service specs, templates, deployment, service discovery, web serving, and Codex-backed runtime helpers.
          
          ## Room lifecycle and room APIs
          
          - `meshagent rooms ...`
          - `meshagent room agent ...`
          - `meshagent room secret ...`
          - `meshagent room queue ...`
          - `meshagent room messaging ...`
          - `meshagent room storage ...`
          - `meshagent room service ...`
          - `meshagent room developer ...`
          - `meshagent room database ...`
          - `meshagent room memory ...`
          - `meshagent room container ...`
          - `meshagent room sync ...`
          - `meshagent port ...`
          
          Use when the task is clearly scoped to a room or to resources that live inside a room.
          
          ## Agent runtime orchestration
          
          - `meshagent chatbot ...`
          - `meshagent worker ...`
          - `meshagent task-runner ...`
          - `meshagent mailbot ...`
          - `meshagent voicebot ...`
          - `meshagent process ...`
          - `meshagent multi ...`
          - `meshagent meeting-transcriber ...`
          - `meshagent codex chatbot ...`
          - `meshagent codex task-runner ...`
          - `meshagent codex worker ...`
          
          Use for join, run, and deploy flows for prebuilt MeshAgent runtimes.
          
          ## Inspection and diagnostics
          
          - `meshagent session ...`
          - `meshagent token ...`
          - `meshagent call ...`
          - `meshagent rooms ...`
          - `meshagent room ...`
          - `meshagent service show`
          - `meshagent service list`
          
          Use for discovery, verification, and troubleshooting before making changes.
          
          ## Notes
          
          - `meshagent room ...` is the deepest public area. Use it for room-scoped agents, storage, messaging, services, database tables, memories, containers, and sync.
          - The generated help reference also captures hidden aliases and locally available internal namespaces, including `meshagent test` when that command is present in the installed CLI.
          - The help reference documents command names and flags. In this runtime, prefer `/usr/bin/meshagent` as the executable path.
          - If the installed CLI version changes, rerun `scripts/refresh_cli_reference.sh`.

      - path: /skills/meshagent-cli-operator/scripts/refresh_cli_reference.sh
        text: |
          #!/usr/bin/env bash
          
          set -euo pipefail
          
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          SKILL_DIR="$(cd "${SCRIPT_DIR}/.." && pwd)"
          OUTPUT_PATH="${SKILL_DIR}/references/meshagent_cli_help.md"
          
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="$(command -v python3)"
          elif command -v python >/dev/null 2>&1; then
            PYTHON_BIN="$(command -v python)"
          else
            echo "python or python3 is required to regenerate MeshAgent CLI help" >&2
            exit 1
          fi
          
          TMP_FILE="$(mktemp)"
          trap 'rm -f "${TMP_FILE}"' EXIT
          
          "${PYTHON_BIN}" -m typer meshagent.cli.cli utils docs --name meshagent \
            | sed 's/{/\\&#123;/g; s/}/\\&#125;/g' \
            > "${TMP_FILE}"
          
          {
            printf '%s\n' '# MeshAgent CLI Help' ''
            printf '%s\n' '_Generated from the installed MeshAgent CLI environment using `scripts/refresh_cli_reference.sh`._' ''
            cat "${TMP_FILE}"
          } > "${OUTPUT_PATH}"
          
          echo "Wrote ${OUTPUT_PATH}"

  environment:
    - name: MESHAGENT_TOKEN
      token:
        identity: meshagent-cli-skill
