          #!/usr/bin/env python3
          """Update compat.json, regenerate CLI help, and validate the meshagent-skills package."""
          
          from __future__ import annotations
          
          import argparse
          import json
          import subprocess
          import sys
          from pathlib import Path
          
          
          SKILLS_ROOT = Path(__file__).resolve().parents[1]
          DEFAULT_BIN = Path("meshagent")
          DEFAULT_COMPAT = SKILLS_ROOT / "compat.json"
          DEFAULT_SYNC_SCRIPT = (
              SKILLS_ROOT / "scripts" / "generate_meshagent_cli_help_reference.py"
          )
          DEFAULT_VALIDATE_SCRIPT = (
              SKILLS_ROOT / "scripts" / "validate_meshagent_skills_package.py"
          )
          DEFAULT_OUTPUT = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "meshagent_cli_help.md"
          )
          DEFAULT_DISPLAY_BIN = "meshagent"
          
          
          def log(message: str) -> None:
              print(f"[meshagent-skills] {message}")
          
          
          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(
                  description="Refresh meshagent-skills for the installed MeshAgent CLI."
              )
              parser.add_argument(
                  "--meshagent-bin",
                  default=str(DEFAULT_BIN),
                  help=f"Path to meshagent CLI. Default: {DEFAULT_BIN}",
              )
              parser.add_argument(
                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              parser.add_argument(
                  "--output",
                  default=str(DEFAULT_OUTPUT),
                  help=f"Path to meshagent_cli_help.md. Default: {DEFAULT_OUTPUT}",
              )
              parser.add_argument(
                  "--display-bin",
                  default=DEFAULT_DISPLAY_BIN,
                  help=f"Command label to render in console examples. Default: {DEFAULT_DISPLAY_BIN}",
              )
              parser.add_argument(
                  "--max-depth",
                  type=int,
                  default=1,
                  help="Maximum command depth to crawl from the root. Default: 1",
              )
              parser.add_argument(
                  "--timeout-seconds",
                  type=int,
                  default=2,
                  help="Per-command help timeout in seconds. Default: 2",
              )
              return parser.parse_args()
          
          
          def resolve_meshagent_bin(meshagent_bin: str) -> str:
              if "/" not in meshagent_bin:
                  return meshagent_bin
          
              meshagent_path = Path(meshagent_bin).resolve()
              if not meshagent_path.is_file():
                  raise FileNotFoundError(f"meshagent CLI not found: {meshagent_path}")
              return str(meshagent_path)
          
          
          def run_checked(cmd: list[str]) -> subprocess.CompletedProcess[str]:
              log("running: " + " ".join(cmd))
              completed = subprocess.run(cmd, capture_output=True, text=True)
              if completed.stdout:
                  sys.stdout.write(completed.stdout)
              if completed.returncode != 0:
                  if completed.stderr:
                      sys.stderr.write(completed.stderr)
                  raise subprocess.CalledProcessError(
                      completed.returncode,
                      cmd,
                      output=completed.stdout,
                      stderr=completed.stderr,
                  )
              if completed.stderr:
                  sys.stderr.write(completed.stderr)
              return completed
          
          
          def detect_cli_version(meshagent_bin: str) -> str:
              completed = run_checked([meshagent_bin, "version"])
              version = completed.stdout.strip()
              if not version:
                  raise ValueError("meshagent version returned an empty version string")
              return version
          
          
          def load_compat_version(path: Path) -> str | None:
              payload = json.loads(path.read_text(encoding="utf-8"))
              version = payload.get("meshagent_cli_version")
              return version.strip() if isinstance(version, str) and version.strip() else None
          
          
          def update_compat_json(path: Path, cli_version: str) -> bool:
              payload = json.loads(path.read_text(encoding="utf-8"))
              current_version = payload.get("meshagent_cli_version")
              if current_version == cli_version:
                  return False
              payload["meshagent_cli_version"] = cli_version
              path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
              return True
          
          
          def main() -> int:
              args = parse_args()
              compat_path = Path(args.compat_json).resolve()
              output_path = Path(args.output).resolve()
              sync_script = DEFAULT_SYNC_SCRIPT.resolve()
              validate_script = DEFAULT_VALIDATE_SCRIPT.resolve()
          
              try:
                  log("resolving meshagent binary")
                  meshagent_bin = resolve_meshagent_bin(args.meshagent_bin)
                  log(f"using meshagent binary: {meshagent_bin}")
          
                  log("detecting installed MeshAgent CLI version")
                  cli_version = detect_cli_version(meshagent_bin)
                  log(f"detected MeshAgent CLI version: {cli_version}")
          
                  current_compat_version = load_compat_version(compat_path)
                  if current_compat_version == cli_version:
                      log(
                          f"compat.json already matches installed CLI version: {current_compat_version}"
                      )
                  else:
                      log(f"updating compat.json: {compat_path}")
                      update_compat_json(compat_path, cli_version)
                      log("compat.json updated")
          
                  log(f"regenerating CLI help reference: {output_path}")
                  run_checked(
                      [
                          sys.executable,
                          str(sync_script),
                          "--meshagent-bin",
                          meshagent_bin,
                          "--compat-json",
                          str(compat_path),
                          "--output",
                          str(output_path),
                          "--display-bin",
                          args.display_bin,
                          "--max-depth",
                          str(args.max_depth),
                          "--timeout-seconds",
                          str(args.timeout_seconds),
                      ]
                  )
                  log("CLI help reference regenerated")
          
                  log("running meshagent-skills validator")
                  run_checked(
                      [
                          sys.executable,
                          str(validate_script),
                          "--meshagent-bin",
                          meshagent_bin,
                          "--compat-json",
                          str(compat_path),
                      ]
                  )
              except (FileNotFoundError, ValueError, subprocess.CalledProcessError) as exc:
                  if isinstance(exc, (FileNotFoundError, ValueError)):
                      print(str(exc), file=sys.stderr)
                  return 1
          
              log(f"updated meshagent-skills for MeshAgent CLI {cli_version}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

      - path: /meshagent-skills/scripts/validate_meshagent_skills_package.py
        text: |
          #!/usr/bin/env python3
          """Validate that the packaged meshagent-skills files stay in sync with the target CLI."""
          
          import argparse
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path
          
          
          SKILLS_ROOT = Path(__file__).resolve().parents[1]
          DEFAULT_BIN = Path("meshagent")
          DEFAULT_COMPAT = SKILLS_ROOT / "compat.json"
          DEFAULT_README = SKILLS_ROOT / "README.md"
          DEFAULT_PLUGIN = SKILLS_ROOT / ".claude-plugin" / "plugin.json"
          DEFAULT_SKILL = SKILLS_ROOT / "skills" / "meshagent-cli-operator" / "SKILL.md"
          DEFAULT_COMMAND_GROUPS = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "command_groups.md"
          )
          DEFAULT_HELP = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "meshagent_cli_help.md"
          )
          SKILLS_DIR = SKILLS_ROOT / "skills"
          SKILL_REFERENCE_PATH_PATTERN = re.compile(r"\.\./meshagent-[^/\s]+/SKILL\.md")
          FRONTMATTER_PATTERN = re.compile(r"^---\n(.*?)\n---", re.DOTALL)
          NAME_PATTERN = re.compile(r"^name:\s*(.+?)\s*$", re.MULTILINE)
          RELATIVE_RESOURCE_PATTERN = re.compile(
              r"(?P<path>(?:\.\./|references/)[A-Za-z0-9_./-]+\.(?:md|yaml|py))"
          )
          QUOTED_STRING_PATTERN = re.compile(r'^(?P<quote>["\'])(?P<value>.*)(?P=quote)$')
          WORKFLOW_METADATA_PATTERN = re.compile(r"^  workflow:\s*$", re.MULTILINE)
          WORKFLOW_SECTION_PATTERN = re.compile(r"^## Workflow accountability\s*$", re.MULTILINE)
          EXPECTED_PLUGIN_DESCRIPTION = (
              "MeshAgent operator skill pack for CLI routing, room operations, runtime "
              "debugging, queues, services, storage, databases, memory, scheduling, and "
              "room-hosted web workflows."
          )
          WORKFLOW_REFERENCE_PATH = "../_shared/references/workflow_accountability.md"
          
          
          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(
                  description="Validate meshagent-skills consistency."
              )
              parser.add_argument(
                  "--meshagent-bin",
                  default=str(DEFAULT_BIN),
                  help=f"Path to meshagent CLI. Default: {DEFAULT_BIN}",
              )
              parser.add_argument(
                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              return parser.parse_args()
          
          
          def load_text(path: Path) -> str:
              return path.read_text(encoding="utf-8")
          
          
          def discover_skill_files() -> dict[str, Path]:
              discovered: dict[str, Path] = {}
              for skill_md in sorted(SKILLS_DIR.glob("*/SKILL.md")):
                  if skill_md.parent.name == "_shared":
                      continue
                  text = load_text(skill_md)
                  frontmatter_match = FRONTMATTER_PATTERN.match(text)
                  if frontmatter_match is None:
                      raise ValueError(f"{skill_md} is missing YAML frontmatter")
                  name_match = NAME_PATTERN.search(frontmatter_match.group(1))
                  if name_match is None:
                      raise ValueError(f"{skill_md} is missing frontmatter name")
                  skill_name = name_match.group(1).strip().strip('"').strip("'")
                  if not skill_name:
                      raise ValueError(f"{skill_md} has an empty frontmatter name")
                  discovered[skill_name] = skill_md
              return discovered
          
          
          def parse_top_level_commands(help_text: str) -> set[str]:
              commands: set[str] = set()
              in_commands = False
              for line in help_text.splitlines():
                  if re.match(r"^╭─ Commands ", line):
                      in_commands = True
                      continue
                  if in_commands and line.startswith("╰"):
                      break
                  if not in_commands:
                      continue
                  stripped = line.strip()
                  if not stripped.startswith("│"):
                      continue
                  inner = stripped.strip("│").strip()
                  if not inner:
                      continue
                  commands.add(inner.split()[0])
              return commands
          
          
          def referenced_top_level_commands(command_groups_text: str) -> set[str]:
              refs: set[str] = set()
              for match in re.finditer(r"`meshagent ([a-z0-9-]+)", command_groups_text):
                  refs.add(match.group(1))
              return refs
          
          
          def parse_scalar_string(raw_value: str, field_name: str, source_path: Path) -> str:
              value = raw_value.strip()
              match = QUOTED_STRING_PATTERN.match(value)
              if match is not None:
                  return match.group("value")
              if value and not value.startswith(("[", "{")):
                  return value
              raise ValueError(f"{source_path} has an invalid string value for {field_name}")
          
          
          def parse_openai_interface(openai_path: Path) -> dict[str, str]:
              lines = openai_path.read_text(encoding="utf-8").splitlines()
              interface_started = False
              interface_fields: dict[str, str] = {}
          
              for line_number, line in enumerate(lines, start=1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  if not interface_started:
                      if line != "interface:":
                          raise ValueError(
                              f"{openai_path}:{line_number} must start with a top-level interface: mapping"
                          )
                      interface_started = True
                      continue
                  if not line.startswith("  "):
                      raise ValueError(
                          f"{openai_path}:{line_number} has unexpected top-level content outside interface"
                      )
                  if ":" not in stripped:
                      raise ValueError(
                          f"{openai_path}:{line_number} must define a key/value pair under interface"
                      )
                  key, raw_value = stripped.split(":", 1)
                  key = key.strip()
                  if key in interface_fields:
                      raise ValueError(
                          f"{openai_path}:{line_number} duplicates interface key {key}"
                      )
                  interface_fields[key] = parse_scalar_string(raw_value, key, openai_path)
          
              if not interface_started:
                  raise ValueError(f"{openai_path} is missing top-level interface:")
              return interface_fields
          
          
          def validate_openai_yaml(skill_name: str, skill_dir: Path, errors: list[str]) -> None:
              openai_path = skill_dir / "agents" / "openai.yaml"
              if not openai_path.is_file():
                  errors.append(f"{skill_name} is missing agents/openai.yaml")
                  return
          
              try:
                  interface_fields = parse_openai_interface(openai_path)
              except ValueError as exc:
                  errors.append(str(exc))
                  return
          
              required_fields = ("display_name", "short_description", "default_prompt")
              for field in required_fields:
                  value = interface_fields.get(field)
                  if not value:
                      errors.append(
                          f"{skill_name} agents/openai.yaml is missing interface.{field}"
                      )
          
              expected_prompt_token = f"${skill_name}"
              default_prompt = interface_fields.get("default_prompt", "")
              if expected_prompt_token not in default_prompt:
                  errors.append(
                      f"{skill_name} agents/openai.yaml default_prompt must mention {expected_prompt_token}"
                  )
          
          
          def validate_relative_resources(
              skill_name: str, skill_path: Path, skill_text: str, errors: list[str]
          ) -> None:
              for match in RELATIVE_RESOURCE_PATTERN.finditer(skill_text):
                  relative_path = match.group("path")
                  target_path = (skill_path.parent / relative_path).resolve()
                  if not target_path.is_file():
                      errors.append(
                          f"{skill_name} references missing packaged resource {relative_path}"
                      )
          
          
          def validate_workflow_contract(
              skill_name: str, skill_text: str, errors: list[str]
          ) -> None:
              frontmatter_match = FRONTMATTER_PATTERN.match(skill_text)
              if frontmatter_match is None:
                  errors.append(f"{skill_name} is missing YAML frontmatter")
                  return
          
              frontmatter_text = frontmatter_match.group(1)
              required_frontmatter_fields = (
                  "  workflow:",
                  "    can_be_owner:",
                  "    handoff_policy:",
                  "    completion_gates:",
                  "    evidence:",
              )
              if WORKFLOW_METADATA_PATTERN.search(frontmatter_text) is None:
                  errors.append(f"{skill_name} is missing metadata.workflow")
              for field in required_frontmatter_fields[1:]:
                  if field not in frontmatter_text:
                      errors.append(f"{skill_name} metadata.workflow is missing {field.strip()}")
          
              if WORKFLOW_SECTION_PATTERN.search(skill_text) is None:
                  errors.append(f"{skill_name} is missing a '## Workflow accountability' section")
              if WORKFLOW_REFERENCE_PATH not in skill_text:
                  errors.append(
                      f"{skill_name} does not reference the shared workflow accountability contract"
                  )
          
          
          def main() -> int:
              args = parse_args()
              meshagent_bin = args.meshagent_bin
              compat_path = Path(args.compat_json).resolve()
          
              if "/" in meshagent_bin:
                  meshagent_path = Path(meshagent_bin).resolve()
                  meshagent_bin = str(meshagent_path)
                  if not meshagent_path.is_file():
                      print(f"meshagent CLI not found: {meshagent_path}", file=sys.stderr)
                      return 1
          
              compat = json.loads(compat_path.read_text(encoding="utf-8"))
              expected_version = compat.get("meshagent_cli_version")
              if not isinstance(expected_version, str) or not expected_version.strip():
                  print("compat.json is missing meshagent_cli_version", file=sys.stderr)
                  return 1
              expected_version = expected_version.strip()
          
              version_proc = subprocess.run(
                  [meshagent_bin, "version"], capture_output=True, text=True
              )
              if version_proc.returncode != 0:
                  print(version_proc.stderr or version_proc.stdout, file=sys.stderr)
                  return 1
              actual_version = version_proc.stdout.strip()
          
              help_proc = subprocess.run(
                  [meshagent_bin, "--help"], capture_output=True, text=True
              )
              if help_proc.returncode != 0:
                  print(help_proc.stderr or help_proc.stdout, file=sys.stderr)
                  return 1
          
              top_level = parse_top_level_commands(help_proc.stdout)
              command_groups_text = load_text(DEFAULT_COMMAND_GROUPS)
              referenced = referenced_top_level_commands(command_groups_text)
              missing = sorted(cmd for cmd in referenced if cmd not in top_level)
          
              readme_text = load_text(DEFAULT_README)
              plugin_text = load_text(DEFAULT_PLUGIN)
              skill_text = load_text(DEFAULT_SKILL)
              help_text = load_text(DEFAULT_HELP)
              skill_files = discover_skill_files()
          
              errors: list[str] = []
              if actual_version != expected_version:
                  errors.append(
                      f"compat.json expects MeshAgent CLI {expected_version}, but installed version is {actual_version}"
                  )
              if "compat.json" not in readme_text:
                  errors.append("README.md does not reference compat.json")
              if "compat.json" not in skill_text:
                  errors.append("SKILL.md does not reference compat.json")
              if "compat.json" not in command_groups_text:
                  errors.append("command_groups.md does not reference compat.json")
              if expected_version not in help_text:
                  errors.append(
                      f"meshagent_cli_help.md does not mention MeshAgent CLI {expected_version}"
                  )
              if "$ meshagent --help" not in help_text:
                  errors.append(
                      "meshagent_cli_help.md should render console examples with `meshagent`"
                  )
              if "/.venv/bin/meshagent" in help_text:
                  errors.append(
                      "meshagent_cli_help.md should not embed repo-local meshagent paths"
                  )
              plugin = json.loads(plugin_text)
              plugin_description = plugin.get("description")
              if plugin_description != EXPECTED_PLUGIN_DESCRIPTION:
                  errors.append(
                      "plugin.json description does not match the expected package description"
                  )
              if missing:
                  errors.append(
                      "command_groups.md references commands not present in meshagent --help: "
                      + ", ".join(missing)
                  )
              if (
                  "Use `meshagent-webapp-builder` for websites, contact forms, `meshagent webserver ...`, or room-hosted web handlers."
                  not in command_groups_text
              ):
                  errors.append(
                      "command_groups.md is missing the required webapp-builder routing rule for websites and meshagent webserver work"
                  )
              if (
                  "Use `meshagent-webmaster` for explicit route management or public hostname exposure."
                  not in command_groups_text
              ):
                  errors.append(
                      "command_groups.md is missing the required webmaster routing rule for explicit route management"
                  )
              for skill_name, skill_path in skill_files.items():
                  current_skill_text = load_text(skill_path)
                  if SKILL_REFERENCE_PATH_PATTERN.search(current_skill_text):
                      errors.append(f"{skill_name} references another skill by relative path")
                  validate_openai_yaml(skill_name, skill_path.parent, errors)
                  validate_relative_resources(skill_name, skill_path, current_skill_text, errors)
                  validate_workflow_contract(skill_name, current_skill_text, errors)
          
              if errors:
                  for error in errors:
                      print(f"- {error}", file=sys.stderr)
                  return 1
          
              print(f"Validated meshagent-skills against MeshAgent CLI {expected_version}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

      - path: /meshagent-skills/skills/_shared/references/live_room_cli_context.md
        text: |
          # Live Room CLI Context
          
          Use these rules when a skill runs inside an existing MeshAgent room runtime or room shell.
          
          - Reuse the existing MeshAgent CLI session and room context before asking the user to log in again.
          - If `MESHAGENT_ROOM` is present, prefer room-scoped commands and pass `--room "${MESHAGENT_ROOM}"` when the command requires it.
          - If `MESHAGENT_ROOM` is already present, do not use room-listing commands as a prerequisite for room-scoped work.
          - If the user already named the room or the current runtime clearly implies the room, do not use broad project or room listing commands as a prerequisite for room-scoped work.
          - If authentication is uncertain, test a room-scoped read command first. Do not claim the CLI is unauthenticated until an actual MeshAgent command fails for that reason.
          - For room-scoped workflows, do not use `meshagent auth whoami`, `meshagent project list`, or unfiltered `meshagent rooms list` as the primary readiness test.
          - A `403` from a broad project-scoped or room-listing command does not by itself prove that a narrower room-scoped workflow is blocked. Retry with the narrowest relevant room-scoped read path first.
          - Good first probes are commands such as `meshagent room service list --room <ROOM_NAME>`, `meshagent room queue size --room <ROOM_NAME> --queue <QUEUE_NAME>`, or `meshagent room agent list-toolkits --room <ROOM_NAME>` depending on the workflow.
          - Prefer direct room-scoped commands such as `meshagent room service list` over generic toolkit invocation when the CLI already exposes the room surface directly.
          - Do not use `meshagent room agent invoke-tool --toolkit services --tool list --arguments '{}'` for ordinary service discovery when `meshagent room service list` already answers the question more directly.
          - Treat existing MeshAgent environment variables and active CLI session state as real runtime context to inspect and use.
          - Distinguish local authoring files from room-visible runtime files. Room-owned runtime data belongs under `/data`.
          - If the user asks to write or create a file in the room and does not provide a more specific room-visible path, default to the room storage root under `/data`, for example `/data/<filename>`.
          - Do not default room file writes to `.`, the current working directory, or other ad hoc paths when the request is clearly about a room-visible file.
          - For `meshagent webserver deploy`, local source files are uploaded from the current working directory, while `--website-path` is the room-storage destination.
          - Do not treat `/data/...` as the local source root for deployable website files unless the current working directory is already under `/data`.
          - Do not treat `/tmp` as the durable room workspace.
          - Do not use room file tools against `.` , `/`, or temporary/build paths such as `/tmp`. Use concrete room-visible paths under `/data`, or use shell commands when the task really needs a non-room-local path.

      - path: /meshagent-skills/skills/_shared/references/managed_hostname_rules.md
        text: |
          # Managed Hostname Rules
          
          Use these rules whenever a skill needs to choose, validate, or report a MeshAgent-managed public hostname.
          
          - If `MESHAGENT_API_URL` is present, derive the managed suffix from that API environment: use `*.meshagent.app` for `.com` environments and `*.meshagent.dev` for `.life` environments.
          - If `MESHAGENT_API_URL` is absent or does not clearly identify the environment, inspect an existing route in the current project or ask before inventing a managed public hostname.
          - Packaged help or example text that shows `.meshagent.app` is illustrative only. Do not copy that suffix blindly when the active runtime indicates a different environment.
          - Before running a deploy with `--domain` or reporting a managed public URL, verify that the chosen hostname suffix matches `MESHAGENT_API_URL`.
          - Treat a mismatched managed suffix as invalid, not as an acceptable variant. In a `.life` environment, do not deploy, return, or accept a managed hostname outside `.meshagent.dev`. In a `.com` environment, do not deploy, return, or accept a managed hostname outside `.meshagent.app`.
          - If a deploy command warns that the hostname suffix is wrong for the current environment, treat that deploy result as failed for public-hostname purposes and fix the hostname before reporting success.
          - If a candidate hostname collides, keep the same environment-specific suffix family and try additional candidates before asking the user to choose one.
          - If `meshagent webserver deploy --domain ...` fails because the hostname is already in use and a follow-up route read is forbidden, treat that hostname as unavailable and try a different candidate before reporting a generic permissions blocker.
          - Do not report a managed URL whose suffix contradicts the active API environment.

      - path: /meshagent-skills/skills/_shared/references/process_agent_design.md
        text: |
          # Process Agent Design
          
          Use this reference when the requested runtime is one shared-identity agent that should be reachable through more than one entry path, such as chat, mail, queue, or toolkit calls.
          
          ## Use process when
          
          - One agent should keep the same identity, rules, tools, memory, and thread model across several channels.
          - Queue work is just one entry path into that same agent rather than a dedicated background-only worker identity.
          - The requested design sounds like one agent that should handle chat, email, scheduled work, and/or toolkit calls together.
          
          ## Core model
          
          - Use `meshagent process` for shared-identity agent designs.
          - Use `meshagent process spec` before freehanding service YAML for that shape.
          - For new authored YAML that needs queue handling plus mail or other channels, treat `meshagent process` as the default runtime shape.
          - Assume current rooms are not legacy unless the user or observed room state proves otherwise.
          - Add channels explicitly with repeated `--channel` flags such as:
            - `--channel=chat`
            - `--channel=mail:<MAILBOX_ADDRESS>`
            - `--channel=queue:<QUEUE_NAME>`
            - `--channel=toolkit:<TOOLKIT_NAME>`
          - Use durable `--room-rules` or mounted rule files when the agent must keep stable behavior across those channels.
          
          ## Good design anchors
          
          - Treat `examples/cli/process-news-agent/meshagent.yaml` as the primary packaged example for a process agent with chat, mail, and queue channels.
          - Treat `meshagent-router/meshagent/router/templates/assistant.yaml` as the primary service-template example for a process room assistant.
          
          ## Queue-specific cautions
          
          - A queue channel such as `--channel=queue:<QUEUE_NAME>` is an entry path, not proof by itself that the runtime is the right consumer for the business workflow.
          - The scheduled task queue, queue channel, startup command, and surrounding runtime behavior must still line up.
          - For new authored YAML, a process queue channel is the default shape. Use a dedicated `meshagent worker` only when the user explicitly asked for that runtime shape.
          
          ## Scheduling guidance
          
          - For scheduled tasks targeting a process agent, make the scheduled payload match how the process agent was authored.
          - If the process agent uses durable workflow rules, prefer a prompt that tells it to run that established workflow.
          - Do not assume that queue wiring alone proves the process agent will perform the requested external action.

      - path: /meshagent-skills/skills/_shared/references/runtime_image_environment_rules.md
        text: |
          # Runtime Image Environment Rules
          
          Use these rules whenever a skill needs to choose a MeshAgent runtime image for a `Service` or `ServiceTemplate`.
          
          - If `MESHAGENT_API_URL` is present, derive the runtime image family from that environment before copying an example image.
          - For `.com` environments, the standard CLI runtime example image family is `us-central1-docker.pkg.dev/meshagent-public/images/cli:{SERVER_VERSION}-esgz`.
          - For `.life` environments, prefer the corresponding `.life` runtime image family instead of the production one, for example `us-central1-docker.pkg.dev/meshagent-life/meshagent-public/cli:{SERVER_VERSION}-esgz`.
          - Do not copy a docs example image blindly just because it appears in `meshagent-docs`. Most docs examples use the production image family as illustrative defaults.
          - If the environment is unclear, inspect an existing working room service or ask before inventing an image registry path.
          - When reusing or repairing an existing room workflow, prefer the same image family already used by healthy services in that room or project.
          - Keep the image family and the API environment aligned. Do not generate a `.life` room service that points at the production `meshagent-public/images/...` runtime image family unless you have explicit evidence that this environment expects it.
          - Generic images such as `meshagent/cli:default` or `meshagent/shell-codex:default` are separate defaults with their own behavior. Do not silently switch between those and the environment-specific registry-backed runtime images without a reason grounded in the workflow.

      - path: /meshagent-skills/skills/_shared/references/service_yaml_correctness.md
        text: |
          # Service YAML Correctness
          
          Use these rules whenever a skill authors or rewrites `Service` or `ServiceTemplate` YAML.
          
          - Prefer generated specs over handwritten YAML when the CLI already has a generator for the runtime shape you need. For new authored agent services, start from `meshagent process spec` first. Use `meshagent worker spec` or `meshagent mailbot spec` only when the user explicitly asked for those runtime shapes. Use `meshagent service spec` only when the agent-specific specs are not the right fit.
          - If you must hand-author YAML, start from the nearest working example or a rendered/generated spec. Do not invent a manifest structure from memory.
          - Treat the container `command` as code that must match the real CLI. Validate agent command flags against the packaged CLI help or the actual CLI source before treating the YAML as deployable.
          - Do not invent flags that the target command does not support. For example, `meshagent worker join` uses `--rule` and `--room-rules`; do not substitute unsupported flags such as `--prompt`.
          - Make the declared agent roles match the runtime command. If the manifest says it contains a `Worker`, the command must actually start a worker path. If it says it contains a `MailBot`, the command must start a mailbot path. Do not declare two roles and only start one of them.
          - For new shared-identity agents that need queue, chat, mail, or toolkit entry points on one runtime, use a `meshagent process` design with explicit channels instead of older combined-agent guidance.
          - For new authored queue-backed email services, use a process design by default even when the workflow could be expressed as separate Worker and MailBot services.
          - For scheduled email workflows, prefer these composition patterns in this order:
            - for new authored YAML, one `meshagent process` runtime with explicit `--channel=queue:...` and `--channel=mail:...` channels, durable rules, and one shared identity
            - only when the user explicitly asked for split runtimes, a dedicated MailBot publishes toolkit `email` using a real mailbox-backed sender identity, and a dedicated Worker consumes the scheduled job queue and uses toolkit `email`
          - For non-trivial scheduled email workflows, prefer durable queue-handling behavior over ad hoc inline prompting:
            - put the send logic in `--room-rules`, mounted rule files, or a startup-script-generated rules file
            - then make the scheduled payload trigger that already-defined workflow in the same style the queue consumer expects
          - Treat the `industry-report` nightly-report flow as the preferred design signal for non-trivial scheduled email jobs:
            - the queue-consuming runtime owns the email workflow in durable rule files
            - the scheduled payload is a prompt that tells that runtime to run the established workflow
            - the mail path only publishes or owns the sender identity; it is not the scheduled job consumer
          - For scheduled email workflows, reject these patterns as incorrect:
            - a standalone MailBot pointed at the scheduled job queue
            - a Worker with no explicit rule telling it to send the email
            - a MailBot with an invented mailbox-looking sender identity
          - Keep mailbox and job queues distinct unless the implementation clearly requires them to be the same. A MailBot queue should match the mailbox or inbound mail path; a Worker queue should match the scheduled job queue.
          - For new mailbox-backed MailBot setups, use this naming convention:
            - mailbox address = MailBot `--email-address`
            - mailbox queue = that same email address
            - MailBot queue = that same email address, either explicitly or by relying on the MailBot default
          - Do not override the mailbox queue or MailBot queue in new authored workflows.
          - If an existing room is already wired differently, treat that as an observed exception that must be verified explicitly before preserving it.
          - Do not reuse the scheduled Worker queue as the MailBot inbox queue for new scheduled email workflows unless you have explicit evidence that the mailbox routing was designed that way. Keep the mailbox/MailBot inbox path separate from the scheduled job queue by default.
          - Do not author new scheduled email YAML as separate MailBot and Worker services by default. Use that split shape only when the user explicitly asked for it.
          - Do not use invented sender identities such as `something@meshagent.local` for room email workflows. Use a real mailbox-backed address from the current project and room.
          - For managed MeshAgent mailbox-backed senders, prefer the environment-appropriate mailbox domain family:
            - `.life` environments: `@mail.meshagent.life`
            - production `.com` environments: `@mail.meshagent.com`
          - Treat `@meshagent.local` sender identities as invalid by default for outbound managed-mail workflows unless the current environment explicitly proves otherwise.
          - If the YAML embeds room rules files or startup scripts, make sure the files are actually mounted or written into the container before the command references them.
          - Match the scheduled payload shape to the queue consumer design:
            - if the queue consumer is prompt-driven, schedule a prompt that clearly instructs it to run the email workflow
            - if the queue consumer is structured-field-driven, schedule the exact fields its rules require
            - do not enqueue a structured payload if the runtime was only taught to react to prompt-style instructions, and do not enqueue a bare prompt if it only knows structured fields
          - For recurring or non-trivial scheduled email/report jobs, prefer a prompt that names the workflow to run from the queue consumer's durable rules rather than pushing the whole mail job into raw JSON fields.
          - Before deployment, run the narrowest validation path that matches the asset:
            - `meshagent service validate` for a concrete `Service`
            - `meshagent service validate-template` and `meshagent service render-template` for a `ServiceTemplate`
          - If validation fails, do not deploy and do not just rerun the same command blindly. Read the exact validation error, repair the YAML or template, and rerun validation. Repeat that fix-and-revalidate loop until validation passes or the remaining blocker is clearly external to the asset itself.
          - Before treating YAML as correct, verify all of these:
            - structural correctness: valid service or template shape
            - command correctness: every runtime flag is actually supported
            - role correctness: declared agent roles match the command that will run
            - wiring correctness: queue names, toolkit publication, mailbox identity, and mounted files all match the intended behavior

      - path: /meshagent-skills/skills/_shared/references/workflow_accountability.md
        text: |
          # Workflow Accountability
          
          Use this reference when the user asked for an end-to-end outcome that may require multiple skills.
          
          ## Core model
          
          Every workflow must have exactly one current workflow owner.
          
          - The workflow owner is the skill currently responsible for the user-visible outcome.
          - Supporting skills may execute part of the work, but they do not get to declare the overall workflow complete unless ownership is explicitly transferred.
          - Ownership may transfer to a narrower or more appropriate skill, but the transfer must be explicit in the reasoning and the new owner must continue tracking completion gates and evidence.
          
          ## Completion gates
          
          Do not say "done" until all relevant gates have passed.
          
          Minimum gates for any workflow:
          
          1. The mutation target or inspection target was identified correctly.
          2. The claimed state change or observed result was verified against real room/runtime state.
          3. The user-visible outcome was verified, or the exact blocker was identified.
          
          Skill-specific gates may add stricter requirements such as live runtime proof, queue dequeue proof, mailbox identity proof, HTTP smoke tests, or log evidence.
          
          ## Evidence rules
          
          The workflow owner must collect concrete evidence for each gate, such as:
          
          - exact commands or packaged references used
          - observed room state, service state, queue state, log lines, or runtime signals
          - user-visible outputs such as a live URL, delivered queue message, or confirmed mail-send result
          - if the workflow failed, the exact blocker instead of a generic "not working"
          
          ## Handoff rules
          
          - Handoffs transfer execution work, not accountability, unless ownership is explicitly transferred.
          - A supporting skill should return evidence, not a success claim for the whole workflow.
          - If the current owner cannot complete the workflow without another skill, it should call that handoff and then continue evaluating the remaining gates.
          
          ## Missing-input rules
          
          - If the workflow is blocked on specific user input, identify the exact missing input instead of asking a generic permission-to-continue question.
          - Do not ask the user for permission to create ordinary workflow prerequisites that the requested workflow clearly needs and the current skill is already allowed to create, such as a room mailbox for a mailbox-backed email workflow.
          - Treat room resources that can be safely provisioned as implementation work, not as user input, unless the user asked to control that choice directly.
          - If the user's original request is already an obvious end-to-end outcome such as "schedule a test email," do not stop at "I can set it up" or "reply yes and I'll proceed." Continue the ordinary prerequisite setup automatically unless a true missing input or hard blocker appears.
          - Ask for all clearly blocking user inputs together when possible rather than discovering them one at a time across multiple turns.
          - After the user confirms they want the workflow completed, continue the workflow unless a new concrete blocker appears.
          - Do not make the user restate the original goal just because a sub-step was incomplete or partially verified.
          
          ## Progressive disclosure rules
          
          - Start with the narrowest safe action or probe that could directly satisfy the user's request or prove the next blocker.
          - Separate checks that are required before acting from checks that are required before claiming success.
          - Do not front-load broad environment surveys, project-wide discovery, or admin-style checks when one narrow task-matching room or runtime action would answer the question faster.
          - Defer deeper preflights until the chosen execution path actually depends on that surface, the first narrow path fails, or the workflow is about to cross a mutation boundary that makes the extra check necessary.
          - For simple requests, prefer one direct task-matching action first and expand only if that action fails or reveals ambiguity.
          
          ## Preflight rules
          
          - If the workflow depends on a specific backend surface such as scheduled tasks, room services, mail delivery, or toolkit publication, preflight the required capability before presenting the workflow as end-to-end ready.
          - Do not read the preflight rule as "survey everything up front." Preflight only the surfaces that the current chosen path actually needs before the next risky or user-visible step.
          - For room-scoped workflows, preflight with the narrowest room-scoped command that matches the actual task before trying broader project-scoped discovery or admin-style checks.
          - Treat `403` responses as permission blockers, not as a cue to keep promising the blocked step later.
          - If a broad project-scoped probe returns `403`, do not declare the room-scoped workflow blocked until the narrower room-scoped probe also fails.
          - Treat unexpected `5xx` responses on required workflow surfaces as backend health blockers until a retry or narrower probe proves otherwise.
          - When a required backend surface is blocked, either stop before creating a half-complete workflow or clearly mark any continued setup as partial preparation only.
          
          ## Forbidden shortcuts
          
          - Do not treat object creation alone as end-to-end success.
          - Do not treat YAML generation alone as deployment success.
          - Do not treat queue size changes alone as business workflow success.
          - Do not treat a scheduled task record alone as proof that the future workflow will work.
          - Do not present a created route record, deploy result, or hostname string as the achieved public URL until DNS and the required live HTTP checks have passed.
          - If a public URL has not been verified yet, label it explicitly as an unverified candidate or partial preparation, not as the finished output.
          - Do not lead with "done", "deployed", "created route", or similar completion language when the public-site outcome is still blocked on DNS or live HTTP verification.
          - Do not use the room, server, or runtime timezone as a substitute for the requesting user's timezone when the workflow is about scheduling in the user's local time.
          - Do not anchor a relative scheduling request such as "one minute from now" to the start of a longer setup workflow when the user intent is relative to the actual task-creation moment.
          - Do not hand the user an unresolved truncation, noise, or parsing problem for a simple inspection task. Rerun the narrow command and return the exact result.
          - Do not leave an obviously required user input such as the recipient email unasked in a workflow whose purpose is to send a real email.
          - Do not wait until the final step to discover that a required backend surface such as scheduled-task create is blocked when a cheap preflight could have shown that earlier.
          - Do not use broad auth or project-listing failures as proof that a room-scoped workflow cannot proceed when a narrower room-scoped probe was available.
          - Do not use `meshagent auth whoami` as a prerequisite gatekeeper for a known-room workflow.
          - Do not pass arbitrary human-readable ids into workflow surfaces that are UUID-backed. If a skill has not proven the id format is accepted, omit the custom id rather than guessing.
          - Do not treat queue drain, service creation, or scheduled-task creation as proof that a requested email was actually delivered.
          - Do not assume that a scheduled task payload implicitly means "send an email" unless the payload explicitly maps to the Worker's email-sending rules.
          - Do not satisfy a user request for email by sending a room message, participant message, or broadcast unless the user explicitly asked for that communication medium instead of real email.
          - Do not stall a simple workflow by starting with broad project, room, or service surveys when one narrow task-matching action could have answered the request or revealed the blocker directly.
          - Do not turn an obvious end-to-end request into a two-step consent dance by asking the user to approve ordinary prerequisite setup that is already inside the requested workflow.
          - Do not stop at an internal actionable blocker such as a crashing service, wrong hostname suffix, missing toolkit publisher, or failed smoke test and ask "if you want, I'll keep going." Continue the normal fix path until the workflow is complete or a true external blocker remains.
          - Do not blindly retry one-time scheduled-task creation after an uncertain add result. First check whether the task was already created or whether an equivalent near-future task already exists for the same queue and payload.

      - path: /meshagent-skills/skills/meshagent-cli-operator/SKILL.md
        text: |
          ---
          name: meshagent-cli-operator
          description: Use the MeshAgent CLI. This skill is for choosing command paths, reading help output, composing non-interactive commands, and verifying results.
          metadata:
            short-description: Route and run MeshAgent CLI commands safely and non-interactively.
            references:
              bundled:
                - references/command_groups.md
                - references/meshagent_cli_help.md
                - ../_shared/references/live_room_cli_context.md
                - ../_shared/references/managed_hostname_rules.md
                - ../_shared/references/workflow_accountability.md
              resolved_targets:
                - live meshagent help output when bundled help is missing or stale
            related_skills:
              - skill: meshagent-workflow-orchestrator
                when: The user's goal is an end-to-end workflow that spans multiple specialized skills.
              - skill: meshagent-sdk-researcher
                when: The task depends on SDK or server source, not just CLI behavior.
              - skill: meshagent-participant-token-operator
                when: The task is specifically about participant token discovery, token env wiring, or token generation rather than general command routing.
              - skill: meshagent-webapp-builder
                when: A CLI deploy task also requires authoring or debugging the web app itself.
              - skill: meshagent-service-operator
                when: The main task is service lifecycle semantics rather than command routing.
            scope:
              owns:
                - command-family routing
                - safe non-interactive CLI composition
                - CLI-side verification patterns
              excludes:
                - SDK API design
                - app-specific implementation work
            workflow:
              can_be_owner: true
              handoff_policy: retain_accountability_until_owner_transfer
              completion_gates:
                - mutation_target_confirmed_when_relevant
                - observed_state_matches_claim
                - user_visible_result_verified_or_exact_blocker_reported
              evidence:
                - exact_commands_or_artifacts_used
                - observed_room_or_runtime_state
                - user_visible_result_or_exact_blocker
          ---
          
          # MeshAgent CLI Operator
          
          Use this skill when the task is primarily about running or explaining MeshAgent CLI commands.
          
          ## Quick start
          
          1. Resolve the `meshagent` binary from `PATH` or use the explicit binary path the user provides.
          2. Identify the narrowest command path that matches the request.
          3. Run or explain one task-matching command first when the path is already clear.
          4. If flags are uncertain, consult `references/command_groups.md`, then `references/meshagent_cli_help.md`. Only run live `meshagent <path> --help` when the packaged references are missing the needed subcommand detail or appear inconsistent with the observed CLI version.
          5. Prefer read-only inspection before mutation unless the user directly asked for the mutation and the target is already clear.
          6. Verify the result with the corresponding read command.
          
          ## Resolve the CLI
          
          - Prefer `meshagent` on `PATH`.
          - If the user gives an explicit MeshAgent binary path, use that path.
          - If no MeshAgent CLI binary is available, stop and report that clearly.
          
          ## Command routing
          
          - Start with `references/command_groups.md` to choose the correct command family.
          - Use `references/meshagent_cli_help.md` for exact command shapes and flags.
          - Use `../_shared/references/live_room_cli_context.md` for shared live-room CLI rules.
          - Use `../_shared/references/managed_hostname_rules.md` for shared managed-hostname selection and validation rules.
          - Prefer the packaged references over live `--help` in a live room to avoid noisy recursive help probing.
          - Prefer the smallest command path that can complete the task.
          - Prefer non-interactive commands over interactive flows.
          
          ## Related skills
          
          - `meshagent-workflow-orchestrator`: Use it when the user's goal spans multiple specialized skills and one owner should keep accountability.
          - `meshagent-sdk-researcher`: Use it when the answer depends on source-level behavior or examples rather than command shape.
          - `meshagent-participant-token-operator`: Use it when the question is about participant token source, injection, delegation, or minting rather than generic CLI routing.
          - `meshagent-webapp-builder`: Use it when a CLI deploy command is only one part of building or fixing a room website.
          - `meshagent-service-operator`: Use it when the task is primarily about service semantics, templates, or room service lifecycle.
          
          ## Live room execution
          
          - Apply `../_shared/references/live_room_cli_context.md` for room context reuse, `MESHAGENT_ROOM`, auth-first checks, durable workspace rules, and local-vs-room path handling.
          - Apply `../_shared/references/managed_hostname_rules.md` for `MESHAGENT_API_URL`-driven hostname suffix selection and collision handling.
          
          ## Operating rules
          
          - Do not invent the active project, active room, hostname, filesystem layout, or environment variables. Inspect them or ask when they matter.
          - Do not use live `meshagent ... --help` as a default discovery step in a live room when the packaged references already cover the command. Use live `--help` only as a fallback for missing or version-mismatched details.
          - Do not start with broad discovery when one exact task-matching command can answer or do the work directly.
          - For simple asks, prefer one narrow command first and defer neighboring environment checks until that command fails or the next mutation depends on them.
          - For room-scoped workflows, do not make `meshagent auth whoami`, `meshagent project list`, or unfiltered `meshagent rooms list` the gatekeeper commands that decide whether work is possible.
          - If the user already named the room or the runtime already implies the room, probe the narrowest room-scoped read command first and only escalate to broader project-scoped checks when the workflow really needs them.
          - If a broad project-scoped or room-listing command returns `403`, do not conclude that the narrower room-scoped workflow is blocked until the matching room-scoped read path also fails.
          - Before writing ad hoc SDK code for a room operation, check whether the CLI already exposes a generic toolkit path such as `meshagent room agent list-toolkits` or `meshagent room agent invoke-tool`.
          - When a first command returns noisy or truncated output for a simple inspection task, rerun the narrowest command and summarize the exact result instead of handing the truncation problem back to the user.
          - Prefer read commands before create, update, deploy, or delete.
          - Restate the exact mutation target before destructive changes.
          - Verify the resulting state after mutation.
          - For room website requests that ask for a live URL, do not stop at local file creation or `meshagent webserver check`. Either complete the deploy and return the public URL, or report the exact blocking command and error.
          - For room website requests, verify the live behavior of the deployed site itself, not just the deploy command result. At minimum, check that the public URL returns the expected status and content for the primary route.
          - For contact-form websites, test both a GET of the form page and representative POST submissions after deploy. Treat any live 500 as an application/runtime failure to diagnose before blaming room infrastructure.
          - When a deployed MeshAgent webserver returns 500, first suspect route-handler import/render/runtime errors before concluding that the room route or platform is broken.
          - For Python handlers that render inline HTML templates, do not use `str.format()` on raw HTML/CSS/regex-heavy strings unless every literal brace is escaped. Prefer a safer templating approach or pre-escaped placeholders.
          - Do not print secret values unless the user explicitly asks for them and the command returns them.
          - Distinguish "needed before acting" from "needed before claiming success." A narrow command can often run before the wider survey is necessary.
          
          ## Workflow accountability
          
          - This skill may own the workflow outcome when the user's goal is primarily within this skill's scope.
          - If another skill already owns the workflow, return command evidence and observed state to that owner instead of declaring the overall job complete.
          - If this skill hands off to another skill, keep accountability for the original goal until the handoff returns evidence or ownership is explicitly transferred.
          - Follow `../_shared/references/workflow_accountability.md` for owner selection, completion gates, evidence, and forbidden shortcuts.
          
          ## Bundled resources
          
          - `references/command_groups.md`: fast routing map for the CLI.
          - `references/meshagent_cli_help.md`: packaged CLI help reference for the MeshAgent CLI version recorded in `compat.json`.
          - `../_shared/references/live_room_cli_context.md`: shared live-room CLI context rules for room-scoped work.
          - `../_shared/references/managed_hostname_rules.md`: shared managed-hostname selection and validation rules.

