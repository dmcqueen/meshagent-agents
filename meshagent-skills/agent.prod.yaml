version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: meshagent-cli-skill
  description: "A MeshAgent room agent for operating the MeshAgent CLI end to end. It loads the meshagent-cli-operator skill for general CLI work, the meshagent-mail-operator skill for mail workflows, the meshagent-scheduling-operator skill for scheduled-task workflows, and the meshagent-webmaster-operator skill for websites and routes."
  annotations:
    meshagent.service.id: "meshagent.meshagent-cli-skill"

agents:
  - name: meshagent-cli-skill
    description: "A chat agent specialized in operating the MeshAgent CLI."
    annotations:
      meshagent.agent.type: "ChatBot"

container:
  image: meshagent/shell-codex:default
  command: /bin/bash /var/start.sh
  storage:
    room:
      - path: /data
        read_only: false
    files:
      - path: /var/start.sh
        text: |
          #!/bin/bash
          set -euo pipefail

          echo "[startup] Initializing meshagent-cli-skill..."
          mkdir -p /data/skills/meshagent-skills

          echo "[startup] Checking for /meshagent-skills directory..."
          if [ -d /meshagent-skills ]; then
            echo "[startup] Found /meshagent-skills, copying files..."
            ls -la /meshagent-skills | head -20
            cp -R -n /meshagent-skills/* /data/skills/meshagent-skills/ 2>/dev/null || true
            echo "[startup] Copy complete"
          else
            echo "[startup] WARNING: /meshagent-skills directory not found" >&2
            echo "[startup] Checking root directory contents:"
            ls -la / | grep -E "meshagent|skills" || true
          fi

          if [ -d /meshagent-skills/.claude-plugin ]; then
            mkdir -p /data/skills/meshagent-skills/.claude-plugin
            cp -R -n /meshagent-skills/.claude-plugin/* /data/skills/meshagent-skills/.claude-plugin/ 2>/dev/null || true
          fi

          echo "[startup] Verifying required skills..."
          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-cli-operator/SKILL.md ]; then
            echo "[startup] ERROR: Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-cli-operator/SKILL.md" >&2
            echo "[startup] Directory contents of /data/skills/meshagent-skills:"
            find /data/skills/meshagent-skills -type f | head -20 || true
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-mail-operator/SKILL.md ]; then
            echo "[startup] ERROR: Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-mail-operator/SKILL.md" >&2
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-scheduling-operator/SKILL.md ]; then
            echo "[startup] ERROR: Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-scheduling-operator/SKILL.md" >&2
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-webmaster-operator/SKILL.md ]; then
            echo "[startup] ERROR: Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-webmaster-operator/SKILL.md" >&2
            exit 1
          fi

          echo "[startup] All skills verified! Starting meshagent process..."
          echo "[startup] Room: ${MESHAGENT_ROOM:-unset}"
          echo "[startup] Project ID: ${MESHAGENT_PROJECT_ID:-will use default}"
          
          # Start meshagent process, optionally with project ID
          if [ -n "${MESHAGENT_PROJECT_ID:-}" ]; then
            exec /usr/bin/meshagent process join \
              --project-id="${MESHAGENT_PROJECT_ID}" \
              --room="${MESHAGENT_ROOM}" \
              --agent-name=meshagent-cli-skill \
              --channel chat \
              --working-dir=/data \
              --require-shell \
              --require-apply-patch \
              --require-web-search \
              --require-web-fetch \
              --require-storage \
              --shell-tool-room-path=/:/data \
              --storage-tool-room-path=/:/data \
              --shell-image=meshagent/shell-codex:default \
              --delegate-shell-token \
              --skill-dir /data/skills/meshagent-skills/skills \
              --rule='For MeshAgent CLI tasks, use the installed skills from the configured skill dir. Default to meshagent-cli-operator for general CLI work, use meshagent-mail-operator for mailbox, inbox, MailBot, or contact-form email workflows, use meshagent-scheduling-operator for scheduled-task workflows, and use meshagent-webmaster-operator for websites, webservers, routes, or public hostname workflows.'
          else
            exec /usr/bin/meshagent process join \
              --room="${MESHAGENT_ROOM}" \
              --agent-name=meshagent-cli-skill \
              --channel chat \
              --working-dir=/data \
              --require-shell \
              --require-apply-patch \
              --require-web-search \
              --require-web-fetch \
              --require-storage \
              --shell-tool-room-path=/:/data \
              --storage-tool-room-path=/:/data \
              --shell-image=meshagent/shell-codex:default \
              --delegate-shell-token \
              --skill-dir /data/skills/meshagent-skills/skills \
              --rule='For MeshAgent CLI tasks, use the installed skills from the configured skill dir. Default to meshagent-cli-operator for general CLI work, use meshagent-mail-operator for mailbox, inbox, MailBot, or contact-form email workflows, use meshagent-scheduling-operator for scheduled-task workflows, and use meshagent-webmaster-operator for websites, webservers, routes, or public hostname workflows.'
          fi

      - path: /meshagent-skills/.claude-plugin/plugin.json
        text: |
          {
            "name": "meshagent-skills",
            "version": "0.1.0",
            "description": "MeshAgent CLI skill pack with commands and skills for room, mail, scheduling, and website workflows.",
            "author": {
              "name": "Codex"
            }
          }

      - path: /meshagent-skills/README.md
        text: |
          # MeshAgent Skills
          
          This package is a vendorable MeshAgent skill pack.
          
          It combines:
          
          - slash-command entrypoints under `commands/`
          - focused `SKILL.md` files under `skills/`
          - packaged CLI reference material under `skills/meshagent-cli-operator/references/`
          - maintenance scripts under `scripts/`
          - a machine-readable compatibility target in `compat.json`
          - plugin metadata in `.claude-plugin/plugin.json`
          
          The package is designed so a live room agent can answer MeshAgent workflow requests with package-local instructions and references instead of relying on ad hoc prompting.
          
          ## Current system
          
          The package currently has one general CLI skill plus five specialized skills:
          
          - `skills/meshagent-cli-operator/`
            General MeshAgent CLI routing, command composition, live-room execution rules, and packaged CLI reference material.
          - `skills/meshagent-sdk-researcher/`
            Guidance for using the preloaded `/src/meshagent-sdk` checkout, docs, examples, and source to answer SDK/API questions.
          - `skills/meshagent-webapp-builder/`
            Build and verify deployable room-hosted web applications, including contact forms, public handlers, and mailbox-backed outbound email workflows.
          - `skills/meshagent-mail-operator/`
            Mailbox administration, room SMTP behavior, inbound queue inspection, and mailbox-backed sender guidance for room-hosted mail workflows.
          - `skills/meshagent-scheduling-operator/`
            `meshagent scheduled-task ...` workflows and queue-delivery verification.
          - `skills/meshagent-webmaster-operator/`
            Route/domain mapping behavior and the static webserver YAML reference example.
          
          The package also exposes command entrypoints for common request classes:
          
          - `commands/meshagent.md`
            General MeshAgent CLI entrypoint.
          - `commands/meshagent-room.md`
            Room lifecycle and room-scoped operations.
          - `commands/meshagent-service.md`
            Services, deploys, MCP, helpers, and webserver-adjacent work.
          - `commands/meshagent-project.md`
            Project-scoped administration such as routes, mailboxes, and scheduled tasks.
          - `commands/meshagent-agent.md`
            Agent runtime orchestration such as chatbot, worker, mailbot, and process runtimes.
          - `commands/meshagent-inspect.md`
            Read-only inspection and diagnostics.
          
          ## File inventory
          
          Current files in this package:
          
          - `README.md`
            Package overview and maintenance notes.
          - `compat.json`
            Target MeshAgent CLI version for the packaged references and validation.
          - `.claude-plugin/plugin.json`
            Plugin metadata for the packaged skill pack.
          - `commands/meshagent.md`
            General MeshAgent CLI entrypoint.
          - `commands/meshagent-room.md`
            Room-scoped command entrypoint.
          - `commands/meshagent-service.md`
            Service, deploy, MCP, and webserver-adjacent entrypoint.
          - `commands/meshagent-project.md`
            Project-scoped administration entrypoint.
          - `commands/meshagent-agent.md`
            Agent runtime orchestration entrypoint.
          - `commands/meshagent-inspect.md`
            Read-only inspection and diagnostics entrypoint.
          - `scripts/refresh_meshagent_skills_package.py`
            One-command updater for `compat.json`, packaged CLI help, and validation.
          - `scripts/generate_meshagent_cli_help_reference.py`
            CLI help reference generator.
          - `scripts/validate_meshagent_skills_package.py`
            Package validator.
          - `skills/meshagent-cli-operator/SKILL.md`
            Core CLI execution and command-routing skill.
          - `skills/meshagent-cli-operator/references/command_groups.md`
            Curated command-family routing reference.
          - `skills/meshagent-cli-operator/references/meshagent_cli_help.md`
            Generated recursive CLI help reference.
          - `skills/meshagent-sdk-researcher/SKILL.md`
            SDK/docs/example lookup skill for the preloaded `/src/meshagent-sdk` checkout.
          - `skills/meshagent-webapp-builder/SKILL.md`
            Deployable room webapp build, verification, and contact-form workflow skill.
          - `skills/meshagent-mail-operator/SKILL.md`
            Mailbox, SMTP, queue, and room-hosted outbound mail workflow skill.
          - `skills/meshagent-scheduling-operator/SKILL.md`
            Scheduled-task and queue-delivery skill.
          - `skills/meshagent-webmaster-operator/SKILL.md`
            Route/domain mapping and static webserver reference skill.
          
          ## Packaged references
          
          - `compat.json`
            The machine-readable target MeshAgent CLI version for this package.
          - `skills/meshagent-cli-operator/references/meshagent_cli_help.md`
            Generated recursive `meshagent --help` capture for the CLI version in `compat.json`.
          - `skills/meshagent-cli-operator/references/command_groups.md`
            Curated command-family routing guidance layered on top of the raw help reference.
          
          These references are part of the package contract. The skills are expected to use them rather than inventing command shapes.
          
          ## Live room assumptions
          
          The current skills assume the following when they are installed into a live room runtime:
          
          - room-scoped work should prefer the existing MeshAgent CLI session before asking for auth again
          - `MESHAGENT_ROOM` identifies the current room when a command needs `--room`
          - `MESHAGENT_API_URL` can be used to derive the managed public hostname family for routes and published sites
          - room-owned runtime artifacts should live under `/data`
          - deployable `meshagent webserver` source trees should live under the current working directory for that runtime, with `--website-path` used as the room-storage destination
          - website tasks are only complete after a live HTTP smoke test, not merely after file generation or deploy success
          - the MeshAgent SDK checkout is preloaded at `/src/meshagent-sdk` for SDK/docs lookup
          
          These are package-level conventions enforced by the current skill text. They are intentionally documented here because the skills depend on them for live-room behavior.
          
          ## Skill package rules
          
          The current validator enforces these package rules:
          
          - the packaged CLI version in `compat.json` must match the installed CLI used for validation
          - generated help must mention that exact CLI version
          - command-group references must stay aligned with `meshagent --help`
          - skills must not reference sibling skills by name
          - skills must not reference sibling `SKILL.md` files by relative path
          - specialized skills must include the package-local CLI reference pointers unless they are explicitly exempt
          
          ## Scripts
          
          - `scripts/refresh_meshagent_skills_package.py`
            User-facing wrapper. Detects the installed MeshAgent CLI version from `<meshagent-bin> version`, writes that version into `compat.json`, regenerates the packaged CLI help reference, and runs the validator.
          - `scripts/generate_meshagent_cli_help_reference.py`
            Regenerates `skills/meshagent-cli-operator/references/meshagent_cli_help.md` by recursively capturing `meshagent --help`. This script reads the version label from `compat.json`; it does not update `compat.json`.
          - `scripts/validate_meshagent_skills_package.py`
            Validates package consistency against the installed CLI and the current skill-package rules.
          
          ## Update workflow
          
          Recommended one-command flow:
          
          ```bash
          python3 scripts/refresh_meshagent_skills_package.py --meshagent-bin <meshagent>
          ```
          
          Manual equivalent:
          
          1. Install or locate the target MeshAgent CLI binary.
          2. Run `<meshagent> version` and write that exact version into `compat.json`.
          3. Run `python3 scripts/generate_meshagent_cli_help_reference.py --meshagent-bin <meshagent>`.
          4. Review `skills/meshagent-cli-operator/references/command_groups.md` if command-family routing needs adjustment for the new CLI behavior.
          5. Run `python3 scripts/validate_meshagent_skills_package.py --meshagent-bin <meshagent>`.

      - path: /meshagent-skills/commands/meshagent-agent.md
        text: |
          ---
          description: Join, run, or deploy MeshAgent agent runtimes including chatbot, worker, task-runner, mailbot, voicebot, process, codex, multi, and meeting-transcriber.
          argument-hint: "<agent runtime task>"
          ---
          
          # /meshagent-agent
          
          Use this command for agent runtime orchestration.
          
          ## Primary command groups
          
          - `meshagent chatbot ...`
          - `meshagent worker ...`
          - `meshagent task-runner ...`
          - `meshagent mailbot ...`
          - `meshagent voicebot ...`
          - `meshagent process ...`
          - `meshagent codex ...`
          - `meshagent multi ...`
          - `meshagent meeting-transcriber ...`
          
          ## Operating rules
          
          1. Identify the target room and runtime type first.
          2. Use the packaged CLI references first when composing join or deploy invocations. Only use live `--help` on the exact runtime command if the packaged help is missing the needed detail or appears stale for the installed CLI.
          3. Reuse existing flags, rules files, skill dirs, and environment wiring when modifying an existing agent command.
          4. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for contact forms, room-hosted web apps, and web handler implementation.
          5. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for mailbox-linked delivery flows or inbox-toolkit work.
          6. For contact-form deployments, do not stop after the site is reachable if live submission still fails to send mail.
          7. For webserver-backed deployments, do not stop after deploy until the live route has been smoke-tested.

      - path: /meshagent-skills/commands/meshagent-inspect.md
        text: |
          ---
          description: Inspect MeshAgent state, sessions, calls, tokens, versions, and other diagnostics without changing resources.
          argument-hint: "<inspection or troubleshooting task>"
          ---
          
          # /meshagent-inspect
          
          Use this command for non-destructive MeshAgent inspection and troubleshooting.
          
          ## Primary command groups
          
          - `meshagent version`
          - `meshagent auth whoami`
          - `meshagent session ...`
          - `meshagent token ...`
          - `meshagent call ...`
          - `meshagent rooms ...`
          - `meshagent room ...`
          - `meshagent service show`
          - `meshagent service list`
          - `meshagent port ...`
          
          ## Operating rules
          
          1. Prefer read-only commands first.
          2. If the request escalates from inspection to mutation, switch to the more specific command file or keep following the skill.
          3. Include the exact command path you used in the final summary.

      - path: /meshagent-skills/commands/meshagent-project.md
        text: |
          ---
          description: Project-scoped MeshAgent administration for auth, projects, api keys, secrets, webhooks, routes, mailboxes, and scheduled tasks.
          argument-hint: "<project admin task>"
          ---
          
          # /meshagent-project
          
          Use this command when the request is primarily about project-level administration.
          
          ## Primary command groups
          
          - `meshagent setup`
          - `meshagent auth ...`
          - `meshagent project ...`
          - `meshagent api-key ...`
          - `meshagent secret ...`
          - `meshagent webhook ...`
          - `meshagent mailbox ...`
          - `meshagent route ...`
          - `meshagent scheduled-task ...`
          
          ## Operating rules
          
          1. Confirm the active project before making changes.
          2. Never print secret values unless the user explicitly asks for them and the command returns them.
          3. For create or update operations, restate the exact target resource first.
          4. Verify changes with a read command immediately afterward.
          5. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for mailbox provisioning tied to room inbox or MailBot workflows.
          6. Use [SKILL.md](../skills/meshagent-scheduling-operator/SKILL.md) for scheduled-task operations.
          7. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for route management or public hostname work backing room websites.

      - path: /meshagent-skills/commands/meshagent-room.md
        text: |
          ---
          description: Room lifecycle and room API operations in MeshAgent, including agents, storage, messaging, containers, services, database, memory, and sync.
          argument-hint: "<room task>"
          ---
          
          # /meshagent-room
          
          Use this command when the request targets a room or something running inside a room.
          
          ## Primary command groups
          
          - `meshagent rooms ...`
          - `meshagent room agent ...`
          - `meshagent room secret ...`
          - `meshagent room queue ...`
          - `meshagent room messaging ...`
          - `meshagent room storage ...`
          - `meshagent room service ...`
          - `meshagent room developer ...`
          - `meshagent room database ...`
          - `meshagent room memory ...`
          - `meshagent room container ...`
          - `meshagent room sync ...`
          - `meshagent port ...`
          
          ## Operating rules
          
          1. Resolve the room name first.
          2. Inspect current room state before changing it.
          3. Use the room-scoped command instead of the project-scoped equivalent when the request is clearly about a single room.
          4. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for room websites, contact forms, webserver deploys, or public site exposure tied to this room.

      - path: /meshagent-skills/commands/meshagent-service.md
        text: |
          ---
          description: Service and deployment workflows in MeshAgent, including service specs, templates, MCP bridges, helper services, and webservers.
          argument-hint: "<service or deployment task>"
          ---
          
          # /meshagent-service
          
          Use this command for MeshAgent service lifecycle and service-adjacent runtime operations.
          
          ## Primary command groups
          
          - `meshagent service ...`
          - `meshagent mcp ...`
          - `meshagent helper ...`
          - `meshagent webserver ...`
          - `meshagent codex ...`
          
          ## Operating rules
          
          1. Inspect or validate specs before create or update when possible.
          2. Prefer `validate`, `render-template`, `show`, or `list` before destructive or state-changing commands.
          3. After deploy or update, verify the resulting service state and surface any follow-up steps.
          4. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for websites, contact forms, `meshagent webserver ...`, and room-hosted webapp deployment.
          5. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for explicit route/domain administration or public hostname diagnostics.

      - path: /meshagent-skills/commands/meshagent.md
        text: |
          ---
          description: General MeshAgent CLI operator. Route a request to the right meshagent subcommand and execute it safely.
          argument-hint: "<goal, room, service, project, or meshagent command>"
          ---
          
          # /meshagent
          
          Use this command for any request that involves the MeshAgent CLI.
          
          ## Workflow
          
          1. Start with [SKILL.md](../skills/meshagent-cli-operator/SKILL.md).
          2. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for websites, contact forms, web handlers, and room-hosted webapp deployment.
          3. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for email delivery, mailboxes, inbox evidence, or MailBot toolkits.
          4. Use [SKILL.md](../skills/meshagent-scheduling-operator/SKILL.md) for scheduled tasks, cron-based dispatch, or queue scheduling.
          5. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for explicit route or domain administration and public hostname diagnostics.
          6. Pick the narrowest MeshAgent command path that fits the request.
          7. If flags or subcommands are unclear, check [meshagent_cli_help.md](../skills/meshagent-cli-operator/references/meshagent_cli_help.md) first. Only run live `meshagent <path> --help` when the packaged reference is missing the needed detail or appears stale for the installed CLI.
          8. Prefer inspection before mutation.
          9. After any change, verify with the corresponding `show`, `list`, or read command.
          10. For contact-form website requests, do not treat a live site with failing outbound email as complete. Follow the mailbox-backed sender workflow before replying unless an actual permission blocker stops it.
          11. For website requests, require at least one live HTTP smoke test after deploy before replying with success.
          
          ## Coverage
          
          This command is the generic entrypoint for:
          - auth and setup
          - projects, api keys, secrets, routes, webhooks, mailboxes, and scheduled tasks
          - rooms, room APIs, ports, sessions, calls, and participant tokens
          - services, MCP bridges, webservers, and helper services
          - chatbot, worker, task-runner, mailbot, voicebot, process, codex, multi, and meeting-transcriber flows

      - path: /meshagent-skills/compat.json
        text: |
          {
            "meshagent_cli_version": "0.31.4"
          }

      - path: /meshagent-skills/scripts/generate_meshagent_cli_help_reference.py
        text: |
          #!/usr/bin/env python3
          """Generate the packaged MeshAgent CLI help reference from an installed meshagent binary."""
          
          import argparse
          import json
          import re
          import subprocess
          import sys
          from collections import deque
          from pathlib import Path
          
          
          SKILLS_ROOT = Path(__file__).resolve().parents[1]
          DEFAULT_BIN = Path("meshagent")
          DEFAULT_COMPAT = SKILLS_ROOT / "compat.json"
          DEFAULT_OUTPUT = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "meshagent_cli_help.md"
          )
          DEFAULT_DISPLAY_BIN = "meshagent"
          
          
          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(
                  description="Generate the packaged MeshAgent CLI help reference."
              )
              parser.add_argument(
                  "--meshagent-bin",
                  default=str(DEFAULT_BIN),
                  help=f"Path to meshagent CLI. Default: {DEFAULT_BIN}",
              )
              parser.add_argument(
                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              parser.add_argument(
                  "--output",
                  default=str(DEFAULT_OUTPUT),
                  help=f"Path to meshagent_cli_help.md. Default: {DEFAULT_OUTPUT}",
              )
              parser.add_argument(
                  "--display-bin",
                  default=DEFAULT_DISPLAY_BIN,
                  help=f"Command label to render in console examples. Default: {DEFAULT_DISPLAY_BIN}",
              )
              parser.add_argument(
                  "--max-depth",
                  type=int,
                  default=1,
                  help="Maximum command depth to crawl from the root. Default: 1",
              )
              parser.add_argument(
                  "--timeout-seconds",
                  type=int,
                  default=2,
                  help="Per-command help timeout in seconds. Default: 2",
              )
              return parser.parse_args()
          
          
          def load_cli_version(path: Path) -> str:
              payload = json.loads(path.read_text(encoding="utf-8"))
              version = payload.get("meshagent_cli_version")
              if not isinstance(version, str) or not version.strip():
                  raise ValueError(f"meshagent_cli_version missing in {path}")
              return version.strip()
          
          
          def parse_commands(help_text: str) -> list[str]:
              commands: list[str] = []
              in_commands = False
              for line in help_text.splitlines():
                  if re.match(r"^╭─ Commands ", line):
                      in_commands = True
                      continue
                  if in_commands and line.startswith("╰"):
                      in_commands = False
                      continue
                  if not in_commands:
                      continue
                  stripped = line.strip()
                  if not stripped.startswith("│"):
                      continue
                  inner = stripped.strip("│").strip()
                  if not inner:
                      continue
                  name = inner.split()[0]
                  if name.startswith("-"):
                      continue
                  commands.append(name)
              return commands
          
          
          def run_help(
              meshagent_bin: str, path: list[str], timeout_seconds: int
          ) -> tuple[int, str, bool]:
              cmd = [meshagent_bin] + path + ["--help"]
              try:
                  completed = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=timeout_seconds,
                  )
                  output = completed.stdout if completed.stdout else completed.stderr
                  return completed.returncode, output.rstrip(), False
              except subprocess.TimeoutExpired as exc:
                  output = (exc.stdout or "") or (exc.stderr or "")
                  if isinstance(output, bytes):
                      output = output.decode("utf-8", errors="replace")
                  output = output.rstrip()
                  return 124, output, True
          
          
          def heading_for(path: list[str]) -> str:
              level = 2 + max(len(path) - 1, 0)
              hashes = "#" * min(level, 6)
              command = "meshagent" if not path else "meshagent " + " ".join(path)
              return f"{hashes} `{command}`"
          
          
          def render_reference(
              meshagent_bin: str,
              display_bin: str,
              cli_version: str,
              max_depth: int,
              timeout_seconds: int,
          ) -> str:
              queue: deque[list[str]] = deque([[]])
              seen: set[tuple[str, ...]] = set()
              sections: list[str] = []
          
              while queue:
                  path = queue.popleft()
                  key = tuple(path)
                  if key in seen:
                      continue
                  seen.add(key)
          
                  returncode, output, timed_out = run_help(meshagent_bin, path, timeout_seconds)
                  sections.append(heading_for(path))
                  sections.append("")
                  cmd = "$ " + " ".join([display_bin] + path + ["--help"])
                  sections.append("```console")
                  sections.append(cmd)
                  if output:
                      sections.append(output)
                  sections.append("```")
                  if returncode != 0:
                      status = "timed out" if timed_out else f"exited with code {returncode}"
                      sections.append("")
                      sections.append(f"_Help capture {status} for this command path._")
                      sections.append("")
                      continue
                  sections.append("")
          
                  if len(path) >= max_depth:
                      continue
          
                  for command in parse_commands(output):
                      queue.append(path + [command])
          
              lines = [
                  "# MeshAgent CLI Help",
                  "",
                  f"_Packaged CLI help reference for MeshAgent CLI `{cli_version}`._",
                  "",
                  (
                      f"_Generated from the installed `meshagent` binary with recursive `--help` capture "
                      f"up to depth {max_depth} and timeout {timeout_seconds}s per command._"
                  ),
                  "",
              ]
              lines.extend(sections)
              return "\n".join(lines).rstrip() + "\n"
          
          
          def main() -> int:
              args = parse_args()
              compat_path = Path(args.compat_json).resolve()
              output_path = Path(args.output).resolve()
              meshagent_bin = args.meshagent_bin
          
              if "/" in meshagent_bin:
                  meshagent_path = Path(meshagent_bin).resolve()
                  meshagent_bin = str(meshagent_path)
                  if not meshagent_path.is_file():
                      print(f"meshagent CLI not found: {meshagent_path}", file=sys.stderr)
                      return 1
          
              cli_version = load_cli_version(compat_path)
              rendered = render_reference(
                  meshagent_bin=meshagent_bin,
                  display_bin=args.display_bin,
                  cli_version=cli_version,
                  max_depth=args.max_depth,
                  timeout_seconds=args.timeout_seconds,
              )
              output_path.write_text(rendered, encoding="utf-8")
              print(f"Wrote {output_path}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

