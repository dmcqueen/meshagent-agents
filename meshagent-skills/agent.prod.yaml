version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: meshagent-cli-skill
  description: "A MeshAgent room agent for operating the MeshAgent CLI end to end. It loads the meshagent-cli-operator skill for general CLI work, the meshagent-mail-operator skill for mail workflows, the meshagent-scheduling-operator skill for scheduled-task workflows, and the meshagent-webmaster-operator skill for websites and routes."
  annotations:
    meshagent.service.id: "meshagent.meshagent-cli-skill"

agents:
  - name: meshagent-cli-skill
    description: "A chat agent specialized in operating the MeshAgent CLI."
    annotations:
      meshagent.agent.type: "ChatBot"

container:
  image: meshagent/shell-codex:default
  command: /bin/bash /var/start.sh
  storage:
    room:
      - path: /data
        read_only: false
    files:
      - path: /var/start.sh
        text: |
          #!/bin/bash
          set -euo pipefail

          mkdir -p /data/skills/meshagent-skills

          if [ -d /meshagent-skills ]; then
            cp -R -n /meshagent-skills/* /data/skills/meshagent-skills/ 2>/dev/null || true
          fi

          if [ -d /meshagent-skills/.claude-plugin ]; then
            mkdir -p /data/skills/meshagent-skills/.claude-plugin
            cp -R -n /meshagent-skills/.claude-plugin/* /data/skills/meshagent-skills/.claude-plugin/ 2>/dev/null || true
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-cli-operator/SKILL.md ]; then
            echo "Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-cli-operator/SKILL.md" >&2
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-mail-operator/SKILL.md ]; then
            echo "Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-mail-operator/SKILL.md" >&2
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-scheduling-operator/SKILL.md ]; then
            echo "Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-scheduling-operator/SKILL.md" >&2
            exit 1
          fi

          if [ ! -f /data/skills/meshagent-skills/skills/meshagent-webmaster-operator/SKILL.md ]; then
            echo "Installed skill not found at /data/skills/meshagent-skills/skills/meshagent-webmaster-operator/SKILL.md" >&2
            exit 1
          fi

          exec /usr/bin/meshagent process join \
            --room="${MESHAGENT_ROOM}" \
            --agent-name=meshagent-cli-skill \
            --channel chat \
            --working-dir=/data \
            --require-shell \
            --require-apply-patch \
            --require-web-search \
            --require-web-fetch \
            --require-storage \
            --shell-tool-room-path=/:/data \
            --storage-tool-room-path=/:/data \
            --shell-image=meshagent/shell-codex:default \
            --delegate-shell-token \
            --skill-dir /data/skills/meshagent-skills/skills \
            --rule='For MeshAgent CLI tasks, use the installed skills from the configured skill dir. Default to meshagent-cli-operator for general CLI work, use meshagent-mail-operator for mailbox, inbox, MailBot, or contact-form email workflows, use meshagent-scheduling-operator for scheduled-task workflows, and use meshagent-webmaster-operator for websites, webservers, routes, or public hostname workflows.'

      - path: /meshagent-skills/.claude-plugin/plugin.json
        text: |
          {
            "name": "meshagent-skills",
            "version": "0.1.0",
            "description": "MeshAgent CLI skill pack with commands and skills for room, mail, scheduling, and website workflows.",
            "author": {
              "name": "Codex"
            }
          }

      - path: /meshagent-skills/README.md
        text: |
          # MeshAgent Skills
          
          This package contains MeshAgent CLI commands and skills for room operations, mail workflows, scheduled tasks, and website deployment.
          
          ## Package layout
          
          - `commands/`
            Slash-command entrypoints for MeshAgent CLI requests.
          - `skills/meshagent-cli-operator/`
            General room-scoped MeshAgent CLI operations and the shared room runtime contract for this package.
          - `skills/meshagent-mail-operator/`
            Mailbox, MailBot, inbox evidence, and contact-form email workflows.
          - `skills/meshagent-scheduling-operator/`
            `meshagent scheduled-task ...` workflows tied to a room or clearly scoped project workflow.
          - `skills/meshagent-webmaster-operator/`
            `meshagent webserver ...`, `meshagent route ...`, and public website deployment workflows.
          
          ## Review Notes
          
          - The machine-readable compatibility source is `compat.json`.
          - The packaged CLI references are anchored to the MeshAgent CLI version recorded in `compat.json`.
          - The shared room runtime assumptions for these skills are defined in `skills/meshagent-cli-operator/SKILL.md`.
          - The generated CLI reference lives at `skills/meshagent-cli-operator/references/meshagent_cli_help.md`.
          - The package-local maintenance entrypoints live under `scripts/` so the CLI reference can be regenerated and validated from any repository that vendors this package.
          - User-visible files created by these skills should live under `/data` when running inside the room container.
          
          ## Update Workflow
          
          1. Install the target MeshAgent CLI version.
          2. Update `compat.json`.
          3. Run `python3 scripts/sync_meshagent_cli_reference.py --meshagent-bin <meshagent>` to regenerate `skills/meshagent-cli-operator/references/meshagent_cli_help.md` from the installed CLI.
          4. Review `skills/meshagent-cli-operator/references/command_groups.md` against `meshagent --help`.
          5. Run `python3 scripts/validate_meshagent_skills.py --meshagent-bin <meshagent>`.
          
          ## Command Map
          
          - `commands/meshagent.md`
            General entrypoint for MeshAgent CLI work.
          - `commands/meshagent-room.md`
            Room lifecycle and room-scoped operations.
          - `commands/meshagent-service.md`
            Service specs, deploys, MCP, helpers, and webserver-adjacent work.
          - `commands/meshagent-project.md`
            Project-scoped administration such as routes, mailboxes, and scheduled tasks.
          - `commands/meshagent-agent.md`
            Agent runtime orchestration such as chatbot, worker, mailbot, process, and related runtimes.
          - `commands/meshagent-inspect.md`
            Read-only inspection and diagnostics.

      - path: /meshagent-skills/commands/meshagent-agent.md
        text: |
          ---
          description: Join, run, or deploy MeshAgent agent runtimes including chatbot, worker, task-runner, mailbot, voicebot, process, codex, multi, and meeting-transcriber.
          argument-hint: "<agent runtime task>"
          ---
          
          # /meshagent-agent
          
          Use this command for agent runtime orchestration.
          
          ## Primary command groups
          
          - `meshagent chatbot ...`
          - `meshagent worker ...`
          - `meshagent task-runner ...`
          - `meshagent mailbot ...`
          - `meshagent voicebot ...`
          - `meshagent process ...`
          - `meshagent codex ...`
          - `meshagent multi ...`
          - `meshagent meeting-transcriber ...`
          
          ## Operating rules
          
          1. Identify the target room and runtime type first.
          2. Use `--help` on the exact runtime command before composing long join or deploy invocations.
          3. Reuse existing flags, rules files, skill dirs, and environment wiring when modifying an existing agent command.
          4. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for MailBot-backed contact forms, mailbox-linked delivery flows, or inbox-toolkit work.

      - path: /meshagent-skills/commands/meshagent-inspect.md
        text: |
          ---
          description: Inspect MeshAgent state, sessions, calls, tokens, versions, and other diagnostics without changing resources.
          argument-hint: "<inspection or troubleshooting task>"
          ---
          
          # /meshagent-inspect
          
          Use this command for non-destructive MeshAgent inspection and troubleshooting.
          
          ## Primary command groups
          
          - `meshagent version`
          - `meshagent auth whoami`
          - `meshagent session ...`
          - `meshagent token ...`
          - `meshagent call ...`
          - `meshagent rooms ...`
          - `meshagent room ...`
          - `meshagent service show`
          - `meshagent service list`
          - `meshagent port ...`
          
          ## Operating rules
          
          1. Prefer read-only commands first.
          2. If the request escalates from inspection to mutation, switch to the more specific command file or keep following the skill.
          3. Include the exact command path you used in the final summary.

      - path: /meshagent-skills/commands/meshagent-project.md
        text: |
          ---
          description: Project-scoped MeshAgent administration for auth, projects, api keys, secrets, webhooks, routes, mailboxes, and scheduled tasks.
          argument-hint: "<project admin task>"
          ---
          
          # /meshagent-project
          
          Use this command when the request is primarily about project-level administration.
          
          ## Primary command groups
          
          - `meshagent setup`
          - `meshagent auth ...`
          - `meshagent project ...`
          - `meshagent api-key ...`
          - `meshagent secret ...`
          - `meshagent webhook ...`
          - `meshagent mailbox ...`
          - `meshagent route ...`
          - `meshagent scheduled-task ...`
          
          ## Operating rules
          
          1. Confirm the active project before making changes.
          2. Never print secret values unless the user explicitly asks for them and the command returns them.
          3. For create or update operations, restate the exact target resource first.
          4. Verify changes with a read command immediately afterward.
          5. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for mailbox provisioning tied to room inbox or MailBot workflows.
          6. Use [SKILL.md](../skills/meshagent-scheduling-operator/SKILL.md) for scheduled-task operations.
          7. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for route management or public hostname work backing room websites.

      - path: /meshagent-skills/commands/meshagent-room.md
        text: |
          ---
          description: Room lifecycle and room API operations in MeshAgent, including agents, storage, messaging, containers, services, database, memory, and sync.
          argument-hint: "<room task>"
          ---
          
          # /meshagent-room
          
          Use this command when the request targets a room or something running inside a room.
          
          ## Primary command groups
          
          - `meshagent rooms ...`
          - `meshagent room agent ...`
          - `meshagent room secret ...`
          - `meshagent room queue ...`
          - `meshagent room messaging ...`
          - `meshagent room storage ...`
          - `meshagent room service ...`
          - `meshagent room developer ...`
          - `meshagent room database ...`
          - `meshagent room memory ...`
          - `meshagent room container ...`
          - `meshagent room sync ...`
          - `meshagent port ...`
          
          ## Operating rules
          
          1. Resolve the room name first.
          2. Inspect current room state before changing it.
          3. Use the room-scoped command instead of the project-scoped equivalent when the request is clearly about a single room.
          4. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for room websites, webserver deploys, or public site exposure tied to this room.

      - path: /meshagent-skills/commands/meshagent-service.md
        text: |
          ---
          description: Service and deployment workflows in MeshAgent, including service specs, templates, MCP bridges, helper services, and webservers.
          argument-hint: "<service or deployment task>"
          ---
          
          # /meshagent-service
          
          Use this command for MeshAgent service lifecycle and service-adjacent runtime operations.
          
          ## Primary command groups
          
          - `meshagent service ...`
          - `meshagent mcp ...`
          - `meshagent helper ...`
          - `meshagent webserver ...`
          - `meshagent codex ...`
          
          ## Operating rules
          
          1. Inspect or validate specs before create or update when possible.
          2. Prefer `validate`, `render-template`, `show`, or `list` before destructive or state-changing commands.
          3. After deploy or update, verify the resulting service state and surface any follow-up steps.
          4. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for websites, `meshagent webserver ...`, public URL delivery, or route-backed site exposure.

      - path: /meshagent-skills/commands/meshagent.md
        text: |
          ---
          description: General MeshAgent CLI operator. Route a request to the right meshagent subcommand and execute it safely.
          argument-hint: "<goal, room, service, project, or meshagent command>"
          ---
          
          # /meshagent
          
          Use this command for any request that involves the MeshAgent CLI.
          
          ## Workflow
          
          1. Start with [SKILL.md](../skills/meshagent-cli-operator/SKILL.md).
          2. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for contact forms, email delivery, mailboxes, inbox evidence, or MailBot toolkits.
          3. Use [SKILL.md](../skills/meshagent-scheduling-operator/SKILL.md) for scheduled tasks, cron-based dispatch, or queue scheduling.
          4. Use [SKILL.md](../skills/meshagent-webmaster-operator/SKILL.md) for websites, webservers, routes, domains, or public URL exposure.
          5. Pick the narrowest MeshAgent command path that fits the request.
          6. If flags or subcommands are unclear, check [meshagent_cli_help.md](../skills/meshagent-cli-operator/references/meshagent_cli_help.md) or run `meshagent <path> --help`.
          7. Prefer inspection before mutation.
          8. After any change, verify with the corresponding `show`, `list`, or read command.
          
          ## Coverage
          
          This command is the generic entrypoint for:
          - auth and setup
          - projects, api keys, secrets, routes, webhooks, mailboxes, and scheduled tasks
          - rooms, room APIs, ports, sessions, calls, and participant tokens
          - services, MCP bridges, webservers, and helper services
          - chatbot, worker, task-runner, mailbot, voicebot, process, codex, multi, and meeting-transcriber flows

      - path: /meshagent-skills/compat.json
        text: |
          {
            "meshagent_cli_version": "0.31.3"
          }

      - path: /meshagent-skills/scripts/sync_meshagent_cli_reference.py
        text: |
          #!/usr/bin/env python3
          """Regenerate the packaged MeshAgent CLI help reference from an installed meshagent binary."""
          
          import argparse
          import json
          import re
          import subprocess
          import sys
          from collections import deque
          from pathlib import Path
          
          
          SKILLS_ROOT = Path(__file__).resolve().parents[1]
          DEFAULT_BIN = Path("meshagent")
          DEFAULT_COMPAT = SKILLS_ROOT / "compat.json"
          DEFAULT_OUTPUT = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "meshagent_cli_help.md"
          )
          DEFAULT_DISPLAY_BIN = "meshagent"
          
          
          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(
                  description="Generate the packaged MeshAgent CLI help reference."
              )
              parser.add_argument(
                  "--meshagent-bin",
                  default=str(DEFAULT_BIN),
                  help=f"Path to meshagent CLI. Default: {DEFAULT_BIN}",
              )
              parser.add_argument(
                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              parser.add_argument(
                  "--output",
                  default=str(DEFAULT_OUTPUT),
                  help=f"Path to meshagent_cli_help.md. Default: {DEFAULT_OUTPUT}",
              )
              parser.add_argument(
                  "--display-bin",
                  default=DEFAULT_DISPLAY_BIN,
                  help=f"Command label to render in console examples. Default: {DEFAULT_DISPLAY_BIN}",
              )
              parser.add_argument(
                  "--max-depth",
                  type=int,
                  default=1,
                  help="Maximum command depth to crawl from the root. Default: 1",
              )
              parser.add_argument(
                  "--timeout-seconds",
                  type=int,
                  default=2,
                  help="Per-command help timeout in seconds. Default: 2",
              )
              return parser.parse_args()
          
          
          def load_cli_version(path: Path) -> str:
              payload = json.loads(path.read_text(encoding="utf-8"))
              version = payload.get("meshagent_cli_version")
              if not isinstance(version, str) or not version.strip():
                  raise ValueError(f"meshagent_cli_version missing in {path}")
              return version.strip()
          
          
          def parse_commands(help_text: str) -> list[str]:
              commands: list[str] = []
              in_commands = False
              for line in help_text.splitlines():
                  if re.match(r"^╭─ Commands ", line):
                      in_commands = True
                      continue
                  if in_commands and line.startswith("╰"):
                      in_commands = False
                      continue
                  if not in_commands:
                      continue
                  stripped = line.strip()
                  if not stripped.startswith("│"):
                      continue
                  inner = stripped.strip("│").strip()
                  if not inner:
                      continue
                  name = inner.split()[0]
                  if name.startswith("-"):
                      continue
                  commands.append(name)
              return commands
          
          
          def run_help(
              meshagent_bin: str, path: list[str], timeout_seconds: int
          ) -> tuple[int, str, bool]:
              cmd = [meshagent_bin] + path + ["--help"]
              try:
                  completed = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=timeout_seconds,
                  )
                  output = completed.stdout if completed.stdout else completed.stderr
                  return completed.returncode, output.rstrip(), False
              except subprocess.TimeoutExpired as exc:
                  output = (exc.stdout or "") or (exc.stderr or "")
                  if isinstance(output, bytes):
                      output = output.decode("utf-8", errors="replace")
                  output = output.rstrip()
                  return 124, output, True
          
          
          def heading_for(path: list[str]) -> str:
              level = 2 + max(len(path) - 1, 0)
              hashes = "#" * min(level, 6)
              command = "meshagent" if not path else "meshagent " + " ".join(path)
              return f"{hashes} `{command}`"
          
          
          def render_reference(
              meshagent_bin: str,
              display_bin: str,
              cli_version: str,
              max_depth: int,
              timeout_seconds: int,
          ) -> str:
              queue: deque[list[str]] = deque([[]])
              seen: set[tuple[str, ...]] = set()
              sections: list[str] = []
          
              while queue:
                  path = queue.popleft()
                  key = tuple(path)
                  if key in seen:
                      continue
                  seen.add(key)
          
                  returncode, output, timed_out = run_help(meshagent_bin, path, timeout_seconds)
                  sections.append(heading_for(path))
                  sections.append("")
                  cmd = "$ " + " ".join([display_bin] + path + ["--help"])
                  sections.append("```console")
                  sections.append(cmd)
                  if output:
                      sections.append(output)
                  sections.append("```")
                  if returncode != 0:
                      status = "timed out" if timed_out else f"exited with code {returncode}"
                      sections.append("")
                      sections.append(f"_Help capture {status} for this command path._")
                      sections.append("")
                      continue
                  sections.append("")
          
                  if len(path) >= max_depth:
                      continue
          
                  for command in parse_commands(output):
                      queue.append(path + [command])
          
              lines = [
                  "# MeshAgent CLI Help",
                  "",
                  f"_Packaged CLI help reference for MeshAgent CLI `{cli_version}`._",
                  "",
                  (
                      f"_Generated from the installed `meshagent` binary with recursive `--help` capture "
                      f"up to depth {max_depth} and timeout {timeout_seconds}s per command._"
                  ),
                  "",
              ]
              lines.extend(sections)
              return "\n".join(lines).rstrip() + "\n"
          
          
          def main() -> int:
              args = parse_args()
              compat_path = Path(args.compat_json).resolve()
              output_path = Path(args.output).resolve()
              meshagent_bin = args.meshagent_bin
          
              if "/" in meshagent_bin:
                  meshagent_path = Path(meshagent_bin).resolve()
                  meshagent_bin = str(meshagent_path)
                  if not meshagent_path.is_file():
                      print(f"meshagent CLI not found: {meshagent_path}", file=sys.stderr)
                      return 1
          
              cli_version = load_cli_version(compat_path)
              rendered = render_reference(
                  meshagent_bin=meshagent_bin,
                  display_bin=args.display_bin,
                  cli_version=cli_version,
                  max_depth=args.max_depth,
                  timeout_seconds=args.timeout_seconds,
              )
              output_path.write_text(rendered, encoding="utf-8")
              print(f"Wrote {output_path}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

      - path: /meshagent-skills/scripts/validate_meshagent_skills.py
        text: |
          #!/usr/bin/env python3
          """Validate that the packaged meshagent-skills files stay in sync with the target CLI."""
          
          import argparse
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path
          
          
          SKILLS_ROOT = Path(__file__).resolve().parents[1]
          DEFAULT_BIN = Path("meshagent")
          DEFAULT_COMPAT = SKILLS_ROOT / "compat.json"
          DEFAULT_README = SKILLS_ROOT / "README.md"
          DEFAULT_PLUGIN = SKILLS_ROOT / ".claude-plugin" / "plugin.json"
          DEFAULT_SKILL = SKILLS_ROOT / "skills" / "meshagent-cli-operator" / "SKILL.md"
          DEFAULT_COMMAND_GROUPS = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "command_groups.md"
          )
          DEFAULT_HELP = (
              SKILLS_ROOT
              / "skills"
              / "meshagent-cli-operator"
              / "references"
              / "meshagent_cli_help.md"
          )
          SPECIALIZED_SKILLS = {
              "meshagent-mail-operator": SKILLS_ROOT
              / "skills"
              / "meshagent-mail-operator"
              / "SKILL.md",
              "meshagent-scheduling-operator": SKILLS_ROOT
              / "skills"
              / "meshagent-scheduling-operator"
              / "SKILL.md",
              "meshagent-webmaster-operator": SKILLS_ROOT
              / "skills"
              / "meshagent-webmaster-operator"
              / "SKILL.md",
          }
          SHARED_RUNTIME_LINE = (
              "Use the room runtime defined in `../meshagent-cli-operator/SKILL.md`."
          )
          SHARED_RUNTIME_DUPLICATES = (
              "The MeshAgent CLI is expected at `/usr/bin/meshagent`",
              "The current room is `MESHAGENT_ROOM`.",
              "The writable user-visible workspace is `/data`.",
              "The default public MeshAgent domain in this environment is `meshagent.app`.",
          )
          
          
          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(
                  description="Validate meshagent-skills consistency."
              )
              parser.add_argument(
                  "--meshagent-bin",
                  default=str(DEFAULT_BIN),
                  help=f"Path to meshagent CLI. Default: {DEFAULT_BIN}",
              )
              parser.add_argument(
                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              return parser.parse_args()
          
          
          def load_text(path: Path) -> str:
              return path.read_text(encoding="utf-8")
          
          
          def parse_top_level_commands(help_text: str) -> set[str]:
              commands: set[str] = set()
              in_commands = False
              for line in help_text.splitlines():
                  if re.match(r"^╭─ Commands ", line):
                      in_commands = True
                      continue
                  if in_commands and line.startswith("╰"):
                      break
                  if not in_commands:
                      continue
                  stripped = line.strip()
                  if not stripped.startswith("│"):
                      continue
                  inner = stripped.strip("│").strip()
                  if not inner:
                      continue
                  commands.add(inner.split()[0])
              return commands
          
          
          def referenced_top_level_commands(command_groups_text: str) -> set[str]:
              refs: set[str] = set()
              for match in re.finditer(r"`meshagent ([a-z0-9-]+)", command_groups_text):
                  refs.add(match.group(1))
              return refs
          
          
          def main() -> int:
              args = parse_args()
              meshagent_bin = args.meshagent_bin
              compat_path = Path(args.compat_json).resolve()
          
              if "/" in meshagent_bin:
                  meshagent_path = Path(meshagent_bin).resolve()
                  meshagent_bin = str(meshagent_path)
                  if not meshagent_path.is_file():
                      print(f"meshagent CLI not found: {meshagent_path}", file=sys.stderr)
                      return 1
          
              compat = json.loads(compat_path.read_text(encoding="utf-8"))
              expected_version = compat.get("meshagent_cli_version")
              if not isinstance(expected_version, str) or not expected_version.strip():
                  print("compat.json is missing meshagent_cli_version", file=sys.stderr)
                  return 1
              expected_version = expected_version.strip()
          
              version_proc = subprocess.run(
                  [meshagent_bin, "version"], capture_output=True, text=True
              )
              if version_proc.returncode != 0:
                  print(version_proc.stderr or version_proc.stdout, file=sys.stderr)
                  return 1
              actual_version = version_proc.stdout.strip()
          
              help_proc = subprocess.run(
                  [meshagent_bin, "--help"], capture_output=True, text=True
              )
              if help_proc.returncode != 0:
                  print(help_proc.stderr or help_proc.stdout, file=sys.stderr)
                  return 1
          
              top_level = parse_top_level_commands(help_proc.stdout)
              command_groups_text = load_text(DEFAULT_COMMAND_GROUPS)
              referenced = referenced_top_level_commands(command_groups_text)
              missing = sorted(cmd for cmd in referenced if cmd not in top_level)
          
              readme_text = load_text(DEFAULT_README)
              plugin_text = load_text(DEFAULT_PLUGIN)
              skill_text = load_text(DEFAULT_SKILL)
              help_text = load_text(DEFAULT_HELP)
          
              errors: list[str] = []
              if actual_version != expected_version:
                  errors.append(
                      f"compat.json expects MeshAgent CLI {expected_version}, but installed version is {actual_version}"
                  )
              if "compat.json" not in readme_text:
                  errors.append("README.md does not reference compat.json")
              if "compat.json" not in skill_text:
                  errors.append("SKILL.md does not reference compat.json")
              if "compat.json" not in command_groups_text:
                  errors.append("command_groups.md does not reference compat.json")
              if expected_version not in help_text:
                  errors.append(
                      f"meshagent_cli_help.md does not mention MeshAgent CLI {expected_version}"
                  )
              if "$ meshagent --help" not in help_text:
                  errors.append(
                      "meshagent_cli_help.md should render console examples with `meshagent`"
                  )
              if "/.venv/bin/meshagent" in help_text:
                  errors.append(
                      "meshagent_cli_help.md should not embed repo-local meshagent paths"
                  )
              if "MeshAgent CLI skill pack" not in plugin_text:
                  errors.append(
                      "plugin.json description does not match the expected package label"
                  )
              if missing:
                  errors.append(
                      "command_groups.md references commands not present in meshagent --help: "
                      + ", ".join(missing)
                  )
              for skill_name, skill_path in SPECIALIZED_SKILLS.items():
                  specialized_text = load_text(skill_path)
                  if SHARED_RUNTIME_LINE not in specialized_text:
                      errors.append(f"{skill_name} does not use the shared runtime reference")
                  for duplicate_line in SHARED_RUNTIME_DUPLICATES:
                      if duplicate_line in specialized_text:
                          errors.append(
                              f"{skill_name} duplicates shared runtime detail: {duplicate_line}"
                          )
          
              if errors:
                  for error in errors:
                      print(f"- {error}", file=sys.stderr)
                  return 1
          
              print(f"Validated meshagent-skills against MeshAgent CLI {expected_version}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

      - path: /meshagent-skills/skills/meshagent-cli-operator/SKILL.md
        text: |
          ---
          name: meshagent-cli-operator
          description: Operate the MeshAgent CLI primarily at room scope. Use this skill for inspecting, updating, deploying, and troubleshooting the current room, its storage, its services, and room-scoped MeshAgent runtimes. Do not use this skill for meshagent auth or meshagent setup workflows.
          ---
          
          # MeshAgent CLI Operator
          
          Use this skill for any task that should be completed with the MeshAgent CLI.
          
          ## Runtime assumptions
          
          This skill assumes it is running inside a MeshAgent room container based on `meshagent/shell-codex:default`.
          
          - The MeshAgent CLI is expected at `/usr/bin/meshagent`.
          - `meshagent` on `PATH` is an acceptable fallback.
          - `MESHAGENT_TOKEN` may be present for room-scoped MeshAgent access and delegated shell execution.
          - The current room is the value of `MESHAGENT_ROOM`.
          - The default public MeshAgent domain in this environment is `meshagent.app`.
          - The user-visible room filesystem is mounted at `/data`.
          - To create or modify files the user should see, write them under `/data` and report paths relative to `/data`.
          - Do not assume a repo-local virtualenv or checkout exists inside the container.
          - Do not install packages into `/data`.
          
          ## Quick start
          
          1. Resolve the CLI binary.
          2. Identify the narrowest command path that matches the request.
          3. If flags are uncertain, consult `references/command_groups.md`, then `references/meshagent_cli_help.md`, or run `meshagent <path> --help`.
          4. Use `meshagent-mail-operator` for mailbox provisioning, inbox evidence, MailBot toolkits, or contact-form email delivery.
          5. Use `meshagent-scheduling-operator` for scheduled-task creation, update, verification, pause, resume, or deletion.
          6. Use `meshagent-webmaster-operator` for websites, `meshagent webserver ...`, routes, or public hostname exposure.
          7. Prefer read-only inspection before mutation.
          8. After a change, verify the result with the corresponding read command.
          
          ## Resolve the CLI
          
          Prefer these paths in order:
          
          1. `/usr/bin/meshagent`
          2. `meshagent`
          
          If neither exists, stop and report that the MeshAgent CLI is unavailable.
          
          ## Command routing
          
          Start with `references/command_groups.md` to choose the right area:
          
          - room lifecycle and room APIs
          - service and deployment workflows
          - agent runtime orchestration
          - inspection and diagnostics
          
          Use `references/meshagent_cli_help.md` for the exact installed command tree and flags.
          
          Follow the explicit top-level command policy in `references/command_groups.md`:
          
          - `USE`: normal command family for this skill
          - `USE WITH CAUTION`: allowed only when clearly needed and tightly scoped
          - `DON'T USE`: out of scope for this skill
          
          ## Operating rules
          
          - Scope the target first: room, room service, room storage path, room participant, room queue, room port, or agent runtime.
          - Prefer the smallest command path that can complete the task.
          - Use `--help` on the exact subcommand before composing long invocations.
          - When executing commands in this runtime, prefer `/usr/bin/meshagent ...` so command examples match the container image.
          - This skill is primarily for room-scoped work in the current room. Prefer `meshagent room ...`, room service commands, service deployment into the current room, room storage access, and runtime commands that operate within the current room.
          - If a command accepts `--room`, it must target `MESHAGENT_ROOM` only. Omit `--room` when the command already defaults to the current room, or set it explicitly to `MESHAGENT_ROOM`. Do not use a different room value.
          - For website, route, and public hostname work, default to `*.meshagent.app` hostnames unless the user explicitly asks for a different MeshAgent public domain.
          - When the user asks to make, update, or deploy a site in room context, create or deploy the site in the current room and return the resulting public URL. Do not stop at local file edits or local build success when the requested outcome is a live room site.
          - Do not modify unrelated example apps, sample repos, bundled SDK examples, or maintainer reference projects to satisfy a room deployment request. For room-site work, create or update the assets and services that belong to the current room workflow.
          - When authorization is uncertain, test the actual target read command for the current room before concluding that authentication is missing.
          - Treat `/data` as the writable user-visible workspace. If a command writes files for the user, keep them under `/data`.
          - Do not expose secret values unless the user explicitly asks for them.
          - Treat delete and overwrite operations as destructive. Confirm the target and blast radius before executing them.
          - After create, update, deploy, or delete, run the appropriate verification command and summarize the resulting state.
          
          ## Out Of Scope
          
          Do not use these commands as part of this skill:
          
          - `meshagent auth ...`
          - `meshagent setup`
          - `meshagent api-key ...`
          - `meshagent project create`
          - `meshagent project activate -i`
          - `meshagent token generate`
          - `meshagent secret ...`
          
          Avoid these project-wide or account-wide command families unless the user explicitly asks for them and the task clearly cannot be completed with room-scoped commands:
          
          - `meshagent project ...`
          - `meshagent webhook ...`
          - `meshagent route ...`
          - `meshagent scheduled-task ...`
          - project-wide `meshagent service ...` operations that are not targeting the current room
          
          Treat these command families as `USE WITH CAUTION`, not defaults:
          
          - `meshagent project list`
          - `meshagent project activate PROJECT_ID` only when a room task clearly requires switching to a specific existing project first
          - `meshagent webhook ...`
          - `meshagent route ...`
          - `meshagent scheduled-task ...`
          - `meshagent helper ...`
          
          ## Bundled resources
          
          - `references/command_groups.md`: fast routing map for the CLI.
          - `references/meshagent_cli_help.md`: packaged CLI help reference for the MeshAgent CLI version recorded in `compat.json`.

      - path: /meshagent-skills/skills/meshagent-cli-operator/references/command_groups.md
        text: |
          # MeshAgent CLI command groups
          
          Use this file to choose the narrowest MeshAgent CLI area before reading the full help reference.
          This reference set is anchored to the MeshAgent CLI version recorded in `compat.json`.
          
          Room-runtime default: when executing commands inside `meshagent/shell-codex:default`, prefer `/usr/bin/meshagent ...` and write user-visible artifacts under `/data`.
          For this skill, the current room is the value of `MESHAGENT_ROOM`.
          For website, route, and public hostname work in this environment, default to `*.meshagent.app` hostnames unless the user explicitly asks for a different MeshAgent public domain.
          
          ## Top-level command policy
          
          Use the following status values exactly:
          
          - `USE`: normal command family for this skill.
          - `USE WITH CAUTION`: allowed only when clearly needed and with tight scope.
          - `DON'T USE`: out of scope for this skill.
          
          ### `USE`
          
          - `meshagent call`
            Use for room-scoped inspection, verification, or targeted invocation when the task is about the current room or a room-local agent/tool.
          - `meshagent session`
            Use for diagnostics, active session inspection, and troubleshooting related to the current room workflow.
          - `meshagent token`
            Use for token inspection or troubleshooting when it is directly relevant to the current room task. Do not use `meshagent token generate`.
          - `meshagent service`
            Use for service validation, rendering, inspection, and deployment when the target is the current room or a room-specific service flow. If a `--room` flag is used, it must match the current room. Do not use project-global service modes.
          - `meshagent mcp`
            Use for room-relevant MCP bridge or connector work when it supports the current room workflow.
          - `meshagent rooms`
            Use for room listing, inspection, and room creation/update/delete only when the user explicitly wants room lifecycle work in the current project. If a command targets a room by name or ID, do not use it for a room other than the current room unless the user explicitly asks for room lifecycle work.
          - `meshagent meeting-transcriber`
            Use for transcriber runtime flows when the task is clearly about deploying or operating that runtime.
          - `meshagent port`
            Use for room port inspection and exposure work tied to the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent webserver`
            Use for room webserver deployment and web content hosting tasks. If a `--room` flag is used, it must match the current room. Prefer `*.meshagent.app` hostnames by default in this environment.
          - `meshagent codex`
            Use for Codex-backed runtime operations that stay within room scope.
          - `meshagent multi`
            Use for multi-agent runtime deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent voicebot`
            Use for voicebot runtime deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent chatbot`
            Use for chatbot runtime deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent process`
            Use for process-backed room agents in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent mailbot`
            Use for mailbot runtime deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent task-runner`
            Use for task-runner deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent worker`
            Use for worker runtime deployment and operation in the current room. If a `--room` flag is used, it must match the current room.
          - `meshagent room`
            Use first for room-scoped agents, services, storage, messaging, database, memory, containers, sync, and developer operations in the current room.
          
          ### `USE WITH CAUTION`
          
          - `meshagent version`
            Use only when the user explicitly asks about the installed CLI version or version-specific behavior.
          - `meshagent project`
            Use only for project context needed to complete room work. Subcommand policy:
            - `meshagent project list`: allowed for read-only discovery of available projects.
            - `meshagent project activate PROJECT_ID`: allowed only when a room task clearly requires switching to a specific existing project first.
            - `meshagent project activate -i`: don't use, because the interactive flow can create a new project.
            - `meshagent project create`: don't use, because creating new projects is broader than this skill's room-focused scope.
          - `meshagent webhook`
            Use only when the room task requires project-level webhook configuration tied to the room's workflow.
          - `meshagent secret`
            Don't use. Project secret management is broader than this skill's room-focused scope.
          - `meshagent mailbox`
            Use for mailbox provisioning or inspection when a room workflow needs it.
          - `meshagent route`
            Use only when the room task requires route configuration backing the current room's service exposure. Prefer `*.meshagent.app` hostnames by default in this environment.
          - `meshagent scheduled-task`
            Use only when the room task requires scheduled execution tied to the current room's workflow.
          - `meshagent helper`
            Use only when the user explicitly needs developer helper HTTP services such as hosted schemas or toolkits.
          
          ### `DON'T USE`
          
          - `meshagent setup`
            Do not use. Initial CLI setup is out of scope for this skill.
          - `meshagent auth`
            Do not use. Interactive auth and user-session management are out of scope for this skill.
          - `meshagent api-key`
            Do not use. API key creation and management are out of scope for this skill.
          - `meshagent token generate`
            Do not use. Minting participant tokens is broader than this skill's room-focused scope.
          - `meshagent project create`
            Do not use. Creating new projects is broader than this skill's room-focused scope.
          - `meshagent project activate -i`
            Do not use. The interactive activation flow can create new projects and is too broad for this skill.
          - `meshagent secret`
            Do not use. Project secret management is broader than this skill's room-focused scope.
          
          ## Preferred routing
          
          - For room-scoped tasks, start with `meshagent room ...`.
          - For runtime deployment tasks, prefer the specific runtime family such as `meshagent process ...`, `meshagent chatbot ...`, `meshagent worker ...`, `meshagent webserver ...`, or `meshagent multi ...`.
          - Use `meshagent service ...` when the task is specifically about service specs, templates, validation, rendering, or deployment mechanics.
          - Use `meshagent rooms ...` only when the user explicitly wants room lifecycle changes such as create/list/update/delete.
          - If a command accepts `--room`, do not target any room other than `MESHAGENT_ROOM`.
          - For room-site requests, deploy in the current room and return the public URL. Do not treat local example-app edits or local build output as completion of a room deployment request.
          - Use `meshagent-mail-operator` for mailbox, inbox, MailBot, or contact-form email workflows.
          - Use `meshagent-scheduling-operator` for scheduled-task creation, update, pause, resume, or deletion.
          - Use `meshagent-webmaster-operator` for websites, `meshagent webserver ...`, routes, or public hostname exposure.
          - Escalate to `USE WITH CAUTION` command families only when room-scoped commands are insufficient.
          
          ## Notes
          
          - `meshagent room ...` is the deepest public area. Use it for room-scoped agents, storage, messaging, services, database tables, memories, containers, and sync.
          - For this skill, prefer room-scoped commands over project-scoped commands whenever both could satisfy the request.
          - The help reference documents command names and flags. In this runtime, prefer `/usr/bin/meshagent` as the executable path.

