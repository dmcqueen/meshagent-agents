          ## Primary command groups
          
          - `meshagent rooms ...`
          - `meshagent room agent ...`
          - `meshagent room secret ...`
          - `meshagent room queue ...`
          - `meshagent room messaging ...`
          - `meshagent room storage ...`
          - `meshagent room service ...`
