                  "--compat-json",
                  default=str(DEFAULT_COMPAT),
                  help=f"Path to compat.json. Default: {DEFAULT_COMPAT}",
              )
              return parser.parse_args()
          
          
          def load_text(path: Path) -> str:
              return path.read_text(encoding="utf-8")
          
          
          def discover_skill_files() -> dict[str, Path]:
              discovered: dict[str, Path] = {}
              for skill_md in sorted(SKILLS_DIR.glob("*/SKILL.md")):
                  if skill_md.parent.name == "_shared":
                      continue
                  text = load_text(skill_md)
                  frontmatter_match = FRONTMATTER_PATTERN.match(text)
                  if frontmatter_match is None:
                      raise ValueError(f"{skill_md} is missing YAML frontmatter")
                  name_match = NAME_PATTERN.search(frontmatter_match.group(1))
                  if name_match is None:
                      raise ValueError(f"{skill_md} is missing frontmatter name")
                  skill_name = name_match.group(1).strip().strip('"').strip("'")
                  if not skill_name:
                      raise ValueError(f"{skill_md} has an empty frontmatter name")
                  discovered[skill_name] = skill_md
              return discovered
          
          
          def parse_top_level_commands(help_text: str) -> set[str]:
              commands: set[str] = set()
              in_commands = False
              for line in help_text.splitlines():
                  if re.match(r"^╭─ Commands ", line):
                      in_commands = True
                      continue
                  if in_commands and line.startswith("╰"):
                      break
                  if not in_commands:
                      continue
                  stripped = line.strip()
                  if not stripped.startswith("│"):
                      continue
                  inner = stripped.strip("│").strip()
                  if not inner:
                      continue
                  commands.add(inner.split()[0])
              return commands
          
          
          def referenced_top_level_commands(command_groups_text: str) -> set[str]:
              refs: set[str] = set()
              for match in re.finditer(r"`meshagent ([a-z0-9-]+)", command_groups_text):
                  refs.add(match.group(1))
              return refs
          
          
          def parse_scalar_string(raw_value: str, field_name: str, source_path: Path) -> str:
              value = raw_value.strip()
              match = QUOTED_STRING_PATTERN.match(value)
              if match is not None:
                  return match.group("value")
              if value and not value.startswith(("[", "{")):
                  return value
              raise ValueError(f"{source_path} has an invalid string value for {field_name}")
          
          
          def parse_openai_interface(openai_path: Path) -> dict[str, str]:
              lines = openai_path.read_text(encoding="utf-8").splitlines()
              interface_started = False
              interface_fields: dict[str, str] = {}
          
              for line_number, line in enumerate(lines, start=1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  if not interface_started:
                      if line != "interface:":
                          raise ValueError(
                              f"{openai_path}:{line_number} must start with a top-level interface: mapping"
                          )
                      interface_started = True
                      continue
                  if not line.startswith("  "):
                      raise ValueError(
                          f"{openai_path}:{line_number} has unexpected top-level content outside interface"
                      )
                  if ":" not in stripped:
                      raise ValueError(
                          f"{openai_path}:{line_number} must define a key/value pair under interface"
                      )
                  key, raw_value = stripped.split(":", 1)
                  key = key.strip()
                  if key in interface_fields:
                      raise ValueError(
                          f"{openai_path}:{line_number} duplicates interface key {key}"
                      )
                  interface_fields[key] = parse_scalar_string(raw_value, key, openai_path)
          
              if not interface_started:
                  raise ValueError(f"{openai_path} is missing top-level interface:")
              return interface_fields
          
          
          def validate_openai_yaml(skill_name: str, skill_dir: Path, errors: list[str]) -> None:
              openai_path = skill_dir / "agents" / "openai.yaml"
              if not openai_path.is_file():
                  errors.append(f"{skill_name} is missing agents/openai.yaml")
                  return
          
              try:
                  interface_fields = parse_openai_interface(openai_path)
              except ValueError as exc:
                  errors.append(str(exc))
                  return
          
              required_fields = ("display_name", "short_description", "default_prompt")
              for field in required_fields:
                  value = interface_fields.get(field)
                  if not value:
                      errors.append(
                          f"{skill_name} agents/openai.yaml is missing interface.{field}"
                      )
          
              expected_prompt_token = f"${skill_name}"
              default_prompt = interface_fields.get("default_prompt", "")
              if expected_prompt_token not in default_prompt:
                  errors.append(
                      f"{skill_name} agents/openai.yaml default_prompt must mention {expected_prompt_token}"
                  )
          
          
          def validate_relative_resources(
              skill_name: str, skill_path: Path, skill_text: str, errors: list[str]
          ) -> None:
              for match in RELATIVE_RESOURCE_PATTERN.finditer(skill_text):
                  relative_path = match.group("path")
                  target_path = (skill_path.parent / relative_path).resolve()
                  if not target_path.is_file():
                      errors.append(
                          f"{skill_name} references missing packaged resource {relative_path}"
                      )
          
          
          def validate_workflow_contract(
              skill_name: str, skill_text: str, errors: list[str]
          ) -> None:
              frontmatter_match = FRONTMATTER_PATTERN.match(skill_text)
              if frontmatter_match is None:
                  errors.append(f"{skill_name} is missing YAML frontmatter")
                  return
          
              frontmatter_text = frontmatter_match.group(1)
              required_frontmatter_fields = (
                  "  workflow:",
                  "    can_be_owner:",
                  "    handoff_policy:",
                  "    completion_gates:",
                  "    evidence:",
              )
              if WORKFLOW_METADATA_PATTERN.search(frontmatter_text) is None:
                  errors.append(f"{skill_name} is missing metadata.workflow")
              for field in required_frontmatter_fields[1:]:
                  if field not in frontmatter_text:
                      errors.append(f"{skill_name} metadata.workflow is missing {field.strip()}")
          
              if WORKFLOW_SECTION_PATTERN.search(skill_text) is None:
                  errors.append(f"{skill_name} is missing a '## Workflow accountability' section")
              if WORKFLOW_REFERENCE_PATH not in skill_text:
                  errors.append(
                      f"{skill_name} does not reference the shared workflow accountability contract"
                  )
          
          
          def main() -> int:
              args = parse_args()
              meshagent_bin = args.meshagent_bin
              compat_path = Path(args.compat_json).resolve()
          
              if "/" in meshagent_bin:
                  meshagent_path = Path(meshagent_bin).resolve()
                  meshagent_bin = str(meshagent_path)
                  if not meshagent_path.is_file():
                      print(f"meshagent CLI not found: {meshagent_path}", file=sys.stderr)
                      return 1
          
              compat = json.loads(compat_path.read_text(encoding="utf-8"))
              expected_version = compat.get("meshagent_cli_version")
              if not isinstance(expected_version, str) or not expected_version.strip():
                  print("compat.json is missing meshagent_cli_version", file=sys.stderr)
                  return 1
              expected_version = expected_version.strip()
          
              version_proc = subprocess.run(
                  [meshagent_bin, "version"], capture_output=True, text=True
              )
              if version_proc.returncode != 0:
                  print(version_proc.stderr or version_proc.stdout, file=sys.stderr)
                  return 1
              actual_version = version_proc.stdout.strip()
          
              help_proc = subprocess.run(
                  [meshagent_bin, "--help"], capture_output=True, text=True
              )
              if help_proc.returncode != 0:
                  print(help_proc.stderr or help_proc.stdout, file=sys.stderr)
                  return 1
          
              top_level = parse_top_level_commands(help_proc.stdout)
              command_groups_text = load_text(DEFAULT_COMMAND_GROUPS)
              referenced = referenced_top_level_commands(command_groups_text)
              missing = sorted(cmd for cmd in referenced if cmd not in top_level)
          
              readme_text = load_text(DEFAULT_README)
              plugin_text = load_text(DEFAULT_PLUGIN)
              skill_text = load_text(DEFAULT_SKILL)
              help_text = load_text(DEFAULT_HELP)
              skill_files = discover_skill_files()
          
              errors: list[str] = []
              if actual_version != expected_version:
                  errors.append(
                      f"compat.json expects MeshAgent CLI {expected_version}, but installed version is {actual_version}"
                  )
              if "compat.json" not in readme_text:
                  errors.append("README.md does not reference compat.json")
              if "compat.json" not in skill_text:
                  errors.append("SKILL.md does not reference compat.json")
              if "compat.json" not in command_groups_text:
                  errors.append("command_groups.md does not reference compat.json")
              if expected_version not in help_text:
                  errors.append(
                      f"meshagent_cli_help.md does not mention MeshAgent CLI {expected_version}"
                  )
              if "$ meshagent --help" not in help_text:
                  errors.append(
                      "meshagent_cli_help.md should render console examples with `meshagent`"
                  )
              if "/.venv/bin/meshagent" in help_text:
                  errors.append(
                      "meshagent_cli_help.md should not embed repo-local meshagent paths"
                  )
              plugin = json.loads(plugin_text)
              plugin_description = plugin.get("description")
              if plugin_description != EXPECTED_PLUGIN_DESCRIPTION:
                  errors.append(
                      "plugin.json description does not match the expected package description"
                  )
              if missing:
                  errors.append(
                      "command_groups.md references commands not present in meshagent --help: "
                      + ", ".join(missing)
                  )
              if (
                  "Use `meshagent-webapp-builder` for websites, contact forms, `meshagent webserver ...`, or room-hosted web handlers."
                  not in command_groups_text
              ):
                  errors.append(
                      "command_groups.md is missing the required webapp-builder routing rule for websites and meshagent webserver work"
                  )
              if (
                  "Use `meshagent-webmaster` for explicit route management or public hostname exposure."
                  not in command_groups_text
              ):
                  errors.append(
                      "command_groups.md is missing the required webmaster routing rule for explicit route management"
                  )
              for skill_name, skill_path in skill_files.items():
                  current_skill_text = load_text(skill_path)
                  if SKILL_REFERENCE_PATH_PATTERN.search(current_skill_text):
                      errors.append(f"{skill_name} references another skill by relative path")
                  validate_openai_yaml(skill_name, skill_path.parent, errors)
                  validate_relative_resources(skill_name, skill_path, current_skill_text, errors)
                  validate_workflow_contract(skill_name, current_skill_text, errors)
          
              if errors:
                  for error in errors:
                      print(f"- {error}", file=sys.stderr)
                  return 1
          
              print(f"Validated meshagent-skills against MeshAgent CLI {expected_version}")
              return 0
          
          
          if __name__ == "__main__":
              raise SystemExit(main())

      - path: /meshagent-skills/skills/_shared/references/live_room_cli_context.md
        text: |
          # Live Room CLI Context
          
          Use these rules when a skill runs inside an existing MeshAgent room runtime or room shell.
          
          - Reuse the existing MeshAgent CLI session and room context before asking the user to log in again.
          - If `MESHAGENT_ROOM` is present, prefer room-scoped commands and pass `--room "${MESHAGENT_ROOM}"` when the command requires it.
          - If `MESHAGENT_ROOM` is already present, do not use room-listing commands as a prerequisite for room-scoped work.
          - If authentication is uncertain, test a room-scoped read command first. Do not claim the CLI is unauthenticated until an actual MeshAgent command fails for that reason.
          - Treat existing MeshAgent environment variables and active CLI session state as real runtime context to inspect and use.
          - Distinguish local authoring files from room-visible runtime files. Room-owned runtime data belongs under `/data`.
          - For `meshagent webserver deploy`, local source files are uploaded from the current working directory, while `--website-path` is the room-storage destination.
          - Do not treat `/data/...` as the local source root for deployable website files unless the current working directory is already under `/data`.
          - Do not treat `/tmp` as the durable room workspace.
          - Do not use room file tools against `.` , `/`, or temporary/build paths such as `/tmp`. Use concrete room-visible paths under `/data`, or use shell commands when the task really needs a non-room-local path.

      - path: /meshagent-skills/skills/_shared/references/managed_hostname_rules.md
        text: |
          # Managed Hostname Rules
          
          Use these rules whenever a skill needs to choose, validate, or report a MeshAgent-managed public hostname.
          
          - If `MESHAGENT_API_URL` is present, derive the managed suffix from that API environment: use `*.meshagent.app` for `.com` environments and `*.meshagent.dev` for `.life` environments.
          - If `MESHAGENT_API_URL` is absent or does not clearly identify the environment, inspect an existing route in the current project or ask before inventing a managed public hostname.
          - Packaged help or example text that shows `.meshagent.app` is illustrative only. Do not copy that suffix blindly when the active runtime indicates a different environment.
          - Before running a deploy with `--domain` or reporting a managed public URL, verify that the chosen hostname suffix matches `MESHAGENT_API_URL`.
          - If a candidate hostname collides, keep the same environment-specific suffix family and try additional candidates before asking the user to choose one.
          - If `meshagent webserver deploy --domain ...` fails because the hostname is already in use and a follow-up route read is forbidden, treat that hostname as unavailable and try a different candidate before reporting a generic permissions blocker.
          - Do not report a managed URL whose suffix contradicts the active API environment.

      - path: /meshagent-skills/skills/_shared/references/workflow_accountability.md
        text: |
          # Workflow Accountability
          
          Use this reference when the user asked for an end-to-end outcome that may require multiple skills.
          
          ## Core model
          
          Every workflow must have exactly one current workflow owner.
          
          - The workflow owner is the skill currently responsible for the user-visible outcome.
          - Supporting skills may execute part of the work, but they do not get to declare the overall workflow complete unless ownership is explicitly transferred.
          - Ownership may transfer to a narrower or more appropriate skill, but the transfer must be explicit in the reasoning and the new owner must continue tracking completion gates and evidence.
          
          ## Completion gates
          
          Do not say "done" until all relevant gates have passed.
          
          Minimum gates for any workflow:
          
          1. The mutation target or inspection target was identified correctly.
          2. The claimed state change or observed result was verified against real room/runtime state.
          3. The user-visible outcome was verified, or the exact blocker was identified.
          
          Skill-specific gates may add stricter requirements such as live runtime proof, queue dequeue proof, mailbox identity proof, HTTP smoke tests, or log evidence.
          
          ## Evidence rules
          
          The workflow owner must collect concrete evidence for each gate, such as:
          
          - exact commands or packaged references used
          - observed room state, service state, queue state, log lines, or runtime signals
          - user-visible outputs such as a live URL, delivered queue message, or confirmed mail-send result
          - if the workflow failed, the exact blocker instead of a generic "not working"
          
          ## Handoff rules
          
          - Handoffs transfer execution work, not accountability, unless ownership is explicitly transferred.
          - A supporting skill should return evidence, not a success claim for the whole workflow.
          - If the current owner cannot complete the workflow without another skill, it should call that handoff and then continue evaluating the remaining gates.
          
          ## Missing-input rules
          
          - If the workflow is blocked on specific user input, identify the exact missing input instead of asking a generic permission-to-continue question.
          - Ask for all clearly blocking user inputs together when possible rather than discovering them one at a time across multiple turns.
          - After the user confirms they want the workflow completed, continue the workflow unless a new concrete blocker appears.
          - Do not make the user restate the original goal just because a sub-step was incomplete or partially verified.
          
          ## Preflight rules
          
          - If the workflow depends on a specific backend surface such as scheduled tasks, room services, mail delivery, or toolkit publication, preflight the required capability before presenting the workflow as end-to-end ready.
          - Treat `403` responses as permission blockers, not as a cue to keep promising the blocked step later.
          - Treat unexpected `5xx` responses on required workflow surfaces as backend health blockers until a retry or narrower probe proves otherwise.
          - When a required backend surface is blocked, either stop before creating a half-complete workflow or clearly mark any continued setup as partial preparation only.
          
          ## Forbidden shortcuts
          
          - Do not treat object creation alone as end-to-end success.
          - Do not treat YAML generation alone as deployment success.
          - Do not treat queue size changes alone as business workflow success.
          - Do not treat a scheduled task record alone as proof that the future workflow will work.
          - Do not use the room, server, or runtime timezone as a substitute for the requesting user's timezone when the workflow is about scheduling in the user's local time.
          - Do not anchor a relative scheduling request such as "one minute from now" to the start of a longer setup workflow when the user intent is relative to the actual task-creation moment.
          - Do not hand the user an unresolved truncation, noise, or parsing problem for a simple inspection task. Rerun the narrow command and return the exact result.
          - Do not leave an obviously required user input such as the recipient email unasked in a workflow whose purpose is to send a real email.
          - Do not wait until the final step to discover that a required backend surface such as scheduled-task create is blocked when a cheap preflight could have shown that earlier.

      - path: /meshagent-skills/skills/meshagent-cli-operator/SKILL.md
        text: |
          ---
          name: meshagent-cli-operator
          description: Use the MeshAgent CLI. This skill is for choosing command paths, reading help output, composing non-interactive commands, and verifying results.
          metadata:
            short-description: Route and run MeshAgent CLI commands safely and non-interactively.
            references:
              bundled:
                - references/command_groups.md
                - references/meshagent_cli_help.md
                - ../_shared/references/live_room_cli_context.md
                - ../_shared/references/managed_hostname_rules.md
                - ../_shared/references/workflow_accountability.md
              resolved_targets:
                - live meshagent help output when bundled help is missing or stale
            related_skills:
              - skill: meshagent-workflow-orchestrator
                when: The user's goal is an end-to-end workflow that spans multiple specialized skills.
              - skill: meshagent-sdk-researcher
                when: The task depends on SDK or server source, not just CLI behavior.
              - skill: meshagent-webapp-builder
                when: A CLI deploy task also requires authoring or debugging the web app itself.
              - skill: meshagent-service-operator
                when: The main task is service lifecycle semantics rather than command routing.
            scope:
              owns:
                - command-family routing
                - safe non-interactive CLI composition
                - CLI-side verification patterns
              excludes:
                - SDK API design
                - app-specific implementation work
            workflow:
              can_be_owner: true
              handoff_policy: retain_accountability_until_owner_transfer
              completion_gates:
                - mutation_target_confirmed_when_relevant
                - observed_state_matches_claim
                - user_visible_result_verified_or_exact_blocker_reported
              evidence:
                - exact_commands_or_artifacts_used
                - observed_room_or_runtime_state
                - user_visible_result_or_exact_blocker
          ---
          
          # MeshAgent CLI Operator
          
          Use this skill when the task is primarily about running or explaining MeshAgent CLI commands.
          
          ## Quick start
          
          1. Resolve the `meshagent` binary from `PATH` or use the explicit binary path the user provides.
          2. Identify the narrowest command path that matches the request.
          3. If flags are uncertain, consult `references/command_groups.md`, then `references/meshagent_cli_help.md`. Only run live `meshagent <path> --help` when the packaged references are missing the needed subcommand detail or appear inconsistent with the observed CLI version.
          4. Prefer read-only inspection before mutation.
          5. Verify the result with the corresponding read command.
          
          ## Resolve the CLI
          
          - Prefer `meshagent` on `PATH`.
          - If the user gives an explicit MeshAgent binary path, use that path.
          - If no MeshAgent CLI binary is available, stop and report that clearly.
          
          ## Command routing
          
          - Start with `references/command_groups.md` to choose the correct command family.
          - Use `references/meshagent_cli_help.md` for exact command shapes and flags.
          - Use `../_shared/references/live_room_cli_context.md` for shared live-room CLI rules.
          - Use `../_shared/references/managed_hostname_rules.md` for shared managed-hostname selection and validation rules.
          - Prefer the packaged references over live `--help` in a live room to avoid noisy recursive help probing.
          - Prefer the smallest command path that can complete the task.
          - Prefer non-interactive commands over interactive flows.
          
          ## Related skills
          
          - `meshagent-workflow-orchestrator`: Use it when the user's goal spans multiple specialized skills and one owner should keep accountability.
          - `meshagent-sdk-researcher`: Use it when the answer depends on source-level behavior or examples rather than command shape.
          - `meshagent-webapp-builder`: Use it when a CLI deploy command is only one part of building or fixing a room website.
          - `meshagent-service-operator`: Use it when the task is primarily about service semantics, templates, or room service lifecycle.
          
          ## Live room execution
          
          - Apply `../_shared/references/live_room_cli_context.md` for room context reuse, `MESHAGENT_ROOM`, auth-first checks, durable workspace rules, and local-vs-room path handling.
          - Apply `../_shared/references/managed_hostname_rules.md` for `MESHAGENT_API_URL`-driven hostname suffix selection and collision handling.
          
          ## Operating rules
          
          - Do not invent the active project, active room, hostname, filesystem layout, or environment variables. Inspect them or ask when they matter.
          - Do not use live `meshagent ... --help` as a default discovery step in a live room when the packaged references already cover the command. Use live `--help` only as a fallback for missing or version-mismatched details.
          - Before writing ad hoc SDK code for a room operation, check whether the CLI already exposes a generic toolkit path such as `meshagent room agent list-toolkits` or `meshagent room agent invoke-tool`.
          - When a first command returns noisy or truncated output for a simple inspection task, rerun the narrowest command and summarize the exact result instead of handing the truncation problem back to the user.
          - Prefer read commands before create, update, deploy, or delete.
          - Restate the exact mutation target before destructive changes.
          - Verify the resulting state after mutation.
          - For room website requests that ask for a live URL, do not stop at local file creation or `meshagent webserver check`. Either complete the deploy and return the public URL, or report the exact blocking command and error.
          - For room website requests, verify the live behavior of the deployed site itself, not just the deploy command result. At minimum, check that the public URL returns the expected status and content for the primary route.
          - For contact-form websites, test both a GET of the form page and representative POST submissions after deploy. Treat any live 500 as an application/runtime failure to diagnose before blaming room infrastructure.
          - When a deployed MeshAgent webserver returns 500, first suspect route-handler import/render/runtime errors before concluding that the room route or platform is broken.
          - For Python handlers that render inline HTML templates, do not use `str.format()` on raw HTML/CSS/regex-heavy strings unless every literal brace is escaped. Prefer a safer templating approach or pre-escaped placeholders.
          - Do not print secret values unless the user explicitly asks for them and the command returns them.
          
          ## Workflow accountability
          
          - This skill may own the workflow outcome when the user's goal is primarily within this skill's scope.
          - If another skill already owns the workflow, return command evidence and observed state to that owner instead of declaring the overall job complete.
          - If this skill hands off to another skill, keep accountability for the original goal until the handoff returns evidence or ownership is explicitly transferred.
          - Follow `../_shared/references/workflow_accountability.md` for owner selection, completion gates, evidence, and forbidden shortcuts.
          
          ## Bundled resources
          
          - `references/command_groups.md`: fast routing map for the CLI.
          - `references/meshagent_cli_help.md`: packaged CLI help reference for the MeshAgent CLI version recorded in `compat.json`.
          - `../_shared/references/live_room_cli_context.md`: shared live-room CLI context rules for room-scoped work.
          - `../_shared/references/managed_hostname_rules.md`: shared managed-hostname selection and validation rules.

