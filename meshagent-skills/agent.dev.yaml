version: v1
kind: ServiceTemplate
variables: []

metadata:
  name: meshagent-cli-skill
  description: "A MeshAgent room agent that automatically discovers and coordinates multipler specialized skills including CLI operations, email workflows, task scheduling, and web deployment."
  annotations:
    meshagent.service.id: "meshagent.meshagent-cli-skill"

agents:
  - name: meshagent-cli-skill
    description: "A chat agent specialized in operating the MeshAgent CLI."
    annotations:
      meshagent.agent.type: "ChatBot"

container:
  image: meshagent/shell-codex:default
  command: /bin/bash /var/start.sh
  storage:
    room:
      - path: /data
        read_only: false
    files:
      - path: /var/start.sh
        text: |
          #!/bin/bash
          set -euo pipefail

          echo "[startup] Initializing meshagent-cli-skill..."
          mkdir -p /data/skills/meshagent-skills

          echo "[startup] Checking for /meshagent-skills directory..."
          if [ -d /meshagent-skills ]; then
            echo "[startup] Found /meshagent-skills, copying files..."
            ls -la /meshagent-skills | head -20
            cp -R -n /meshagent-skills/* /data/skills/meshagent-skills/ 2>/dev/null || true
            echo "[startup] Copy complete"
          else
            echo "[startup] WARNING: /meshagent-skills directory not found" >&2
            echo "[startup] Checking root directory contents:"
            ls -la / | grep -E "meshagent|skills" || true
          fi

          if [ -d /meshagent-skills/.claude-plugin ]; then
            mkdir -p /data/skills/meshagent-skills/.claude-plugin
            cp -R -n /meshagent-skills/.claude-plugin/* /data/skills/meshagent-skills/.claude-plugin/ 2>/dev/null || true
          fi

          echo "[startup] Verifying required skills..."
          
          SKILLS_DIR="/data/skills/meshagent-skills/skills"
          if [ ! -d "${SKILLS_DIR}" ]; then
            echo "[startup] ERROR: Skills directory not found at ${SKILLS_DIR}" >&2
            exit 1
          fi
          
          # Discover available skills dynamically
          echo "[startup] Discovering installed skills..."
          SKILL_COUNT=0
          AVAILABLE_SKILLS=""
          for skill_dir in "${SKILLS_DIR}"/*; do
            if [ -d "${skill_dir}" ]; then
              skill_name=$(basename "${skill_dir}")
              if [ -f "${skill_dir}/SKILL.md" ]; then
                SKILL_COUNT=$((SKILL_COUNT + 1))
                echo "[startup]   ✓ ${skill_name}"
                if [ -z "${AVAILABLE_SKILLS}" ]; then
                  AVAILABLE_SKILLS="${skill_name}"
                else
                  AVAILABLE_SKILLS="${AVAILABLE_SKILLS}, ${skill_name}"
                fi
              else
                echo "[startup]   ⚠ ${skill_name} (no SKILL.md, skipping)"
              fi
            fi
          done
          
          if [ ${SKILL_COUNT} -eq 0 ]; then
            echo "[startup] ERROR: No skills with SKILL.md found in ${SKILLS_DIR}" >&2
            find "${SKILLS_DIR}" -type f | head -20 || true
            exit 1
          fi
          
          echo "[startup] Found ${SKILL_COUNT} skills: ${AVAILABLE_SKILLS}"

          echo "[startup] All skills verified! Starting meshagent process..."
          echo "[startup] Room: ${MESHAGENT_ROOM:-unset}"
          echo "[startup] Project ID: ${MESHAGENT_PROJECT_ID:-will use default}"
          
          # Start meshagent process, optionally with project ID
          if [ -n "${MESHAGENT_PROJECT_ID:-}" ]; then
            exec /usr/bin/meshagent process join \
              --project-id="${MESHAGENT_PROJECT_ID}" \
              --room="${MESHAGENT_ROOM}" \
              --agent-name=meshagent-cli-skill \
              --channel chat \
              --working-dir=/data \
              --require-shell \
              --require-apply-patch \
              --require-web-search \
              --require-web-fetch \
              --require-storage \
              --shell-tool-room-path=/:/data \
              --storage-tool-room-path=/:/data \
              --shell-image=meshagent/shell-codex:default \
              --delegate-shell-token \
              --skill-dir /data/skills/meshagent-skills/skills \
              --rule='Use the installed skills from the configured skill directory to solve the user request. Each skill is specialized for a different domain (CLI operations, email, scheduling, web deployment, etc.). Read the skill documentation and choose the best-fit skill for the task. Coordinate between skills when a task requires multiple domains.'
          else
            exec /usr/bin/meshagent process join \
              --room="${MESHAGENT_ROOM}" \
              --agent-name=meshagent-cli-skill \
              --channel chat \
              --working-dir=/data \
              --require-shell \
              --require-apply-patch \
              --require-web-search \
              --require-web-fetch \
              --require-storage \
              --shell-tool-room-path=/:/data \
              --storage-tool-room-path=/:/data \
              --shell-image=meshagent/shell-codex:default \
              --delegate-shell-token \
              --skill-dir /data/skills/meshagent-skills/skills \
              --rule='Use the installed skills from the configured skill directory to solve the user request. Each skill is specialized for a different domain (CLI operations, email, scheduling, web deployment, etc.). Read the skill documentation and choose the best-fit skill for the task. Coordinate between skills when a task requires multiple domains (e.g., website creation with email integration uses both web and mail skills).'
          fi

      - path: /meshagent-skills/.claude-plugin/plugin.json
        text: |
          {
            "name": "meshagent-skills",
            "version": "0.1.0",
            "description": "MeshAgent operator skill pack for CLI routing, room operations, runtime debugging, queues, services, storage, databases, memory, scheduling, and room-hosted web workflows.",
            "author": {
              "name": "Codex"
            }
          }

      - path: /meshagent-skills/README.md
        text: |
          # MeshAgent Skills
          
          This package is a vendorable MeshAgent skill pack.
          
          It combines:
          
          - slash-command entrypoints under `commands/`
          - focused `SKILL.md` files under `skills/`
          - packaged CLI reference material under `skills/meshagent-cli-operator/references/`
          - maintenance scripts under `scripts/`
          - a machine-readable compatibility target in `compat.json`
          - plugin metadata in `.claude-plugin/plugin.json`
          
          The package is designed so a live room agent can answer MeshAgent workflow requests with package-local instructions and references instead of relying on ad hoc prompting.
          
          ## Current system
          
          The package now has one general CLI skill plus a larger specialized operator bundle:
          
          - `skills/meshagent-cli-operator/`
            General MeshAgent CLI routing, command composition, live-room execution rules, and packaged CLI reference material.
          - `skills/meshagent-sdk-researcher/`
            Guidance for resolving the MeshAgent checkout roots and using docs, examples, and source to answer SDK/API questions.
          - `skills/meshagent-database-operator/`
            Room database schema, CRUD, search, SQL, namespace, index, and `RequiredTable` workflows.
          - `skills/meshagent-memory-operator/`
            Room memory creation, ingestion, recall, and query workflows.
          - `skills/meshagent-workflow-orchestrator/`
            End-to-end cross-skill workflow ownership, preflight, sequencing, and completion-gate tracking.
          - `skills/meshagent-queue-operator/`
            Queue send, receive, backlog inspection, and queue-delivery verification.
          - `skills/meshagent-queue-worker-builder/`
            Queue-backed Worker YAML authoring for schedulable or dequeued room jobs.
          - `skills/meshagent-runtime-operator/`
            Live runtime debugging for developer logs, containers, and port forwarding.
          - `skills/meshagent-scheduler/`
            `meshagent scheduled-task ...` workflows, timezone handling, and queue-delivery verification.
          - `skills/meshagent-service-operator/`
            Service and service-template lifecycle, validation, rendering, and room service operations.
          - `skills/meshagent-storage-operator/`
            Room storage inspection, copy, show, and removal workflows.
          - `skills/meshagent-webapp-builder/`
            Build and verify deployable room-hosted web applications, including contact forms, public handlers, and mailbox-backed outbound email workflows.
          - `skills/meshagent-webapp-react-builder/`
            Small React-style room websites using Preact + htm.
          - `skills/meshagent-mail-operator/`
            Mailbox administration, room SMTP behavior, inbound queue inspection, and mailbox-backed sender guidance.
          - `skills/meshagent-participant-token-operator/`
            Participant token source discovery, service token injection, delegated shell token behavior, and API-key-signed token guidance.
          - `skills/meshagent-webmaster/`
            Route/domain mapping behavior and the static webserver YAML reference example.
          
          The package also exposes command entrypoints for common request classes:
          
          - `commands/meshagent.md`
            General MeshAgent CLI entrypoint.
          - `commands/meshagent-room.md`
            Room lifecycle and room-scoped operations.
          - `commands/meshagent-service.md`
            Services, deploys, MCP, helpers, and webserver-adjacent work.
          - `commands/meshagent-project.md`
            Project-scoped administration such as routes, mailboxes, and scheduled tasks.
          - `commands/meshagent-agent.md`
            Agent runtime orchestration such as chatbot, worker, mailbot, and process runtimes.
          - `commands/meshagent-inspect.md`
            Read-only inspection and diagnostics.
          
          ## Package layout
          
          Key files and directories in this package:
          
          - `README.md`
            Package overview and maintenance notes.
          - `compat.json`
            Target MeshAgent CLI version for the packaged references and validation.
          - `.claude-plugin/plugin.json`
            Plugin metadata for the packaged skill pack.
          - `skills/_shared/references/`
            Shared package-level references for live-room CLI context and managed hostname rules.
          - `skills/_shared/references/process_agent_design.md`
            Shared process-first design reference for shared-identity agents across chat, mail, queue, and toolkit channels.
          - `skills/_shared/references/workflow_accountability.md`
            Shared workflow-owner, completion-gate, evidence, and handoff contract for cross-skill outcomes.
          - `commands/meshagent.md`
            General MeshAgent CLI entrypoint.
          - `commands/meshagent-room.md`
            Room-scoped command entrypoint.
          - `commands/meshagent-service.md`
            Service, deploy, MCP, and webserver-adjacent entrypoint.
          - `commands/meshagent-project.md`
            Project-scoped administration entrypoint.
          - `commands/meshagent-agent.md`
            Agent runtime orchestration entrypoint.
          - `commands/meshagent-inspect.md`
            Read-only inspection and diagnostics entrypoint.
          - `scripts/refresh_meshagent_skills_package.py`
            One-command updater for `compat.json`, packaged CLI help, and validation.
          - `scripts/generate_meshagent_cli_help_reference.py`
            CLI help reference generator.
          - `scripts/validate_meshagent_skills_package.py`
