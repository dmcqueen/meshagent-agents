      - path: /meshagent-skills/commands/meshagent-service.md
        text: |
          ---
          description: Service and deployment workflows in MeshAgent, including service specs, templates, MCP bridges, helper services, and webservers.
          argument-hint: "<service or deployment task>"
          ---
          
          # /meshagent-service
          
          Use this command for MeshAgent service lifecycle and service-adjacent runtime operations.
          
          ## Primary command groups
          
          - `meshagent service ...`
          - `meshagent mcp ...`
          - `meshagent helper ...`
          - `meshagent webserver ...`
          - `meshagent codex ...`
          
          ## Operating rules
          
          1. Inspect or validate specs before create or update when possible.
          2. Prefer `validate`, `render-template`, `show`, or `list` before destructive or state-changing commands.
          3. After deploy or update, verify the resulting service state and surface any follow-up steps.
          4. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for websites, contact forms, `meshagent webserver ...`, and room-hosted webapp deployment.
          5. Use [SKILL.md](../skills/meshagent-webmaster/SKILL.md) for explicit route/domain administration or public hostname diagnostics.

      - path: /meshagent-skills/commands/meshagent.md
        text: |
          ---
          description: General MeshAgent CLI operator. Route a request to the right meshagent subcommand and execute it safely.
          argument-hint: "<goal, room, service, project, or meshagent command>"
          ---
          
          # /meshagent
          
          Use this command for any request that involves the MeshAgent CLI.
          
          ## Workflow
          
          1. Start with [SKILL.md](../skills/meshagent-cli-operator/SKILL.md).
          2. Use [SKILL.md](../skills/meshagent-webapp-builder/SKILL.md) for websites, contact forms, web handlers, and room-hosted webapp deployment.
          3. Use [SKILL.md](../skills/meshagent-mail-operator/SKILL.md) for email delivery, mailboxes, inbox evidence, or MailBot toolkits.
